<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 转 XML - 笨鸟办公工具集箱</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"
     crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #ec4899 0%, #8b5cf6 100%);
            color: white;
            min-width: 120px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #495057 100%);
        }

        .btn-secondary:hover {
            box-shadow: 0 10px 25px rgba(108, 117, 125, 0.3);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }

        .btn-success:hover {
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 20px;
        }

        .editor-panel {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            border: 2px solid #e9ecef;
            transition: border-color 0.3s;
        }

        .editor-panel:hover {
            border-color: #dee2e6;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
        }

        .editor-title {
            font-weight: 600;
            color: #333;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .editor-title i {
            color: #ec4899;
        }

        .editor-textarea {
            width: 100%;
            flex: 1;
            min-height: 350px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            transition: all 0.3s;
            background: white;
        }

        .editor-textarea:focus {
            outline: none;
            border-color: #ec4899;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
        }

        .editor-textarea#output {
            background: #f8f9fa;
        }

        .status-box {
            background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%);
            border-left: 4px solid #10b981;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-box.error {
            background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
            border-left-color: #ef4444;
        }

        .status-box.active {
            display: block;
        }

        .status-box p {
            color: #065f46;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-box.error p {
            color: #7f1d1d;
        }

        .controls {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .control {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #333;
        }

        .control label {
            font-weight: 500;
        }

        .control input {
            padding: 8px 12px;
            border-radius: 8px;
            border: 2px solid #d0d7de;
            font-size: 14px;
            width: 120px;
        }

        .control input:focus {
            outline: none;
            border-color: #ec4899;
        }

        .char-count {
            text-align: right;
            font-size: 12px;
            color: #6c757d;
            margin-top: 5px;
            font-weight: 500;
        }

        @media (max-width: 900px) {
            .editor-container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .editor-textarea {
                min-height: 280px;
            }

            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .controls {
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 2rem;
            }

            .card {
                padding: 20px;
            }

            .btn-group {
                justify-content: center;
            }

            .btn {
                min-width: 110px;
                padding: 10px 20px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-exchange-alt"></i> JSON 转 XML</h1>
            <p>将 JSON 数据转换为格式良好的 XML</p>
        </div>

        <div class="card">
            <div class="status-box" id="status-box">
                <p id="status-message"><i class="fas fa-check-circle"></i> 已完成转换</p>
            </div>

            <div class="action-bar">
                <div class="btn-group">
                    <button class="btn" onclick="convert()">
                        <i class="fas fa-sync-alt"></i> 立即转换
                    </button>
                    <button class="btn btn-success" onclick="formatXML()">
                        <i class="fas fa-code"></i> 格式化 XML
                    </button>
                    <button class="btn btn-secondary" onclick="loadSample()">
                        <i class="fas fa-file-code"></i> 示例
                    </button>
                    <button class="btn btn-secondary" onclick="clearAll()">
                        <i class="fas fa-trash"></i> 清空
                    </button>
                </div>
                <div class="controls">
                    <div class="control">
                        <label for="rootName">根节点名称:</label>
                        <input type="text" id="rootName" value="root" placeholder="例如: root">
                    </div>
                </div>
            </div>

            <div class="editor-container">
                <div class="editor-panel">
                    <div class="editor-header">
                        <span class="editor-title"><i class="fas fa-download"></i> JSON 输入</span>
                        <span class="char-count" id="input-count">0 字符</span>
                    </div>
                    <textarea class="editor-textarea" id="input" placeholder='粘贴 JSON 数据...
例如：
{
  "user": {
    "name": "Alice",
    "age": 30,
    "roles": ["admin", "user"],
    "address": {
      "city": "Beijing",
      "country": "China"
    }
  }
}'></textarea>
                </div>

                <div class="editor-panel">
                    <div class="editor-header">
                        <span class="editor-title"><i class="fas fa-upload"></i> XML 输出</span>
                        <span class="char-count" id="output-count">0 字符</span>
                    </div>
                    <textarea class="editor-textarea" id="output" placeholder="转换后的 XML 将显示在这里..." readonly></textarea>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 更新字符计数
        function updateCharCount() {
            const input = document.getElementById('input');
            const output = document.getElementById('output');
            const inputCount = document.getElementById('input-count');
            const outputCount = document.getElementById('output-count');
            
            inputCount.textContent = input.value.length + ' 字符';
            outputCount.textContent = output.value.length + ' 字符';
        }

        // 初始化字符计数
        document.getElementById('input').addEventListener('input', updateCharCount);
        document.getElementById('output').addEventListener('input', updateCharCount);

        // 修复 JSON 转 XML 函数
        function jsonToXml(obj, nodeName = "root") {
            if (obj === null || obj === undefined) {
                return `<${nodeName}/>`;
            }
            
            if (typeof obj !== 'object') {
                return `<${nodeName}>${escapeXml(String(obj))}</${nodeName}>`;
            }
            
            if (Array.isArray(obj)) {
                return obj.map(item => jsonToXml(item, nodeName)).join("");
            }
            
            let xml = `<${nodeName}>`;
            
            for (const key in obj) {
                if (obj.hasOwnProperty(key)) {
                    const value = obj[key];
                    
                    if (value === null || value === undefined) {
                        xml += `<${key}/>`;
                    } else if (typeof value === 'object') {
                        if (Array.isArray(value)) {
                            // 处理数组
                            xml += value.map(item => jsonToXml(item, key)).join("");
                        } else {
                            // 处理嵌套对象
                            xml += jsonToXml(value, key);
                        }
                    } else {
                        // 处理基本类型
                        xml += `<${key}>${escapeXml(String(value))}</${key}>`;
                    }
                }
            }
            
            xml += `</${nodeName}>`;
            return xml;
        }

        function escapeXml(value) {
            return value.replace(/[<>&'"]/g, function(c) {
                return {
                    '<': '&lt;',
                    '>': '&gt;',
                    '&': '&amp;',
                    "'": '&apos;',
                    '"': '&quot;'
                }[c];
            });
        }

        // 格式化 XML
        function formatXml(xml, indent = 2) {
            let formatted = '';
            let indentLevel = 0;
            const spaces = ' '.repeat(indent);
            
            xml = xml.replace(/>\s+</g, '><').trim();
            
            for (let i = 0; i < xml.length; i++) {
                const char = xml[i];
                const nextChar = xml[i + 1];
                
                if (char === '<' && nextChar === '/') {
                    indentLevel--;
                    formatted += '\n' + spaces.repeat(indentLevel);
                } else if (char === '<') {
                    if (i > 0 && xml[i - 1] === '>') {
                        formatted += '\n' + spaces.repeat(indentLevel);
                    }
                }
                
                formatted += char;
                
                if (char === '>' && nextChar === '<' && xml[i + 2] !== '/') {
                    indentLevel++;
                }
            }
            
            return formatted;
        }

        function transform(input, rootName) {
            try {
                const obj = JSON.parse(input);
                const xml = jsonToXml(obj, rootName);
                return '<?xml version="1.0" encoding="UTF-8"?>\n' + formatXml(xml);
            } catch (error) {
                throw error;
            }
        }

        function convert() {
            const input = document.getElementById('input').value;
            const statusBox = document.getElementById('status-box');
            const statusMessage = document.getElementById('status-message');
            const output = document.getElementById('output');
            const rootName = document.getElementById('rootName').value.trim() || 'root';

            if (!input.trim()) {
                statusBox.className = 'status-box error active';
                statusMessage.innerHTML = '<i class="fas fa-exclamation-circle"></i> 请输入 JSON 内容再转换';
                output.value = '';
                updateCharCount();
                return;
            }

            try {
                const result = transform(input, rootName);
                output.value = result;
                statusBox.className = 'status-box active';
                statusMessage.innerHTML = '<i class="fas fa-check-circle"></i> 转换成功！';
                
                // 复制到剪贴板的提示
                setTimeout(() => {
                    statusBox.className = 'status-box';
                }, 3000);
            } catch (error) {
                statusBox.className = 'status-box error active';
                statusMessage.innerHTML = `<i class="fas fa-exclamation-circle"></i> 转换失败: ${error.message}`;
                output.value = '';
            }
            
            updateCharCount();
        }

        function formatXML() {
            const output = document.getElementById('output');
            const xml = output.value;
            
            if (!xml.trim()) {
                alert('请先转换 JSON 到 XML');
                return;
            }
            
            try {
                output.value = formatXml(xml, 2);
                showStatus('XML 格式化完成！', 'success');
            } catch (error) {
                showStatus('格式化失败: ' + error.message, 'error');
            }
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            document.getElementById('rootName').value = 'root';
            document.getElementById('status-box').classList.remove('active');
            updateCharCount();
        }

        function loadSample() {
            const sampleJSON = {
                "user": {
                    "name": "Alice",
                    "age": 30,
                    "email": "alice@example.com",
                    "active": true,
                    "roles": ["admin", "editor"],
                    "permissions": {
                        "read": true,
                        "write": true,
                        "delete": false
                    },
                    "profile": {
                        "bio": "Software Developer",
                        "skills": ["JavaScript", "Python", "Java"]
                    },
                    "metadata": null
                },
                "settings": {
                    "theme": "dark",
                    "notifications": true,
                    "language": "zh-CN"
                }
            };
            
            document.getElementById('input').value = JSON.stringify(sampleJSON, null, 2);
            convert();
        }

        function showStatus(message, type = 'success') {
            const statusBox = document.getElementById('status-box');
            const statusMessage = document.getElementById('status-message');
            
            statusBox.className = `status-box ${type === 'error' ? 'error' : ''} active`;
            statusMessage.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
            
            setTimeout(() => {
                statusBox.classList.remove('active');
            }, 3000);
        }

        // 初始化时更新字符计数
        document.addEventListener('DOMContentLoaded', updateCharCount);
    </script>
</body>
</html>
