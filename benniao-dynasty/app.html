            },

                endYear: 1949,
                capital: "南京",

            {

                period: "1949-",
                startYear: 1949,
                endYear: 9999, // 用大数表示现代

        // DOM元素
        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const resultCount = document.getElementById('resultCount');
        const sortButtons = document.querySelectorAll('.sort-btn');
        const tableHeaders = document.querySelectorAll('th[data-sort]');
        
        let currentData = [...dynastyData];
        let currentSort = 'dynasty';
        let sortDirection = 'asc';
        
        // 初始化表格
        function renderTable(data) {
            tableBody.innerHTML = '';
            
            data.forEach(item => {
                const row = document.createElement('tr');
                
                // 创建朝代名称单元格
                const dynastyCell = document.createElement('td');
                dynastyCell.innerHTML = `<div class="dynasty-name">${item.dynasty}</div>`;
                
                // 创建起止时间单元格
                const periodCell = document.createElement('td');
                periodCell.innerHTML = `<div class="period">${item.period}</div>`;
                
                // 创建都城单元格
                const capitalCell = document.createElement('td');
                capitalCell.innerHTML = `<div class="capital">${item.capital}</div>`;
                
                // 创建现代地名单元格
                const modernCell = document.createElement('td');
                modernCell.innerHTML = `<div class="modern-name">${item.modern}</div>`;
                if (item.note) {
                    modernCell.innerHTML += `<div class="note">${item.note}</div>`;
                }
                
                // 将单元格添加到行
                row.appendChild(dynastyCell);
                row.appendChild(periodCell);
                row.appendChild(capitalCell);
                row.appendChild(modernCell);
                
                // 将行添加到表格
                tableBody.appendChild(row);
            });
            
            // 更新结果计数
            resultCount.textContent = data.length;
        }
        
        // 搜索功能
        function filterData(searchTerm) {
            if (!searchTerm) {
                return [...dynastyData];
            }
            
            const term = searchTerm.toLowerCase();
            return dynastyData.filter(item => 
                item.dynasty.toLowerCase().includes(term) ||
                item.period.toLowerCase().includes(term) ||
                item.capital.toLowerCase().includes(term) ||
                item.modern.toLowerCase().includes(term)
            );
        }
        
        // 排序功能
        function sortData(data, sortBy, direction) {
            return [...data].sort((a, b) => {
                let aValue, bValue;
                
                switch(sortBy) {
                    case 'dynasty':
                        aValue = a.dynasty;
                        bValue = b.dynasty;
                        break;
                    case 'start':
                        aValue = a.startYear;
                        bValue = b.startYear;
                        break;
                    case 'end':
                        aValue = a.endYear;
                        bValue = b.endYear;
                        break;
                    case 'capital':
                        aValue = a.capital;
                        bValue = b.capital;
                        break;
                    case 'modern':
                        aValue = a.modern;
                        bValue = b.modern;
                        break;
                    default:
                        aValue = a.dynasty;
                        bValue = b.dynasty;
                }
                
                // 如果是数字排序
                if (sortBy === 'start' || sortBy === 'end') {
                    return direction === 'asc' ? aValue - bValue : bValue - aValue;
                }
                
                // 如果是字符串排序
                if (direction === 'asc') {
                    return aValue.localeCompare(bValue, 'zh-CN');
                } else {
                    return bValue.localeCompare(aValue, 'zh-CN');
                }
            });
        }
        
        // 更新排序按钮状态
        function updateSortButtons(activeSort) {
            sortButtons.forEach(btn => {
                if (btn.dataset.sort === activeSort) {
                    btn.classList.add('active');
                    
                    // 更新排序图标
                    const icon = btn.querySelector('i');
                    if (sortDirection === 'asc') {
                        if (btn.dataset.sort === 'dynasty') {
                            icon.className = 'fas fa-sort-alpha-down';
                        } else {
                            icon.className = 'fas fa-sort-numeric-down';
                        }
                    } else {
                        if (btn.dataset.sort === 'dynasty') {
                            icon.className = 'fas fa-sort-alpha-up';
                        } else {
                            icon.className = 'fas fa-sort-numeric-up';
                        }
                    }
                } else {
                    btn.classList.remove('active');
                    // 重置其他按钮的图标
                    const icon = btn.querySelector('i');
                    if (btn.dataset.sort === 'dynasty') {
                        icon.className = 'fas fa-sort-alpha-down';
                    } else {
                        icon.className = 'fas fa-sort-numeric-down';
                    }
                }
            });
        }
        
        // 更新表头排序指示器
        function updateHeaderIndicators() {
            tableHeaders.forEach(header => {
                const icon = header.querySelector('i');
                if (header.dataset.sort === currentSort) {
                    if (sortDirection === 'asc') {
                        if (header.dataset.sort === 'dynasty') {
                            icon.className = 'fas fa-sort-alpha-down';
                        } else {
                            icon.className = 'fas fa-sort-numeric-down';
                        }
                    } else {
                        if (header.dataset.sort === 'dynasty') {
                            icon.className = 'fas fa-sort-alpha-up';
                        } else {
                            icon.className = 'fas fa-sort-numeric-up';
                        }
                    }
                } else {
                    icon.className = 'fas fa-sort';
                }
            });
        }
        
        // 处理搜索
        searchInput.addEventListener('input', function() {
            currentData = filterData(this.value);
            currentData = sortData(currentData, currentSort, sortDirection);
            renderTable(currentData);
        });
        
        // 处理排序按钮点击
        sortButtons.forEach(button => {
            button.addEventListener('click', function() {
                const sortBy = this.dataset.sort;
                
                // 如果点击的是当前排序按钮，则切换方向
                if (sortBy === currentSort) {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSort = sortBy;
                    sortDirection = 'asc';
                }
                
                // 更新数据
                currentData = sortData(currentData, currentSort, sortDirection);
                renderTable(currentData);
                
                // 更新UI
                updateSortButtons(currentSort);
                updateHeaderIndicators();
            });
        });
        
        // 处理表头点击排序
        tableHeaders.forEach(header => {
            header.addEventListener('click', function() {
                const sortBy = this.dataset.sort;
                
                // 如果点击的是当前排序表头，则切换方向
                if (sortBy === currentSort) {
                    sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSort = sortBy;
                    sortDirection = 'asc';
                }
                
                // 更新数据
                currentData = sortData(currentData, currentSort, sortDirection);
                renderTable(currentData);
                
                // 更新UI
                updateSortButtons(currentSort);
                updateHeaderIndicators();
            });
        });
        
        // 初始渲染
        currentData = sortData(dynastyData, currentSort, sortDirection);
        renderTable(currentData);
        updateSortButtons(currentSort);
        updateHeaderIndicators();
    </script>
</body>
</html>
