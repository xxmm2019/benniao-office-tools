<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科学计算器 - 多功能数学工具- 笨鸟办公工具集箱</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"
     crossorigin="anonymous"></script>
    <link rel="canonical" href="https://www.benniaooffice.com/tools/benniao-keyboard/">
    <!-- 简化CSS样式，减少外部依赖 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 使用轻量级库 -->
    <script src="https://cdn.jsdelivr.net/npm/mathjs@11.8.0/lib/browser/math.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* 简化CSS样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            color: #333;
            line-height: 1.5;
            padding: 15px;
            min-height: 100vh;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #4a6fa5;
        }

        header h1 {
            color: #166088;
            margin-bottom: 8px;
            font-size: 2rem;
        }

        .app-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 992px) {
            .app-container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: white;
            border-radius: 6px;
            box-shadow: 0 3px 5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .panel-header {
            background-color: #4a6fa5;
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .panel-body {
            padding: 15px;
            height: 450px;
            overflow-y: auto;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            border-bottom: 1px solid #dee2e6;
            margin-bottom: 15px;
        }

        .tab {
            padding: 8px 15px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
            color: #666;
            position: relative;
        }

        .tab:hover {
            color: #4a6fa5;
        }

        .tab.active {
            color: #4a6fa5;
            font-weight: 600;
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #4a6fa5;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .calculator-display {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 15px;
            min-height: 90px;
            font-family: 'Courier New', monospace;
            overflow-x: auto;
        }

        .display-input {
            font-size: 1.1rem;
            color: #666;
            min-height: 25px;
            word-wrap: break-word;
        }

        .display-result {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: right;
            color: #333;
            margin-top: 8px;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        @media (max-width: 768px) {
            .keypad {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .key {
            padding: 12px 8px;
            border: none;
            border-radius: 6px;
            background-color: #f8f9fa;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 500;
        }

        .key:hover {
            background-color: #e9ecef;
        }

        .key.number {
            background-color: white;
            border: 1px solid #dee2e6;
        }

        .key.operation {
            background-color: #4a6fa5;
            color: white;
        }

        .key.function {
            background-color: #17a2b8;
            color: white;
        }

        .key.special {
            background-color: #343a40;
            color: white;
        }

        .key.equals {
            background-color: #28a745;
            color: white;
            grid-column: span 2;
        }

        .key.clear {
            background-color: #dc3545;
            color: white;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            outline: none;
            border-color: #4a6fa5;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .btn-primary {
            background-color: #4a6fa5;
            color: white;
        }

        .btn-primary:hover {
            background-color: #3d5c8a;
        }

        .chart-container {
            height: 350px;
            margin-top: 15px;
            position: relative;
        }

        .history-item {
            padding: 8px 12px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }

        .history-item:hover {
            background-color: #f8f9fa;
        }

        .history-expression {
            font-weight: 500;
            color: #333;
        }

        .history-result {
            color: #4a6fa5;
            font-weight: 600;
            text-align: right;
        }

        .history-time {
            font-size: 0.75rem;
            color: #999;
        }

        .footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #dee2e6;
            color: #666;
            font-size: 0.85rem;
        }

        .shortcuts {
            background-color: white;
            border-radius: 6px;
            box-shadow: 0 3px 5px rgba(0, 0, 0, 0.1);
            padding: 15px;
            margin-top: 20px;
        }

        .shortcuts h3 {
            color: #166088;
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .shortcut-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px dashed #eee;
        }

        .shortcut-key {
            background-color: #f8f9fa;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            border: 1px solid #dee2e6;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background-color: white;
            padding: 8px 15px;
            border-radius: 6px;
            box-shadow: 0 3px 5px rgba(0, 0, 0, 0.1);
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        .auto-save {
            color: #28a745;
        }

        .export-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .export-btn {
            background-color: #6c757d;
            color: white;
            font-size: 0.85rem;
            padding: 6px 12px;
        }

        @media (max-width: 576px) {
            body {
                padding: 10px;
            }
            
            .panel-body {
                height: 380px;
            }
            
            .key {
                padding: 10px 5px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-calculator"></i> 科学计算器</h1>
            <p>支持算术、函数、矩阵、单位转换、货币换算、图表绘制等功能</p>
        </header>

        <div class="status-bar">
            <div>科学计算器 </div>
            <div class="auto-save">
                <i class="fas fa-save"></i> 自动保存已启用
            </div>
        </div>

        <div class="app-container">
            <!-- 左侧面板：计算器和输入 -->
            <div class="panel">
                <div class="panel-header">
                    <h2><i class="fas fa-keyboard"></i> 计算器</h2>
                    <button class="btn btn-primary" id="clear-history">
                        <i class="fas fa-trash"></i> 清除历史
                    </button>
                </div>
                <div class="panel-body">
                    <div class="tabs">
                        <button class="tab active" data-tab="basic">基本计算</button>
                        <button class="tab" data-tab="functions">函数绘图</button>
                        <button class="tab" data-tab="matrix">矩阵/向量</button>
                        <button class="tab" data-tab="units">单位转换</button>
                        <button class="tab" data-tab="currency">货币换算</button>
                        <button class="tab" data-tab="custom">自定义</button>
                    </div>

                    <!-- 基本计算标签页 -->
                    <div class="tab-content active" id="basic-tab">
                        <div class="calculator-display">
                            <div class="display-input" id="display-input">输入表达式...</div>
                            <div class="display-result" id="display-result">0</div>
                        </div>
                        
                        <div class="keypad">
                            <button class="key special" data-action="clear">C</button>
                            <button class="key special" data-action="backspace">⌫</button>
                            <button class="key function" data-value="sqrt">√</button>
                            <button class="key function" data-value="^">^</button>
                            <button class="key function" data-value="pi">π</button>
                            
                            <button class="key function" data-value="sin">sin</button>
                            <button class="key function" data-value="cos">cos</button>
                            <button class="key function" data-value="tan">tan</button>
                            <button class="key operation" data-value="/">/</button>
                            <button class="key function" data-value="log">log</button>
                            
                            <button class="key number" data-value="7">7</button>
                            <button class="key number" data-value="8">8</button>
                            <button class="key number" data-value="9">9</button>
                            <button class="key operation" data-value="*">×</button>
                            <button class="key function" data-value="ln">ln</button>
                            
                            <button class="key number" data-value="4">4</button>
                            <button class="key number" data-value="5">5</button>
                            <button class="key number" data-value="6">6</button>
                            <button class="key operation" data-value="-">-</button>
                            <button class="key function" data-value="e">e</button>
                            
                            <button class="key number" data-value="1">1</button>
                            <button class="key number" data-value="2">2</button>
                            <button class="key number" data-value="3">3</button>
                            <button class="key operation" data-value="+">+</button>
                            <button class="key function" data-value="(">(</button>
                            
                            <button class="key number" data-value="0">0</button>
                            <button class="key number" data-value=".">.</button>
                            <button class="key equals" data-action="calculate">=</button>
                            <button class="key function" data-value=")">)</button>
                            <button class="key function" data-value="!">!</button>
                        </div>
                        
                        <div class="form-group" style="margin-top: 15px;">
                            <label for="manual-input"><i class="fas fa-keyboard"></i> 直接输入表达式:</label>
                            <input type="text" class="form-control" id="manual-input" placeholder="例如: sin(pi/4) + 2^3 * sqrt(9)">
                        </div>
                    </div>

                    <!-- 函数绘图标签页 -->
                    <div class="tab-content" id="functions-tab">
                        <div class="form-group">
                            <label for="function-input">函数表达式 (使用 x 作为变量):</label>
                            <input type="text" class="form-control" id="function-input" placeholder="例如: sin(x) + x^2">
                        </div>
                        
                        <div class="form-group">
                            <label for="x-min">X 最小值:</label>
                            <input type="number" class="form-control" id="x-min" value="-10" step="1">
                        </div>
                        
                        <div class="form-group">
                            <label for="x-max">X 最大值:</label>
                            <input type="number" class="form-control" id="x-max" value="10" step="1">
                        </div>
                        
                        <button class="btn btn-primary" id="plot-function">
                            <i class="fas fa-chart-line"></i> 绘制函数图像
                        </button>
                        
                        <div class="chart-container">
                            <canvas id="function-chart"></canvas>
                        </div>
                    </div>

                    <!-- 矩阵/向量标签页 -->
                    <div class="tab-content" id="matrix-tab">
                        <div class="form-group">
                            <label>矩阵运算:</label>
                            <select class="form-control" id="matrix-operation">
                                <option value="add">矩阵加法</option>
                                <option value="multiply">矩阵乘法</option>
                                <option value="transpose">矩阵转置</option>
                                <option value="det">矩阵行列式</option>
                                <option value="inverse">矩阵求逆</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="matrix-a">矩阵 A (例如: [[1,2],[3,4]]):</label>
                            <textarea class="form-control" id="matrix-a" rows="3">[[1,2,3],[4,5,6],[7,8,9]]</textarea>
                        </div>
                        
                        <div class="form-group" id="matrix-b-group">
                            <label for="matrix-b">矩阵 B (例如: [[5,6],[7,8]]):</label>
                            <textarea class="form-control" id="matrix-b" rows="3">[[9,8,7],[6,5,4],[3,2,1]]</textarea>
                        </div>
                        
                        <button class="btn btn-primary" id="calculate-matrix">
                            <i class="fas fa-calculator"></i> 计算
                        </button>
                        
                        <div class="form-group" style="margin-top: 15px;">
                            <label>结果:</label>
                            <div class="form-control" id="matrix-result" style="min-height: 80px;">
                                结果将显示在这里
                            </div>
                        </div>
                    </div>

                    <!-- 单位转换标签页 -->
                    <div class="tab-content" id="units-tab">
                        <div class="form-group">
                            <label for="unit-type">转换类型:</label>
                            <select class="form-control" id="unit-type">
                                <option value="length">长度</option>
                                <option value="area">面积</option>
                                <option value="volume">体积</option>
                                <option value="temperature">温度</option>
                                <option value="time">时间</option>
                                <option value="speed">速度</option>
                                <option value="pressure">压力</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="unit-value">数值:</label>
                            <input type="number" class="form-control" id="unit-value" value="1" step="any">
                        </div>
                        
                        <div class="form-group">
                            <label for="unit-from">从单位:</label>
                            <select class="form-control" id="unit-from">
                                <option value="m">米 (m)</option>
                                <option value="km">千米 (km)</option>
                                <option value="cm">厘米 (cm)</option>
                                <option value="mm">毫米 (mm)</option>
                                <option value="in">英寸 (in)</option>
                                <option value="ft">英尺 (ft)</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="unit-to">到单位:</label>
                            <select class="form-control" id="unit-to">
                                <option value="m">米 (m)</option>
                                <option value="km">千米 (km)</option>
                                <option value="cm">厘米 (cm)</option>
                                <option value="mm">毫米 (mm)</option>
                                <option value="in">英寸 (in)</option>
                                <option value="ft">英尺 (ft)</option>
                            </select>
                        </div>
                        
                        <button class="btn btn-primary" id="convert-units">
                            <i class="fas fa-exchange-alt"></i> 转换
                        </button>
                        
                        <div class="form-group" style="margin-top: 15px;">
                            <label>结果:</label>
                            <div class="form-control" id="unit-result" style="min-height: 60px;">
                                转换结果将显示在这里
                            </div>
                        </div>
                    </div>

                    <!-- 货币换算标签页 -->
                    <div class="tab-content" id="currency-tab">
                        <div id="currency-content">
                            <div class="form-group">
                                <label for="currency-amount">金额:</label>
                                <input type="number" class="form-control" id="currency-amount" value="1" step="0.01">
                            </div>
                            
                            <div class="form-group">
                                <label for="currency-from">从货币:</label>
                                <select class="form-control" id="currency-from">
                                    <option value="USD">美元 (USD)</option>
                                    <option value="EUR">欧元 (EUR)</option>
                                    <option value="GBP">英镑 (GBP)</option>
                                    <option value="JPY">日元 (JPY)</option>
                                    <option value="CNY">人民币 (CNY)</option>
                                </select>
                            </div>
                            
                            <div class="form-group">
                                <label for="currency-to">到货币:</label>
                                <select class="form-control" id="currency-to">
                                    <option value="USD">美元 (USD)</option>
                                    <option value="EUR">欧元 (EUR)</option>
                                    <option value="GBP">英镑 (GBP)</option>
                                    <option value="JPY">日元 (JPY)</option>
                                    <option value="CNY">人民币 (CNY)</option>
                                </select>
                            </div>
                            
                            <button class="btn btn-primary" id="convert-currency">
                                <i class="fas fa-exchange-alt"></i> 换算
                            </button>
                            
                            <div class="form-group" style="margin-top: 15px;">
                                <label>结果:</label>
                                <div class="form-control" id="currency-result" style="min-height: 60px;">
                                    换算结果将显示在这里
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 自定义标签页 -->
                    <div class="tab-content" id="custom-tab">
                        <div class="form-group">
                            <label for="custom-vars">自定义变量 (格式: 变量名=值, 每行一个):</label>
                            <textarea class="form-control" id="custom-vars" rows="3" placeholder="例如:
radius=5
height=10
pi=3.14159"></textarea>
                        </div>
                        
                        <div class="form-group">
                            <label for="custom-func">自定义函数 (格式: 函数名(参数)=表达式):</label>
                            <textarea class="form-control" id="custom-func" rows="3" placeholder="例如:
circleArea(r)=pi*r^2
cylinderVolume(r,h)=circleArea(r)*h"></textarea>
                        </div>
                        
                        <button class="btn btn-primary" id="save-custom">
                            <i class="fas fa-save"></i> 保存自定义函数/变量
                        </button>
                        
                        <div class="form-group" style="margin-top: 15px;">
                            <label>使用自定义函数/变量:</label>
                            <input type="text" class="form-control" id="custom-use" placeholder="例如: cylinderVolume(radius, height)">
                            <button class="btn btn-primary" style="margin-top: 8px;" id="calculate-custom">
                                <i class="fas fa-calculator"></i> 计算
                            </button>
                        </div>
                        
                        <div class="form-group" style="margin-top: 15px;">
                            <label>结果:</label>
                            <div class="form-control" id="custom-result" style="min-height: 60px;">
                                结果将显示在这里
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧面板：历史记录和输出 -->
            <div class="panel">
                <div class="panel-header">
                    <h2><i class="fas fa-history"></i> 历史记录</h2>
                    <div class="export-options">
                        <button class="btn export-btn" id="export-txt">
                            <i class="fas fa-file-alt"></i> TXT
                        </button>
                        <button class="btn export-btn" id="export-json">
                            <i class="fas fa-file-code"></i> JSON
                        </button>
                    </div>
                </div>
                <div class="panel-body">
                    <div id="history-list">
                        <!-- 历史记录将通过JavaScript动态添加 -->
                        <div class="history-item">
                            <div class="history-expression">sin(pi/4)</div>
                            <div class="history-result">0.7071067811865475</div>
                            <div class="history-time">示例记录</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 快捷键说明 -->
        <div class="shortcuts">
            <h3><i class="fas fa-keyboard"></i> 键盘快捷键</h3>
            <div class="shortcut-item">
                <span>Enter / =</span>
                <span class="shortcut-key">执行计算</span>
            </div>
            <div class="shortcut-item">
                <span>Esc</span>
                <span class="shortcut-key">清除输入</span>
            </div>
            <div class="shortcut-item">
                <span>Backspace</span>
                <span class="shortcut-key">删除上一个字符</span>
            </div>
            <div class="shortcut-item">
                <span>Ctrl + S</span>
                <span class="shortcut-key">保存状态</span>
            </div>
            <div class="shortcut-item">
                <span>Ctrl + L</span>
                <span class="shortcut-key">清除历史</span>
            </div>
        </div>

        <div class="footer"> 
        </div>
    </div>

    <script>
        // 简化后的代码 - 移除了多语言功能，优化了性能
        let calculationHistory = [];
        let customVariables = {};
        let customFunctions = {};
        let currencyRates = {};
        let functionChart = null;
        
        // 缓存常用DOM元素
        const elements = {
            displayInput: document.getElementById('display-input'),
            displayResult: document.getElementById('display-result'),
            manualInput: document.getElementById('manual-input'),
            historyList: document.getElementById('history-list'),
            matrixResult: document.getElementById('matrix-result'),
            unitResult: document.getElementById('unit-result'),
            currencyResult: document.getElementById('currency-result'),
            customResult: document.getElementById('custom-result')
        };

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            initUI();
            loadSavedData();
            initCurrencyRates();
            setupEventListeners();
        });

        // 初始化UI
        function initUI() {
            // 设置标签页切换
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {

                    // 移除所有标签的active类
                    tabs.forEach(t => t.classList.remove('active'));
                    // 添加当前标签的active类
                    this.classList.add('active');
                    
                    // 隐藏所有标签内容
                    document.querySelectorAll('.tab-content').forEach(content => {
                        content.classList.remove('active');
                    });
                    
                    // 显示当前标签内容
                    const tabContent = document.getElementById(`${tabId}-tab`);
                    if (tabContent) {
                        tabContent.classList.add('active');
                        
                        // 如果是函数绘图标签页，初始化图表
                        if (tabId === 'functions' && !functionChart) {
                            setTimeout(initChart, 50);
                        }
                    }
                });
            });
            
            // 矩阵操作类型改变时更新UI

            if (matrixOperation) {
                matrixOperation.addEventListener('change', function() {
                    const operation = this.value;

        // 处理计算器按键点击
        function handleKeyClick() {
            const value = this.getAttribute('data-value');
            const action = this.getAttribute('data-action');
            
            if (action === 'clear') {
                clearDisplay();
            } else if (action === 'backspace') {
                backspace();
            } else if (action === 'calculate') {
                calculateCurrentExpression();
            } else if (value) {
                addToDisplay(value);
            }
        }

        // 处理键盘快捷键
        function handleKeyboardShortcuts(e) {
            // Enter 或 = 执行计算
            if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculateCurrentExpression();
            }
            
            // Esc 清除输入
            if (e.key === 'Escape') {
                e.preventDefault();
                clearDisplay();
            }
            
            // Backspace 删除上一个字符
            if (e.key === 'Backspace' && !e.ctrlKey) {
                e.preventDefault();
                backspace();
            }
            
            // Ctrl + S 保存当前状态
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                saveCurrentState();
            }
            
            // Ctrl + L 清除历史
            if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                clearHistory();
            }
            
            // 数字和运算符输入
            if (/[\d+\-*/.^()!]/.test(e.key) && !e.ctrlKey && !e.altKey) {
                addToDisplay(e.key);
            }
        }

        // 添加到显示
        function addToDisplay(value) {
            if (!elements.displayInput) return;
            
            const currentText = elements.displayInput.textContent;
            
            if (currentText === '输入表达式...') {
                elements.displayInput.textContent = value;
            } else {
                elements.displayInput.textContent += value;
            }
        }

        // 清除显示
        function clearDisplay() {
            if (elements.displayInput) elements.displayInput.textContent = '输入表达式...';
            if (elements.displayResult) elements.displayResult.textContent = '0';
        }

        // 退格
        function backspace() {
            if (!elements.displayInput) return;
            
            const currentText = elements.displayInput.textContent;
            
            if (currentText.length > 0 && currentText !== '输入表达式...') {
                elements.displayInput.textContent = currentText.slice(0, -1);
                
                if (elements.displayInput.textContent.length === 0) {
                    elements.displayInput.textContent = '输入表达式...';
                }
            }
        }

        // 计算当前表达式
        function calculateCurrentExpression() {
            if (!elements.displayInput) return;
            
            const expression = elements.displayInput.textContent;
            
            if (expression && expression !== '输入表达式...') {
                calculateExpression(expression);
            }
        }

        // 计算表达式
        function calculateExpression(expression) {
            try {
                // 替换自定义函数和变量
                let processedExpression = expression;
                
                // 替换自定义变量
                for (const [varName, varValue] of Object.entries(customVariables)) {
                    const regex = new RegExp(`\\b${varName}\\b`, 'g');
                    processedExpression = processedExpression.replace(regex, varValue);
                }
                
                // 使用math.js计算
                const result = math.evaluate(processedExpression);
                
                // 格式化结果
                let formattedResult;
                if (Math.abs(result) > 1e6 || (Math.abs(result) < 1e-6 && result !== 0)) {
                    formattedResult = result.toExponential(6);
                } else {
                    formattedResult = Number(result.toFixed(10)).toString();
                }
                
                // 更新显示
                if (elements.displayResult) {
                    elements.displayResult.textContent = formattedResult;
                }
                
                // 添加到历史记录
                addToHistory(expression, result);
                
                // 更新手动输入框
                if (elements.manualInput) {
                    elements.manualInput.value = expression;
                }
                
                // 保存最后输入
                localStorage.setItem('lastInput', expression);
                
            } catch (error) {
                if (elements.displayResult) {
                    elements.displayResult.textContent = '错误: ' + error.message;
                }
            }
        }

        // 添加到历史记录
        function addToHistory(expression, result) {
            const historyItem = {
                expression,
                result,
                timestamp: new Date().toLocaleTimeString()
            };
            
            calculationHistory.unshift(historyItem);
            
            // 限制历史记录数量
            if (calculationHistory.length > 50) {
                calculationHistory.pop();
            }
            
            // 更新显示
            updateHistoryDisplay();
            
            // 保存到localStorage
            localStorage.setItem('calculatorHistory', JSON.stringify(calculationHistory));
        }

        // 更新历史记录显示
        function updateHistoryDisplay() {
            if (!elements.historyList) return;
            
            elements.historyList.innerHTML = '';
            
            if (calculationHistory.length === 0) {
                elements.historyList.innerHTML = '<div class="history-item"><div class="history-expression">暂无计算历史</div></div>';
                return;
            }
            
            calculationHistory.forEach((item, index) => {
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                historyItem.innerHTML = `
                    <div class="history-expression">${item.expression}</div>
                    <div class="history-result">${formatResult(item.result)}</div>
                    <div class="history-time">${item.timestamp}</div>
                `;
                
                // 点击历史记录项可重新计算
                historyItem.addEventListener('click', () => {
                    if (elements.manualInput) elements.manualInput.value = item.expression;
                    if (elements.displayInput) elements.displayInput.textContent = item.expression;
                    if (elements.displayResult) elements.displayResult.textContent = formatResult(item.result);
                });
                
                elements.historyList.appendChild(historyItem);
            });
        }

        // 格式化结果
        function formatResult(result) {
            if (typeof result === 'number') {
                if (Math.abs(result) > 1e6 || (Math.abs(result) < 1e-6 && result !== 0)) {
                    return result.toExponential(6);
                } else {
                    return Number(result.toFixed(10)).toString();
                }
            }
            return result.toString();
        }

        // 清除历史记录
        function clearHistory() {
            calculationHistory = [];
            updateHistoryDisplay();
            localStorage.removeItem('calculatorHistory');
        }

        // 绘制函数图像
        function plotFunction() {
            const funcExpr = document.getElementById('function-input').value;
            const xMin = parseFloat(document.getElementById('x-min').value);
            const xMax = parseFloat(document.getElementById('x-max').value);
            
            if (!funcExpr || !funcExpr.includes('x')) {
                alert('请输入包含变量x的函数表达式');
                return;
            }
            
            // 确保图表已初始化
            if (!functionChart) {
                initChart();
                if (!functionChart) {
                    alert('图表初始化失败，请刷新页面重试');
                    return;
                }
            }
            
            // 生成数据点
            const step = (xMax - xMin) / 100;
            const labels = [];
            const data = [];
            
            for (let x = xMin; x <= xMax; x += step) {
                try {
                    // 替换x的值并计算
                    const expr = funcExpr.replace(/x/g, `(${x})`);
                    const y = math.evaluate(expr);
                    
                    labels.push(x.toFixed(2));
                    data.push(y);
                } catch (error) {
                    // 如果计算出错，跳过该点
                    labels.push(x.toFixed(2));
                    data.push(null);
                }
            }
            
            // 更新图表
            functionChart.data.labels = labels;
            functionChart.data.datasets[0].data = data;
            functionChart.data.datasets[0].label = `f(x) = ${funcExpr}`;
            functionChart.update();
        }

        // 计算矩阵
        function calculateMatrix() {
            const operation = document.getElementById('matrix-operation').value;
            const matrixAStr = document.getElementById('matrix-a').value;
            
            try {
                // 解析矩阵A
                const matrixA = math.evaluate(matrixAStr);
                let result;
                
                // 执行矩阵运算
                switch(operation) {
                    case 'add':
                        const matrixBStr = document.getElementById('matrix-b').value;
                        const matrixB = math.evaluate(matrixBStr);
                        result = math.add(matrixA, matrixB);
                        break;
                    case 'multiply':
                        const matrixBStr2 = document.getElementById('matrix-b').value;
                        const matrixB2 = math.evaluate(matrixBStr2);
                        result = math.multiply(matrixA, matrixB2);
                        break;
                    case 'transpose':
                        result = math.transpose(matrixA);
                        break;
                    case 'det':
                        result = math.det(matrixA);
                        break;
                    case 'inverse':
                        result = math.inv(matrixA);
                        break;
                    default:
                        result = '未知操作';
                }
                
                // 显示结果
                if (elements.matrixResult) {
                    elements.matrixResult.textContent = math.format(result, {precision: 10});
                }
                
                // 添加到历史记录
                addToHistory(`${operation}(${matrixAStr})`, result);
                
            } catch (error) {
                if (elements.matrixResult) {
                    elements.matrixResult.textContent = '错误: ' + error.message;
                }
            }
        }

        // 单位转换
        function convertUnits() {
            const unitType = document.getElementById('unit-type').value;
            const value = parseFloat(document.getElementById('unit-value').value);
            const fromUnit = document.getElementById('unit-from').value;
            const toUnit = document.getElementById('unit-to').value;
            
            try {
                let result;
                
                // 基础转换因子
                const conversionFactors = {
                    length: {
                        'm': 1,
                        'km': 1000,
                        'cm': 0.01,
                        'mm': 0.001,
                        'in': 0.0254,
                        'ft': 0.3048
                    },
                    area: {
                        'm2': 1,
                        'km2': 1000000,
                        'cm2': 0.0001,
                        'in2': 0.00064516,
                        'ft2': 0.092903
                    },
                    volume: {
                        'm3': 1,
                        'L': 0.001,
                        'mL': 0.000001,
                        'in3': 0.0000163871,
                        'ft3': 0.0283168
                    }
                };
                
                if (conversionFactors[unitType] && 
                    conversionFactors[unitType][fromUnit] && 
                    conversionFactors[unitType][toUnit]) {
                    
                    // 转换为基准单位，然后再转换为目标单位
                    const baseValue = value * conversionFactors[unitType][fromUnit];
                    result = baseValue / conversionFactors[unitType][toUnit];
                    
                    if (elements.unitResult) {
                        elements.unitResult.textContent = `${value} ${fromUnit} = ${result.toFixed(6)} ${toUnit}`;
                    }
                        
                    // 添加到历史记录
                    addToHistory(`${value} ${fromUnit} to ${toUnit}`, result);
                } else if (unitType === 'temperature') {
                    // 温度转换
                    result = convertTemperature(value, fromUnit, toUnit);
                    if (elements.unitResult) {
                        elements.unitResult.textContent = `${value} °${fromUnit} = ${result.toFixed(2)} °${toUnit}`;
                    }
                        
                    // 添加到历史记录
                    addToHistory(`${value} °${fromUnit} to °${toUnit}`, result);
                } else {
                    if (elements.unitResult) {
                        elements.unitResult.textContent = '该单位类型转换尚未实现';
                    }
                }
            } catch (error) {
                if (elements.unitResult) {
                    elements.unitResult.textContent = '错误: ' + error.message;
                }
            }
        }

        // 温度转换
        function convertTemperature(value, fromUnit, toUnit) {
            // 转换为摄氏度为基准
            let celsius;
            
            switch(fromUnit) {
                case 'C':
                    celsius = value;
                    break;
                case 'F':
                    celsius = (value - 32) * 5/9;
                    break;
                case 'K':
                    celsius = value - 273.15;
                    break;
                default:
                    return NaN;
            }
            
            // 从摄氏度转换为目标单位
            switch(toUnit) {
                case 'C':
                    return celsius;
                case 'F':
                    return celsius * 9/5 + 32;
                case 'K':
                    return celsius + 273.15;
                default:
                    return NaN;
            }
        }

        // 货币换算
        function convertCurrency() {
            const amount = parseFloat(document.getElementById('currency-amount').value);
            const fromCurrency = document.getElementById('currency-from').value;
            const toCurrency = document.getElementById('currency-to').value;
            
            if (!currencyRates[fromCurrency] || !currencyRates[toCurrency]) {
                if (elements.currencyResult) {
                    elements.currencyResult.textContent = '汇率数据不可用';
                }
                return;
            }
            
            // 转换为美元，然后转换为目标货币
            const amountInUSD = amount / currencyRates[fromCurrency];
            const result = amountInUSD * currencyRates[toCurrency];
            
            if (elements.currencyResult) {
                elements.currencyResult.textContent = `${amount.toFixed(2)} ${fromCurrency} = ${result.toFixed(2)} ${toCurrency}`;
            }
                
            // 添加到历史记录
            addToHistory(`${amount} ${fromCurrency} to ${toCurrency}`, result);
        }

        // 保存自定义函数和变量
        function saveCustom() {
            const varsText = document.getElementById('custom-vars').value;
            const funcsText = document.getElementById('custom-func').value;
            
            // 解析变量
            const varsLines = varsText.split('\n').filter(line => line.trim() !== '');
            varsLines.forEach(line => {
                const parts = line.split('=');
                if (parts.length === 2) {
                    const varName = parts[0].trim();
                    const varValue = parts[1].trim();
                    
                    try {
                        // 验证值是否有效
                        const evaluatedValue = math.evaluate(varValue);
                        customVariables[varName] = evaluatedValue;
                    } catch (error) {
                        console.error(`变量 ${varName} 解析错误:`, error);
                    }
                }
            });
            
            // 解析函数
            const funcsLines = funcsText.split('\n').filter(line => line.trim() !== '');
            funcsLines.forEach(line => {
                const match = line.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\(([^)]*)\)\s*=\s*(.+)$/);
                if (match) {
                    const funcName = match[1];
                    const funcBody = match[3];
                    
                    customFunctions[funcName] = funcBody;
                }
            });
            
            // 保存到localStorage
            localStorage.setItem('customVariables', JSON.stringify(customVariables));
            localStorage.setItem('customFunctions', JSON.stringify(customFunctions));
            
            if (elements.customResult) {
                elements.customResult.textContent = `已保存 ${Object.keys(customVariables).length} 个变量和 ${Object.keys(customFunctions).length} 个函数`;
            }
        }

        // 计算自定义表达式
        function calculateCustom() {
            const expression = document.getElementById('custom-use').value;
            calculateExpression(expression);
        }

        // 保存当前状态
        function saveCurrentState() {
            // 保存所有相关数据到localStorage
            localStorage.setItem('calculatorHistory', JSON.stringify(calculationHistory));
            localStorage.setItem('customVariables', JSON.stringify(customVariables));
            localStorage.setItem('customFunctions', JSON.stringify(customFunctions));
            
            // 显示保存成功消息
            const autoSave = document.querySelector('.auto-save');
            if (autoSave) {
                const originalText = autoSave.innerHTML;
                autoSave.innerHTML = '<i class="fas fa-check"></i> 状态已保存';
                
                setTimeout(() => {
                    autoSave.innerHTML = originalText;
                }, 1500);
            }
        }

        // 导出数据
        function exportData(format) {
            let content = '';
            let filename = 'calculator_data';
            let mimeType = 'text/plain';
            
            switch(format) {
                case 'txt':
                    content = '科学计算器 - 数据导出\n';
                    content += '导出时间: ' + new Date().toLocaleString() + '\n\n';
                    content += '=== 计算历史 ===\n';
                    calculationHistory.forEach((item, index) => {
                        content += `${index + 1}. ${item.expression} = ${item.result} (${item.timestamp})\n`;
                    });
                    
                    content += '\n=== 自定义变量 ===\n';
                    for (const [key, value] of Object.entries(customVariables)) {
                        content += `${key} = ${value}\n`;
                    }
                    
                    content += '\n=== 自定义函数 ===\n';
                    for (const [key, value] of Object.entries(customFunctions)) {
                        content += `${key}(...) = ${value}\n`;
                    }
                    
                    filename += '.txt';
                    break;
                    
                case 'json':
                    const data = {
                        exportTime: new Date().toISOString(),
                        history: calculationHistory,
                        customVariables: customVariables,
                        customFunctions: customFunctions
                    };
                    content = JSON.stringify(data, null, 2);
                    filename += '.json';
                    mimeType = 'application/json';
                    break;
            }
            
            // 创建下载链接
            const blob = new Blob([content], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            // 清理
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
