<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-wifi"></i> WiFi二维码生成器</h1>
            <p>快速创建并下载WiFi二维码，让朋友和家人一键连接您的WiFi网络</p>
        </header>
        
        <div class="content">
            <section class="form-section">
                <h2>WiFi设置</h2>
                <p style="margin-top: 10px; margin-bottom: 30px; color: #64748b;">填写您的WiFi信息，然后生成二维码</p>
                
                <div class="form-group">
                    <label for="ssid"><i class="fas fa-network-wired"></i> 网络名称 (SSID)</label>
                    <input type="text" id="ssid" class="form-control" placeholder="例如：MyWiFi_5G" value="MyWiFi_Network">
                </div>
                
                <div class="form-group password-container">
                    <label for="password"><i class="fas fa-key"></i> 密码</label>
                    <input type="password" id="password" class="form-control" placeholder="输入WiFi密码" value="SecurePassword123">
                    <button type="button" class="toggle-password" id="togglePassword">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-shield-alt"></i> 加密类型</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="wpa" name="encryption" value="WPA" checked>
                            <label for="wpa">WPA/WPA2</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="wep" name="encryption" value="WEP">
                            <label for="wep">WEP</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="none" name="encryption" value="nopass">
                            <label for="none">无密码</label>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="hidden"><i class="fas fa-eye-slash"></i> 隐藏网络</label>
                    <div style="margin-top: 10px;">
                        <input type="checkbox" id="hidden" style="margin-right: 8px;">
                        <label for="hidden" style="display: inline; font-weight: normal;">这是一个隐藏网络</label>
                    </div>
                </div>
                
                <div class="actions">
                    <button class="btn btn-primary" id="generateBtn">
                        <i class="fas fa-qrcode"></i> 生成二维码
                    </button>
                    <button class="btn btn-secondary" id="downloadBtn" disabled>
                        <i class="fas fa-download"></i> 下载二维码
                    </button>
                </div>
                
                <div class="instructions">
                    <h3><i class="fas fa-info-circle"></i> 使用说明</h3>
                    <ol>
                        <li>输入您的WiFi网络名称 (SSID) 和密码</li>
                        <li>选择正确的加密类型（通常为WPA/WPA2）</li>
                        <li>点击"生成二维码"按钮创建二维码</li>
                        <li>使用手机摄像头扫描二维码即可连接WiFi</li>
                        <li>可下载二维码图片分享给他人</li>
                    </ol>
                </div>
            </section>
            
            <section class="preview-section">
                <h2>二维码预览</h2>
                <p style="margin-top: 10px; margin-bottom: 30px; color: #64748b;">扫描此二维码连接WiFi</p>
                
                <div class="qr-container">
                    <div id="qrcode" class="placeholder">
                        <div>
                            <i class="fas fa-qrcode"></i>
                            <p>二维码将在此显示</p>
                        </div>
                    </div>
                </div>

                    <h3>WiFi信息</h3>
                    <div class="wifi-info">
                        <p>
                            <span>网络名称:</span>
                            <span id="previewSsid">-</span>
                        </p>
                        <p>
                            <span>加密类型:</span>
                            <span id="previewEncryption">-</span>
                        </p>
                        <p>
                            <span>密码:</span>
                            <span id="previewPassword">-</span>
                        </p>
                        <p>
                            <span>隐藏网络:</span>
                            <span id="previewHidden">否</span>
                        </p>
                    </div>
                </div>

        </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const ssidInput = document.getElementById('ssid');
            const passwordInput = document.getElementById('password');
            const encryptionRadios = document.querySelectorAll('input[name="encryption"]');
            const hiddenCheckbox = document.getElementById('hidden');
            const generateBtn = document.getElementById('generateBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const qrcodeDiv = document.getElementById('qrcode');
            const togglePasswordBtn = document.getElementById('togglePassword');
            
            // 预览元素
            const previewSsid = document.getElementById('previewSsid');
            const previewEncryption = document.getElementById('previewEncryption');
            const previewPassword = document.getElementById('previewPassword');
            const previewHidden = document.getElementById('previewHidden');
            
            let currentQRCode = null;
            
            // 切换密码显示/隐藏
            togglePasswordBtn.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
            
           // 修复生成二维码的部分
generateBtn.addEventListener('click', function() {
    const ssid = ssidInput.value.trim();
    const password = passwordInput.value;
    const encryption = document.querySelector('input[name="encryption"]:checked').value;
    const isHidden = hiddenCheckbox.checked;
    
    if (!ssid) {
        alert('请输入WiFi网络名称 (SSID)');
        ssidInput.focus();
        return;
    }
    
    if (encryption !== 'nopass' && !password) {
        alert('请输入WiFi密码');
        passwordInput.focus();
        return;
    }
    
    // 更新预览信息
    previewSsid.textContent = ssid;
    previewEncryption.textContent = getEncryptionText(encryption);
    previewPassword.textContent = encryption === 'nopass' ? '无密码' : '••••••••';
    previewHidden.textContent = isHidden ? '是' : '否';
    
    // 生成WiFi连接字符串
    const wifiString = generateWifiString(ssid, password, encryption, isHidden);
    
    // 清除之前的二维码
    qrcodeDiv.innerHTML = '';
    
    // 使用正确的 QRCode 构造函数
    try {
        currentQRCode = new QRCode(qrcodeDiv, {
            text: wifiString,
            width: 250,
            height: 250,
            colorDark: '#182848',
            colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.H
        });
        
        // 启用下载按钮
        downloadBtn.disabled = false;
        
        // 更新二维码容器样式
        qrcodeDiv.classList.remove('placeholder');
        
        // 隐藏placeholder图标和文字
        const placeholderDiv = qrcodeDiv.querySelector('.placeholder');
        if (placeholderDiv) {
            placeholderDiv.style.display = 'none';
        }
        
    } catch (error) {
        console.error('生成二维码时出错:', error);
        alert('生成二维码时出错，请重试');
    }
});

// 下载二维码
downloadBtn.addEventListener('click', function() {
    if (!currentQRCode) return;
    
    // 获取canvas元素
    const canvas = qrcodeDiv.querySelector('canvas');
    if (!canvas) return;
    
    // 创建下载链接
    const link = document.createElement('a');
    link.download = `WiFi_${ssidInput.value.trim()}_QRCode.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
});

// 生成WiFi连接字符串
function generateWifiString(ssid, password, encryption, isHidden) {
    // 处理特殊字符
    const encodedSsid = ssid.replace(/[;,"\\]/g, '\\$&');
    const encodedPassword = password ? password.replace(/[;,"\\]/g, '\\$&') : '';
    
    // 基本格式: WIFI:S:<SSID>;T:<加密类型>;P:<密码>;H:<隐藏>;;
    let wifiString = `WIFI:S:${encodedSsid};T:${encryption};`;
    
    if (encryption !== 'nopass' && encodedPassword) {
        wifiString += `P:${encodedPassword};`;
    }
    
    if (isHidden) {
        wifiString += `H:true;`;
    }
    
    wifiString += `;`;
    return wifiString;
}
            
            // 获取加密类型文本
            function getEncryptionText(encryption) {
                switch(encryption) {
                    case 'WPA': return 'WPA/WPA2';
                    case 'WEP': return 'WEP';
                    case 'nopass': return '无密码';
                    default: return encryption;
                }
            }
            
            // 示例：自动生成一个初始二维码
            generateBtn.click();
        });
    </script>
