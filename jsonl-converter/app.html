<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSONL 转换器 - 笨鸟办公工具箱</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"
     crossorigin="anonymous"></script>
    <link rel="canonical" href="https://www.benniaooffice.com/tools/jsonl-converter/app.html">
    <style>
        :root {
            --accent: #8b5cf6;
            --accent-soft: #8b5cf633;
            --bg-dark: #0f172a;
            --text: #0f172a;
            --text-muted: #475569;
            --border: #e2e8f0;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #8b5cf6 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.3rem;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 18px;
            padding: 26px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        label {
            font-size: 14px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: white;
            transition: border-color 0.2s;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        textarea {
            min-height: 160px;
            resize: vertical;
            line-height: 1.5;
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 10px;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 12px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            background: var(--accent);
            color: white;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #64748b;
        }

        .btn-success {
            background: var(--success);
        }

        .checkbox {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .status {
            margin-top: 12px;
            font-size: 13px;
            min-height: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status.success {
            color: var(--success);
        }

        .status.error {
            color: var(--error);
        }

        .output-box {
            background: #f8fafc;
            border: 1px dashed var(--border);
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
        }

        .info-text {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .icon {
            width: 16px;
            height: 16px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }
            
            .card {
                padding: 16px;
            }
            
            .row {
                flex-direction: column;
                align-items: stretch;
            }
            
            .actions {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>JSONL 转换器</h1>
            <p>在 JSON 数组与 JSONL 之间快速转换</p>
        </div>
        <div class="card">
            <div>
                <label for="input">输入内容</label>
                <textarea id="input" placeholder='粘贴 JSON 或 JSONL 内容，例如：
[
  {"name": "Alice", "score": 92},
  {"name": "Bob", "score": 87}
]

或：

{"name": "Alice", "score": 92}
{"name": "Bob", "score": 87}'></textarea>
            </div>
            
            <div class="row">
                <div style="min-width: 220px; flex: 1;">
                    <label for="mode">转换模式</label>
                    <select id="mode">
                        <option value="json-to-jsonl" selected>JSON 数组 → JSONL</option>
                        <option value="jsonl-to-json">JSONL → JSON 数组</option>
                    </select>
                </div>
                
                <label class="checkbox">
                    <input type="checkbox" id="pretty" checked>
                    格式化 JSON 输出
                </label>
            </div>
            
            <div class="actions">
                <button class="btn" id="convert">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 17l5-5-5-5v10zm8 0l5-5-5-5v10z"/>
                    </svg>
                    开始转换
                </button>
                <button class="btn btn-secondary" id="copy" disabled>
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                    </svg>
                    复制结果
                </button>
                <button class="btn btn-secondary" id="clear">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                    清空
                </button>
                <button class="btn btn-secondary" id="sample">
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                    </svg>
                    加载示例
                </button>
            </div>
            
            <div class="status" id="status">等待输入...</div>
            
            <div class="output-box">
                <label for="output">输出结果</label>
                <textarea id="output" readonly placeholder="转换结果将显示在这里"></textarea>
                <div class="info-text" id="info">
                    JSONL：每行一个独立的 JSON 对象<br>
                    JSON 数组：标准的 JSON 数组格式
                </div>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('input');
        const mode = document.getElementById('mode');
        const pretty = document.getElementById('pretty');
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        const copyBtn = document.getElementById('copy');
        const info = document.getElementById('info');

        function setStatus(message, type = '') {
            status.textContent = message;
            status.className = 'status ' + type;
        }

        function updateCopyButtonState() {
            copyBtn.disabled = !output.value.trim();
        }

        function convert() {
            const value = input.value.trim();
            if (!value) {
                output.value = '';
                setStatus('请输入内容', 'error');
                updateCopyButtonState();
                return;
            }
            
            try {
                if (mode.value === 'json-to-jsonl') {
                    const data = JSON.parse(value);
                    if (!Array.isArray(data)) {
                        throw new Error('输入必须是 JSON 数组格式');
                    }
                    output.value = data.map(item => JSON.stringify(item, null, pretty.checked ? 2 : 0)).join('\n');
                    info.textContent = `已转换 ${data.length} 个对象，每行一个 JSON 对象`;
                } else {
                    const lines = value.split(/\r?\n/).filter(line => line.trim() !== '');
                    const items = lines.map((line, index) => {
                        try {
                            return JSON.parse(line);
                        } catch (e) {
                            throw new Error(`第 ${index + 1} 行解析失败: ${e.message}`);
                        }
                    });
                    output.value = JSON.stringify(items, null, pretty.checked ? 2 : 0);
                    info.textContent = `已转换 ${items.length} 行数据为 JSON 数组`;
                }
                setStatus('✓ 转换成功', 'success');
            } catch (error) {
                output.value = '';
                info.textContent = 'JSONL：每行一个独立的 JSON 对象，JSON 数组：标准的 JSON 数组格式';
                setStatus('✗ ' + error.message, 'error');
            }
            
            updateCopyButtonState();
        }

        async function copyToClipboard() {
            if (!output.value.trim()) return;
            
            try {
                await navigator.clipboard.writeText(output.value);
                setStatus('✓ 已复制到剪贴板', 'success');
                copyBtn.innerHTML = `
                    <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
                    </svg>
                    已复制
                `;
                
                setTimeout(() => {
                    copyBtn.innerHTML = `
                        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
                        </svg>
                        复制结果
                    `;
                }, 2000);
            } catch (err) {
                console.error('复制失败:', err);
                setStatus('✗ 复制失败，请手动复制', 'error');
            }
        }

        function clearAll() {
            input.value = '';
            output.value = '';
            setStatus('等待输入...');
            info.textContent = 'JSONL：每行一个独立的 JSON 对象，JSON 数组：标准的 JSON 数组格式';
            updateCopyButtonState();
        }

        function loadSample() {
            const sampleJSON = `[
  {
    "id": 1,
    "name": "Alice",
    "score": 92,
    "email": "alice@example.com"
  },
  {
    "id": 2,
    "name": "Bob",
    "score": 87,
    "email": "bob@example.com"
  },
  {
    "id": 3,
    "name": "Charlie",
    "score": 95,
    "email": "charlie@example.com"
  }
]`;

            const sampleJSONL = `{"id": 1, "name": "Alice", "score": 92, "email": "alice@example.com"}
{"id": 2, "name": "Bob", "score": 87, "email": "bob@example.com"}
{"id": 3, "name": "Charlie", "score": 95, "email": "charlie@example.com"}`;

            if (mode.value === 'json-to-jsonl') {
                input.value = sampleJSON;
                info.textContent = '示例：JSON 数组 → JSONL';
            } else {
                input.value = sampleJSONL;
                info.textContent = '示例：JSONL → JSON 数组';
            }
            
            convert();
        }

        // 事件监听
        document.getElementById('convert').addEventListener('click', convert);
        copyBtn.addEventListener('click', copyToClipboard);
        document.getElementById('clear').addEventListener('click', clearAll);
        document.getElementById('sample').addEventListener('click', loadSample);

        // 模式切换时更新示例提示
        mode.addEventListener('change', () => {
            if (input.value.trim()) {
                convert();
            }
        });

        // 格式化选项切换时重新转换
        pretty.addEventListener('change', () => {
            if (input.value.trim() && output.value.trim()) {
                convert();
            }
        });

        // 实时验证输入
        input.addEventListener('input', () => {
            if (input.value.trim()) {
                setStatus('准备就绪，点击"开始转换"按钮');
            } else {
                setStatus('等待输入...');
            }
            updateCopyButtonState();
        });

        // 初始化状态
        updateCopyButtonState();
    </script>
</body>
</html>
