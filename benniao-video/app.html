<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摄像机记录器 - 笨鸟办公工具集箱</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"
     crossorigin="anonymous"></script>
    <link rel="canonical" href="https://www.benniaooffice.com/tools/benniao-video/">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #a0d2ff;
            margin-bottom: 20px;
        }
        
        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .camera-section {
            flex: 1;
            min-width: 300px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gallery-section {
            flex: 1;
            min-width: 300px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #4fc3f7;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            font-size: 1.8rem;
        }
        
        .camera-preview {
            width: 100%;
            height: 300px;
            background-color: #000;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .camera-placeholder {
            text-align: center;
            color: #aaa;
        }
        
        .camera-placeholder i {
            font-size: 4rem;
            margin-bottom: 15px;
            display: block;
            color: #555;
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 140px;
            justify-content: center;
        }
        
        .btn-primary {
            background: linear-gradient(to right, #00c6ff, #0072ff);
            color: white;
        }
        
        .btn-primary:hover {
            background: linear-gradient(to right, #0072ff, #00c6ff);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 114, 255, 0.4);
        }
        
        .btn-danger {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
            color: white;
        }
        
        .btn-danger:hover {
            background: linear-gradient(to right, #ff4b2b, #ff416c);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 75, 43, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(to right, #56ab2f, #a8e063);
            color: white;
        }
        
        .btn-success:hover {
            background: linear-gradient(to right, #a8e063, #56ab2f);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(86, 171, 47, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .recording-indicator {
            display: none;
            align-items: center;
            gap: 10px;
            color: #ff4b2b;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        
        .recording-dot {
            width: 12px;
            height: 12px;
            background-color: #ff4b2b;
            border-radius: 50%;
        }
        
        .timer {
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            max-height: 400px;
            overflow-y: auto;
            padding: 5px;
        }
        
        .media-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            height: 150px;
            background-color: #222;
            transition: transform 0.3s ease;
        }
        
        .media-item:hover {
            transform: scale(1.05);
        }
        
        .media-item img, .media-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .media-type {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
        }
        
        .empty-gallery {
            text-align: center;
            padding: 40px 20px;
            color: #aaa;
        }
        
        .empty-gallery i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
            color: #555;
        }
        
        .footer {
            text-align: center;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: #a0d2ff;
            font-size: 0.9rem;
        }
        
        .device-selector {
            margin-bottom: 20px;
        }
        
        select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 1rem;
        }
        
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.5s ease;
            z-index: 1000;
        }
        
        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            .camera-section, .gallery-section {
                width: 100%;
            }
            
            h1 {
                font-size: 2.2rem;
            }
        }
        
        @media (max-width: 480px) {
            .controls {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
            
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-video"></i> 摄像机记录器</h1>
            <p class="subtitle">从网络摄像头或照相机拍摄照片和录制视频</p>
        </header>
        
        <div class="main-content">
            <div class="camera-section">
                <h2 class="section-title"><i class="fas fa-camera"></i> 摄像头控制</h2>
                
                <div class="device-selector">
                    <select id="cameraSelect">
                        <option value="">选择摄像头...</option>
                    </select>
                </div>
                
                <div class="camera-preview">
                    <video id="videoElement" autoplay playsinline></video>
                    <div class="camera-placeholder" id="cameraPlaceholder">
                        <i class="fas fa-video-slash"></i>
                        <p>摄像头未启用</p>
                    </div>
                </div>
                
                <div class="status-indicator">
                    <div id="recordingIndicator" class="recording-indicator">
                        <div class="recording-dot"></div>
                        <span>录制中</span>
                        <span id="timer" class="timer">00:00</span>
                    </div>
                    <div id="statusText">准备就绪</div>
                </div>
                
                <div class="controls">
                    <button id="startCamera" class="btn btn-primary">
                        <i class="fas fa-play"></i> 开启摄像头
                    </button>
                    <button id="takePhoto" class="btn btn-success" disabled>
                        <i class="fas fa-camera"></i> 拍摄照片
                    </button>
                    <button id="startRecording" class="btn btn-danger" disabled>
                        <i class="fas fa-record-vinyl"></i> 开始录制
                    </button>
                    <button id="stopRecording" class="btn btn-danger" disabled>
                        <i class="fas fa-stop"></i> 停止录制
                    </button>
                </div>
            </div>
            
            <div class="gallery-section">
                <h2 class="section-title"><i class="fas fa-photo-video"></i> 媒体库</h2>
                
                <div class="gallery-container" id="galleryContainer">
                    <div class="empty-gallery" id="emptyGallery">
                        <i class="fas fa-images"></i>
                        <p>拍摄的照片和录制的视频将显示在这里</p>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="footer">
             
        </div>
    </div>
    
    <div class="notification" id="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notificationText">操作成功</span>
    </div>

    <script>
        // DOM元素
        const videoElement = document.getElementById('videoElement');
        const cameraPlaceholder = document.getElementById('cameraPlaceholder');
        const cameraSelect = document.getElementById('cameraSelect');
        const startCameraBtn = document.getElementById('startCamera');
        const takePhotoBtn = document.getElementById('takePhoto');
        const startRecordingBtn = document.getElementById('startRecording');
        const stopRecordingBtn = document.getElementById('stopRecording');
        const recordingIndicator = document.getElementById('recordingIndicator');
        const statusText = document.getElementById('statusText');
        const timerElement = document.getElementById('timer');
        const galleryContainer = document.getElementById('galleryContainer');
        const emptyGallery = document.getElementById('emptyGallery');
        const notification = document.getElementById('notification');
        const notificationText = document.getElementById('notificationText');
        
        // 状态变量
        let mediaStream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let recordingTimer = null;
        let recordingSeconds = 0;
        let cameras = [];
        
        // 显示通知
        function showNotification(message, isError = false) {
            notificationText.textContent = message;
            notification.style.background = isError 
                ? 'rgba(255, 75, 43, 0.9)' 
                : 'rgba(0, 114, 255, 0.9)';
            
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        // 更新计时器显示
        function updateTimer() {
            const minutes = Math.floor(recordingSeconds / 60).toString().padStart(2, '0');
            const seconds = (recordingSeconds % 60).toString().padStart(2, '0');
            timerElement.textContent = `${minutes}:${seconds}`;
            recordingSeconds++;
        }
        
        // 获取可用摄像头
        async function getCameras() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                cameras = devices.filter(device => device.kind === 'videoinput');
                
                // 清空选择器
                cameraSelect.innerHTML = '<option value="">选择摄像头...</option>';
                
                // 添加摄像头选项
                cameras.forEach((camera, index) => {
                    const option = document.createElement('option');
                    option.value = camera.deviceId;
                    option.text = camera.label || `摄像头 ${index + 1}`;
                    cameraSelect.appendChild(option);
                });
                
                return cameras;
            } catch (error) {
                console.error('获取摄像头列表失败:', error);
                showNotification('获取摄像头列表失败', true);
                return [];
            }
        }
        
        // 启动摄像头
        async function startCamera() {
            const cameraId = cameraSelect.value;
            const constraints = {
                video: {
                    width: { ideal: 1280 },
                    height: { ideal: 720 },
                    facingMode: 'user',
                    ...(cameraId && { deviceId: { exact: cameraId } })
                },
                audio: true
            };
            
            try {
                // 停止之前的媒体流
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
                
                // 获取新的媒体流
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                videoElement.srcObject = mediaStream;
                
                // 显示视频，隐藏占位符
                videoElement.style.display = 'block';
                cameraPlaceholder.style.display = 'none';
                
                // 更新按钮状态
                startCameraBtn.disabled = true;
                takePhotoBtn.disabled = false;
                startRecordingBtn.disabled = false;
                stopRecordingBtn.disabled = true;
                
                // 更新状态文本
                statusText.textContent = '摄像头已启用';
                showNotification('摄像头已成功开启');
                
                // 如果之前没有获取摄像头列表，现在获取
                if (cameras.length === 0) {
                    await getCameras();
                }
            } catch (error) {
                console.error('启动摄像头失败:', error);
                showNotification('启动摄像头失败: ' + error.message, true);
                statusText.textContent = '摄像头启动失败';
            }
        }
        
        // 停止摄像头
        function stopCamera() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
                
                // 停止视频显示
                videoElement.srcObject = null;
                videoElement.style.display = 'none';
                cameraPlaceholder.style.display = 'block';
                
                // 更新按钮状态
                startCameraBtn.disabled = false;
                takePhotoBtn.disabled = true;
                startRecordingBtn.disabled = true;
                stopRecordingBtn.disabled = true;
                
                // 更新状态文本
                statusText.textContent = '摄像头已停止';
                showNotification('摄像头已停止');
            }
        }
        
        // 拍摄照片
        function takePhoto() {
            if (!mediaStream) return;
            
            const canvas = document.createElement('canvas');
            canvas.width = videoElement.videoWidth;
            canvas.height = videoElement.videoHeight;
            
            const context = canvas.getContext('2d');
            context.drawImage(videoElement, 0, 0, canvas.width, canvas.height);
            
            // 将画布转换为数据URL
            const dataURL = canvas.toDataURL('image/png');
            
            // 创建媒体项并添加到图库
            createMediaItem(dataURL, 'image');
            
            // 更新状态文本
            statusText.textContent = '照片已拍摄';
            showNotification('照片拍摄成功');
        }
        
        // 开始录制视频
        function startRecording() {
            if (!mediaStream) return;
            
            try {
                // 初始化录制器
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(mediaStream, {
                    mimeType: 'video/webm;codecs=vp9,opus'
                });
                
                // 处理数据可用事件
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };
                
                // 处理录制停止事件
                mediaRecorder.onstop = () => {
                    // 创建Blob
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const videoURL = URL.createObjectURL(blob);
                    
                    // 创建媒体项并添加到图库
                    createMediaItem(videoURL, 'video');
                    
                    // 清理
                    recordedChunks = [];
                    
                    // 更新状态文本
                    statusText.textContent = '录制已停止';
                    showNotification('视频录制完成');
                };
                
                // 开始录制
                mediaRecorder.start(100); // 每100ms收集一次数据
                
                // 启动计时器
                recordingSeconds = 0;
                recordingTimer = setInterval(updateTimer, 1000);
                recordingIndicator.style.display = 'flex';
                
                // 更新按钮状态
                startRecordingBtn.disabled = true;
                stopRecordingBtn.disabled = false;
                takePhotoBtn.disabled = true;
                
                // 更新状态文本
                statusText.textContent = '正在录制...';
            } catch (error) {
                console.error('开始录制失败:', error);
                showNotification('开始录制失败: ' + error.message, true);
            }
        }
        
        // 停止录制视频
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                
                // 停止计时器
                clearInterval(recordingTimer);
                recordingIndicator.style.display = 'none';
                
                // 更新按钮状态
                startRecordingBtn.disabled = false;
                stopRecordingBtn.disabled = true;
                takePhotoBtn.disabled = false;
            }
        }
        
        // 创建媒体项并添加到图库
        function createMediaItem(url, type) {
            // 隐藏空图库消息
            emptyGallery.style.display = 'none';
            
            // 创建媒体项容器
            const mediaItem = document.createElement('div');
            mediaItem.className = 'media-item';
            
            // 创建时间戳
            const timestamp = new Date().toLocaleString();
            
            if (type === 'image') {
                // 创建图片元素
                const img = document.createElement('img');
                img.src = url;
                img.alt = `拍摄于 ${timestamp}`;
                mediaItem.appendChild(img);
                
                // 添加类型标签
                const typeLabel = document.createElement('div');
                typeLabel.className = 'media-type';
                typeLabel.textContent = '照片';
                mediaItem.appendChild(typeLabel);
                
                // 添加下载功能
                mediaItem.addEventListener('click', () => {
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `photo_${Date.now()}.png`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    showNotification('照片下载中...');
                });
            } else if (type === 'video') {
                // 创建视频元素
                const video = document.createElement('video');
                video.src = url;
                video.controls = true;
                video.preload = 'metadata';
                mediaItem.appendChild(video);
                
                // 添加类型标签
                const typeLabel = document.createElement('div');
                typeLabel.className = 'media-type';
                typeLabel.textContent = '视频';
                mediaItem.appendChild(typeLabel);
                
                // 添加下载功能
                mediaItem.addEventListener('click', (e) => {
                    if (e.target !== video) {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `video_${Date.now()}.webm`;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        showNotification('视频下载中...');
                    }
                });
            }
            
            // 将新项添加到图库开头
            galleryContainer.insertBefore(mediaItem, galleryContainer.firstChild);
            
            // 限制图库中的项目数量
            const maxItems = 12;
            const items = galleryContainer.querySelectorAll('.media-item');
            if (items.length > maxItems) {
                galleryContainer.removeChild(items[items.length - 1]);
            }
        }
        
        // 事件监听器
        startCameraBtn.addEventListener('click', startCamera);
        
        cameraSelect.addEventListener('change', () => {
            if (mediaStream) {
                // 如果摄像头已经在运行，重新启动以切换摄像头
                startCamera();
            }
        });
        
        takePhotoBtn.addEventListener('click', takePhoto);
        
        startRecordingBtn.addEventListener('click', startRecording);
        
        stopRecordingBtn.addEventListener('click', stopRecording);
        
        // 页面加载时获取摄像头列表
        window.addEventListener('DOMContentLoaded', async () => {
            await getCameras();
            
            // 检查是否支持媒体设备API
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                showNotification('您的浏览器不支持摄像头功能', true);
                statusText.textContent = '浏览器不支持摄像头功能';
                startCameraBtn.disabled = true;
            }
        });
        
        // 页面关闭前停止摄像头
        window.addEventListener('beforeunload', () => {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
            }
            
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        });
    </script>
</body>
</html>
