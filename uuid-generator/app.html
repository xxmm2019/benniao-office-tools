<!DOCTYPE html>
<html lang="zh-CN">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID 生成器- 笨鸟办公工具集箱</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"
     crossorigin="anonymous"></script>
    <link rel="canonical" href="https://www.benniaooffice.com/tools/uuid-generator/app.html">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .option-group {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
        }

        .option-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .option-group select,
        .option-group input[type="number"] {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .option-group select:focus,
        .option-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .output-area {
            margin-top: 25px;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .output-header h3 {
            color: #333;
            font-size: 1.2rem;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .copy-btn.copied {
            background: #28a745;
        }

        .output-list {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .uuid-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background: white;
            border-radius: 8px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .uuid-item:last-child {
            margin-bottom: 0;
        }

        .uuid-text {
            color: #333;
            word-break: break-all;
        }

        .uuid-copy {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            padding: 5px 10px;
            font-size: 18px;
            transition: transform 0.2s;
        }

        .uuid-copy:hover {
            transform: scale(1.2);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .options {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>UUID 生成器</h1>
            <p>快速生成各种版本的 UUID</p>
        </div>

        <div class="card">
            <div class="options">
                <div class="option-group">
                    <label>UUID 版本</label>
                    <select id="version">
                        <option value="4">UUID v4 (随机)</option>
                        <option value="1">UUID v1 (时间戳)</option>
                    </select>
                </div>

                <div class="option-group">
                    <label>生成数量</label>
                    <input type="number" id="count" min="1" max="100" value="1">
                </div>

                <div class="option-group">
                    <label>格式</label>
                    <select id="format">
                        <option value="standard">标准格式 (xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)</option>
                        <option value="uppercase">大写 (XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX)</option>
                        <option value="nodash">无横线 (xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx)</option>
                        <option value="braces">带花括号 ({xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx})</option>
                    </select>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" onclick="generate()">
                    <i></i> 生成 UUID
                </button>
                <button class="btn btn-secondary" onclick="clearOutput()">
                    <i></i> 清空
                </button>
            </div>

            <div class="output-area">
                <div class="output-header">
                    <h3>生成结果</h3>
                    <button class="copy-btn" onclick="copyAll()">复制全部</button>
                </div>
                <div class="output-list" id="output">
                    <div class="empty-state">
                        <i></i>
                        <p>点击"生成 UUID"按钮开始生成</p>
                    </div>
                </div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="total-generated">0</div>
                    <div class="stat-label">已生成总数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="this-session">0</div>
                    <div class="stat-label">本次生成</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="last-uuid">-</div>
                    <div class="stat-label">最新 UUID (前8位)</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let generatedUUIDs = [];
        let sessionCount = 0;
        let totalCount = parseInt(localStorage.getItem('uuid-total-count') || '0');

        document.getElementById('total-generated').textContent = totalCount;

        function generateUUID(version) {
            if (version === '4') {
                return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                    const r = Math.random() * 16 | 0;
                    const v = c === 'x' ? r : (r & 0x3 | 0x8);
                    return v.toString(16);
                });
            } else if (version === '1') {
                // UUID v1 simulation (timestamp-based)
                const timestamp = Date.now();
                const timeHex = timestamp.toString(16).padStart(12, '0');
                const clockSeq = Math.floor(Math.random() * 16384).toString(16).padStart(4, '0');
                const node = Math.floor(Math.random() * 281474976710656).toString(16).padStart(12, '0');

                return timeHex.substring(0, 8) + '-' +
                       timeHex.substring(8, 12) + '-1' +
                       timeHex.substring(12, 15) + '-' +
                       clockSeq.substring(0, 1) + '0' + clockSeq.substring(1) + '-' +
                       node;
            }
            return generateUUID('4');
        }

        function formatUUID(uuid, format) {
            switch (format) {
                case 'uppercase':
                    return uuid.toUpperCase();
                case 'nodash':
                    return uuid.replace(/-/g, '');
                case 'braces':
                    return '{' + uuid + '}';
                default:
                    return uuid;
            }
        }

        function generate() {
            const version = document.getElementById('version').value;
            const count = Math.min(100, Math.max(1, parseInt(document.getElementById('count').value) || 1));
            const format = document.getElementById('format').value;

            const newUUIDs = [];
            for (let i = 0; i < count; i++) {
                const uuid = generateUUID(version);
                newUUIDs.push(formatUUID(uuid, format));
            }

            generatedUUIDs = [...newUUIDs, ...generatedUUIDs];
            sessionCount += count;
            totalCount += count;

            localStorage.setItem('uuid-total-count', totalCount.toString());

            document.getElementById('this-session').textContent = sessionCount;
            document.getElementById('total-generated').textContent = totalCount;
            document.getElementById('last-uuid').textContent = newUUIDs[0].substring(0, 8);

            renderOutput();
        }

        function renderOutput() {
            const output = document.getElementById('output');

            if (generatedUUIDs.length === 0) {
                output.innerHTML = `
                    <div class="empty-state">
                        <i></i>
                        <p>点击"生成 UUID"按钮开始生成</p>
                    </div>
                `;
                return;
            }

            output.innerHTML = generatedUUIDs.map((uuid, index) => `
                <div class="uuid-item">
                    <span class="uuid-text">${escapeHtml(uuid)}</span>
                    <button class="uuid-copy" onclick="copyOne(${index})" title="复制"></button>
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyOne(index) {
            const uuid = generatedUUIDs[index];
            navigator.clipboard.writeText(uuid).then(() => {
                showToast('已复制到剪贴板');
            });
        }

        function copyAll() {
            if (generatedUUIDs.length === 0) {
                showToast('没有可复制的内容');
                return;
            }

            const text = generatedUUIDs.join('\n');
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '已复制!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = '复制全部';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function clearOutput() {
            generatedUUIDs = [];
            sessionCount = 0;
            document.getElementById('this-session').textContent = '0';
            document.getElementById('last-uuid').textContent = '-';
            renderOutput();
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #333;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                z-index: 1000;
                animation: fadeInOut 2s ease;
            `;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        // Add fadeInOut animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeInOut {
                0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
                15% { opacity: 1; transform: translateX(-50%) translateY(0); }
                85% { opacity: 1; transform: translateX(-50%) translateY(0); }
                100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
            }
        `;
        document.head.appendChild(style);
    </script>
    
    <script src="/assets/clicks.js" defer></script>
</body>
</html>
