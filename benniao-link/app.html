</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-link"></i> 短链助手</h1>
            <p class="subtitle">快速生成短链接和二维码</p>
            <p class="tagline">简洁、高效、安全 - 您的链接管理专家</p>
        </header>
        
        <div class="app-container">
            <section class="input-section">
                <h2 class="section-title"><i class="fas fa-pencil-alt"></i> 输入长链接</h2>
                <div class="url-input-container">
                    <label for="long-url">输入您的长链接：</label>
                    <input type="url" id="long-url" class="url-input" placeholder="https://example.com/very-long-url-path" value="https://github.com/">
                </div>
                
                <div class="loading" id="loading">
                    <i class="fas fa-spinner"></i>
                    <p>正在生成短链接和二维码...</p>
                </div>
                
                <div class="message" id="message"></div>
                
                <div class="button-group">
                    <button id="generate-btn" class="btn btn-primary">
                        <i class="fas fa-magic"></i> 生成短链接
                    </button>
                    <button id="generate-qr-btn" class="btn btn-secondary">
                        <i class="fas fa-qrcode"></i> 只生成二维码
                    </button>
                    <button id="clear-btn" class="btn btn-clear">
                        <i class="fas fa-broom"></i> 清空
                    </button>
                </div>
            </section>
            
            <section class="output-section">
                <h2 class="section-title"><i class="fas fa-rocket"></i> 生成结果</h2>
                
                <div class="result-container">
                    <div class="short-link-container">
                        <label>短链接：</label>
                        <div class="short-link">
                            <input type="text" id="short-url" readonly placeholder="短链接将在这里生成">
                            <button id="copy-btn" class="copy-btn">
                                <i class="fas fa-copy"></i> 复制
                            </button>
                        </div>
                    </div>
                    
                    <div class="qrcode-container">
                        <label>二维码：</label>
                        <div class="qrcode-display">
                            <div id="qrcode"></div>
                            <button id="download-btn" class="download-btn">
                                <i class="fas fa-download"></i> 下载二维码
                            </button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
        
        <section class="history-section">
            <h2 class="section-title"><i class="fas fa-history"></i> 生成历史</h2>
            <ul class="history-list" id="history-list">
                <!-- 历史记录将通过JavaScript动态生成 -->
            </ul>
        </section>
        
        <div class="features">
            <div class="feature">
                <i class="fas fa-bolt"></i>
                <h3>快速生成</h3>
                <p>即时将长链接转换为简洁的短链接</p>
            </div>
            <div class="feature">
                <i class="fas fa-qrcode"></i>
                <h3>二维码生成</h3>
                <p>为任何链接创建可扫描的二维码</p>
            </div>
            <div class="feature">
                <i class="fas fa-history"></i>
                <h3>历史记录</h3>
                <p>自动保存最近生成的链接</p>
            </div>
        </div>
        
        <footer>
            <p>© 2026 笨鸟办公工具集箱 - 短链助手 | 本工具完全免费使用</p>
            <p style="margin-top: 5px;">提示：生成的短链接为模拟数据，实际使用需要连接短链接服务API</p>
        </footer>
    </div>

    <script>
        // DOM元素
        const longUrlInput = document.getElementById('long-url');
        const generateBtn = document.getElementById('generate-btn');
        const generateQrBtn = document.getElementById('generate-qr-btn');
        const clearBtn = document.getElementById('clear-btn');
        const shortUrlInput = document.getElementById('short-url');
        const copyBtn = document.getElementById('copy-btn');
        const downloadBtn = document.getElementById('download-btn');
        const qrcodeDiv = document.getElementById('qrcode');
        const historyList = document.getElementById('history-list');
        const loadingDiv = document.getElementById('loading');
        const messageDiv = document.getElementById('message');
        
        // 模拟短链生成API（实际应用中应替换为真实的短链服务API）
        const mockShortenerApi = async (longUrl) => {
            // 模拟API延迟
            await new Promise(resolve => setTimeout(resolve, 800));
            
            // 创建基于当前时间的伪随机短码
            const timestamp = Date.now().toString(36);
            const randomStr = Math.random().toString(36).substring(2, 6);
            const shortCode = `${timestamp}${randomStr}`;
            
            // 返回模拟的短链接
            return `https://short.benniao.link/${shortCode}`;
        };
        
        // 生成短链接
        const generateShortUrl = async () => {
            const longUrl = longUrlInput.value.trim();
            
            if (!longUrl) {
                showMessage('请输入有效的URL', 'error');
                return;
            }
            
            // 验证URL格式
            try {
                new URL(longUrl);
            } catch (e) {
                showMessage('请输入有效的URL格式（如 https://example.com）', 'error');
                return;
            }
            
            // 显示加载状态
            loadingDiv.style.display = 'block';
            hideMessage();
            
            try {
                // 调用模拟API生成短链接
                const shortUrl = await mockShortenerApi(longUrl);
                
                // 显示生成的短链接
                shortUrlInput.value = shortUrl;
                
                // 生成二维码
                generateQRCode(shortUrl);
                
                // 保存到历史记录
                addToHistory(longUrl, shortUrl);
                
                showMessage('短链接和二维码生成成功！', 'success');
            } catch (error) {
                console.error('生成短链接时出错:', error);
                showMessage('生成短链接时出错，请稍后重试', 'error');
            } finally {
                loadingDiv.style.display = 'none';
            }
        };
        
        // 仅生成二维码
        const generateQRCodeOnly = () => {
            const longUrl = longUrlInput.value.trim();
            
            if (!longUrl) {
                showMessage('请输入有效的URL', 'error');
                return;
            }
            
            // 验证URL格式
            try {
                new URL(longUrl);
            } catch (e) {
                showMessage('请输入有效的URL格式（如 https://example.com）', 'error');
                return;
            }
            
            // 显示加载状态
            loadingDiv.style.display = 'block';
            hideMessage();
            
            // 模拟API延迟
            setTimeout(() => {
                // 使用原始长链接生成二维码
                generateQRCode(longUrl);
                
                // 清空短链接输入框
                shortUrlInput.value = '';
                
                // 保存到历史记录（标记为仅二维码）
                addToHistory(longUrl, null);
                
                showMessage('二维码生成成功！', 'success');
                loadingDiv.style.display = 'none';
            }, 600);
        };
        
        // 生成二维码
        const generateQRCode = (url) => {
            // 清空之前的二维码
            qrcodeDiv.innerHTML = '';
            
            // 使用qrcode库生成二维码
            try {
                const qrcode = new QRCode(qrcodeDiv, {
                    text: url,
                    width: 180,
                    height: 180,
                    colorDark: "#2c3e50",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            } catch (error) {
                console.error('生成二维码时出错:', error);
                qrcodeDiv.innerHTML = '<p style="color: #e74c3c; padding: 20px;">二维码生成失败</p>';
            }
        };
        
        // 复制短链接到剪贴板
        const copyToClipboard = () => {
            const shortUrl = shortUrlInput.value;
            
            if (!shortUrl) {
                showMessage('没有可复制的短链接', 'error');
                return;
            }
            
            // 使用现代剪贴板API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(shortUrl).then(() => {
                    showCopySuccess();
                }).catch(err => {
                    console.error('复制失败:', err);
                    fallbackCopyToClipboard(shortUrl);
                });
            } else {
                // 降级方案
                fallbackCopyToClipboard(shortUrl);
            }
        };
        
        // 降级复制方案
        const fallbackCopyToClipboard = (text) => {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed";
            textArea.style.opacity = 0;
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showCopySuccess();
                } else {
                    showMessage('复制失败，请手动选择复制', 'error');
                }
            } catch (err) {
                console.error('复制失败:', err);
                showMessage('复制失败，请手动选择复制', 'error');
            }
            
            document.body.removeChild(textArea);
        };
        
        // 显示复制成功提示
        const showCopySuccess = () => {
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<i class="fas fa-check"></i> 已复制';
            copyBtn.style.backgroundColor = '#2ecc71';
            
            setTimeout(() => {
                copyBtn.innerHTML = originalText;
                copyBtn.style.backgroundColor = '';
            }, 2000);
            
            showMessage('短链接已复制到剪贴板！', 'success');
        };
        
        // 下载二维码
        const downloadQRCode = () => {
            const canvas = qrcodeDiv.querySelector('canvas');
            
            if (!canvas) {
                showMessage('没有可下载的二维码', 'error');
                return;
            }
            
            // 创建下载链接
            const link = document.createElement('a');
            link.download = `benniao-qrcode-${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            showMessage('二维码下载开始', 'success');
        };
        
        // 清空输入和输出
        const clearAll = () => {
            longUrlInput.value = '';
            shortUrlInput.value = '';
            qrcodeDiv.innerHTML = '<p style="color: #7f8c8d; padding: 20px;">二维码将在这里显示</p>';
            hideMessage();
            showMessage('已清空所有内容', 'success');
        };
        
        // 添加记录到历史
        const addToHistory = (longUrl, shortUrl) => {
            // 从localStorage获取历史记录
            let history = JSON.parse(localStorage.getItem('shortlink-history')) || [];
            
            // 创建新记录
            const newRecord = {
                id: Date.now(),
                longUrl: longUrl,
                shortUrl: shortUrl,
                timestamp: new Date().toLocaleString('zh-CN')
            };
            
            // 检查是否已存在相同记录
            const exists = history.some(record => 
                record.longUrl === longUrl && record.shortUrl === shortUrl
            );
            
            if (!exists) {
                // 添加到历史记录开头
                history.unshift(newRecord);
                
                // 限制历史记录数量（最多10条）
                if (history.length > 10) {
                    history = history.slice(0, 10);
                }
                
                // 保存到localStorage
                localStorage.setItem('shortlink-history', JSON.stringify(history));
                
                // 更新历史记录显示
                renderHistory();
            }
        };
        
        // 渲染历史记录
        const renderHistory = () => {
            // 从localStorage获取历史记录
            const history = JSON.parse(localStorage.getItem('shortlink-history')) || [];
            
            // 清空历史列表
            historyList.innerHTML = '';
            
            if (history.length === 0) {
                historyList.innerHTML = '<li class="history-item" style="justify-content: center; color: #7f8c8d; padding: 30px;">暂无历史记录，生成的链接将显示在这里</li>';
                return;
            }
            
            // 渲染每条历史记录
            history.forEach(record => {
                const li = document.createElement('li');
                li.className = 'history-item';
                
                // 截断长URL显示
                const displayUrl = record.longUrl.length > 50 
                    ? record.longUrl.substring(0, 50) + '...' 
                    : record.longUrl;
                
                li.innerHTML = `
                    <div class="history-url" title="${record.longUrl}">${displayUrl}</div>
                    ${record.shortUrl ? 
                        `<div class="history-short" title="${record.shortUrl}">${record.shortUrl.replace('https://', '')}</div>` : 
                        '<div class="history-short" style="color:#f39c12;">仅二维码</div>'}
                    <div class="history-actions">
                        ${record.shortUrl ? `<button class="copy-history-btn" data-url="${record.shortUrl}">复制</button>` : ''}
                        <button class="view-qr-btn" data-url="${record.shortUrl || record.longUrl}" data-long="${record.longUrl}">查看</button>
                    </div>
                `;
                
                historyList.appendChild(li);
            });
            
            // 为历史记录按钮添加事件监听
            attachHistoryEvents();
        };
        
        // 为历史记录按钮附加事件
        const attachHistoryEvents = () => {
            document.querySelectorAll('.copy-history-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const url = e.target.getAttribute('data-url');
                    
                    if (navigator.clipboard && navigator.clipboard.writeText) {
                        navigator.clipboard.writeText(url).then(() => {
                            e.target.textContent = '已复制';
                            e.target.style.backgroundColor = '#2ecc71';
                            
                            setTimeout(() => {
                                e.target.textContent = '复制';
                                e.target.style.backgroundColor = '';
                            }, 2000);
                        });
                    } else {
                        // 降级方案
                        const textArea = document.createElement("textarea");
                        textArea.value = url;
                        document.body.appendChild(textArea);
                        textArea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textArea);
                        
                        e.target.textContent = '已复制';
                        e.target.style.backgroundColor = '#2ecc71';
                        
                        setTimeout(() => {
                            e.target.textContent = '复制';
                            e.target.style.backgroundColor = '';
                        }, 2000);
                    }
                });
            });
            
            document.querySelectorAll('.view-qr-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const url = e.target.getAttribute('data-url');
                    const longUrl = e.target.getAttribute('data-long');
                    
                    longUrlInput.value = longUrl || url;
                    
                    if (url.includes('short.benniao.link')) {
                        shortUrlInput.value = url;
                        generateQRCode(url);
                    } else {
                        shortUrlInput.value = '';
                        generateQRCode(url);
                    }
                    
                    showMessage('已加载历史记录', 'success');
                });
            });
        };
        
        // 显示消息
        const showMessage = (text, type) => {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // 3秒后自动隐藏
            setTimeout(hideMessage, 3000);
        };
        
        // 隐藏消息
        const hideMessage = () => {
            messageDiv.style.display = 'none';
        };
        
        // 初始化
        const init = () => {
            // 设置示例二维码
            qrcodeDiv.innerHTML = '<p style="color: #7f8c8d; padding: 20px;">输入链接后，二维码将在这里显示</p>';
            
            // 渲染历史记录
            renderHistory();
            
            // 事件监听
            generateBtn.addEventListener('click', generateShortUrl);
            generateQrBtn.addEventListener('click', generateQRCodeOnly);
            clearBtn.addEventListener('click', clearAll);
            copyBtn.addEventListener('click', copyToClipboard);
            downloadBtn.addEventListener('click', downloadQRCode);
            
            // 按Enter键触发生成
            longUrlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    generateShortUrl();
                }
            });
            
            // 显示欢迎消息
            setTimeout(() => {
                showMessage('欢迎使用短链助手！粘贴您的长链接并点击"生成短链接"按钮开始使用。', 'success');
            }, 1000);
        };
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
