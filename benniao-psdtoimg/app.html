<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-file-image"></i> PSD在线转换工具</h1>

        </header>
        
        <div class="main-content">
            <section class="upload-section">
                <h2 class="section-title"><i class="fas fa-upload"></i> 上传PSD文件</h2>
                
                <div class="drop-area" id="dropArea">

                    <p><strong>点击或拖放PSD文件到此处</strong></p>

                </div>

    <script>
        // 获取DOM元素
        const fileInput = document.getElementById('fileInput');
        const selectFileBtn = document.getElementById('selectFileBtn');
        const dropArea = document.getElementById('dropArea');
        const previewImage = document.getElementById('previewImage');
        const previewPlaceholder = document.getElementById('previewPlaceholder');
        const convertBtn = document.getElementById('convertBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const loadingIndicator = document.getElementById('loadingIndicator');
        const fileInfo = document.getElementById('fileInfo');
        const scaleSlider = document.getElementById('scaleSlider');
        const scaleDisplay = document.getElementById('scaleDisplay');
        const scaleValue = document.getElementById('scaleValue');
        const qualitySlider = document.getElementById('qualitySlider');
        const qualityDisplay = document.getElementById('qualityDisplay');
        const formatOptions = document.querySelectorAll('input[name="format"]');
        
        // 文件信息元素
        const fileNameElement = document.getElementById('fileName');
        const fileSizeElement = document.getElementById('fileSize');
        const imageDimensionsElement = document.getElementById('imageDimensions');
        const outputFormatElement = document.getElementById('outputFormat');
        const outputDimensionsElement = document.getElementById('outputDimensions');
        
        // 变量存储状态
        let psdFile = null;
        let originalImageData = null;
        let convertedImageData = null;
        let originalWidth = 0;
        let originalHeight = 0;
        let currentFormat = 'png';
        let currentScale = 100;
        let currentQuality = 90;
        
        // 初始化事件监听
        function init() {
            // 点击选择文件按钮触发文件输入
            selectFileBtn.addEventListener('click', () => {
                fileInput.click();
            });
            
            // 文件输入变化
            fileInput.addEventListener('change', handleFileSelect);
            
            // 拖放区域事件
            dropArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropArea.style.borderColor = '#3498db';
                dropArea.style.backgroundColor = '#f0f8ff';
            });
            
            dropArea.addEventListener('dragleave', () => {
                dropArea.style.borderColor = '#bdc3c7';
                dropArea.style.backgroundColor = '#f9f9f9';
            });
            
            dropArea.addEventListener('drop', (e) => {
                e.preventDefault();
                dropArea.style.borderColor = '#bdc3c7';
                dropArea.style.backgroundColor = '#f9f9f9';
                
                if (e.dataTransfer.files.length) {
                    handleFile(e.dataTransfer.files[0]);
                }
            });
            
            // 缩放滑块
            scaleSlider.addEventListener('input', (e) => {
                currentScale = parseInt(e.target.value);
                scaleDisplay.textContent = `${currentScale}%`;
                scaleValue.textContent = currentScale;
                
                // 如果已经有转换的图像，更新输出尺寸显示
                if (originalWidth && originalHeight) {
                    const newWidth = Math.round(originalWidth * currentScale / 100);
                    const newHeight = Math.round(originalHeight * currentScale / 100);
                    outputDimensionsElement.textContent = `${newWidth} × ${newHeight}`;
                }
            });
            
            // 质量滑块
            qualitySlider.addEventListener('input', (e) => {
                currentQuality = parseInt(e.target.value);
                qualityDisplay.textContent = `${currentQuality}%`;
            });
            
            // 格式选项变化
            formatOptions.forEach(option => {
                option.addEventListener('change', (e) => {
                    currentFormat = e.target.value;
                    outputFormatElement.textContent = currentFormat.toUpperCase();
                    
                    // 如果是JPEG格式，启用质量滑块，否则禁用
                    if (currentFormat === 'jpeg') {
                        qualitySlider.disabled = false;
                    } else {
                        qualitySlider.disabled = true;
                    }
                });
            });
            
            // 转换按钮
            convertBtn.addEventListener('click', convertImage);
            
            // 下载按钮
            downloadBtn.addEventListener('click', downloadImage);
        }
        
        // 处理文件选择
        function handleFileSelect(e) {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        }
        
        // 处理文件
        function handleFile(file) {
            // 检查文件类型
            if (!file.name.toLowerCase().endsWith('.psd')) {
                alert('请选择PSD格式文件');
                return;
            }
            
            // 检查文件大小（限制为50MB）
            if (file.size > 50 * 1024 * 1024) {
                alert('文件大小不能超过50MB');
                return;
            }
            
            psdFile = file;
            
            // 显示文件信息
            fileNameElement.textContent = file.name;
            fileSizeElement.textContent = formatFileSize(file.size);
            
            // 显示加载指示器
            loadingIndicator.style.display = 'block';
            previewPlaceholder.style.display = 'none';
            previewImage.style.display = 'none';
            
            // 读取并解析PSD文件
            const reader = new FileReader();
            reader.onload = function(e) {
                const buffer = e.target.result;
                parsePSD(buffer);
            };
            reader.readAsArrayBuffer(file);
        }
        
        // 解析PSD文件
        function parsePSD(buffer) {
            try {
                // 使用psd.js解析PSD
                const psd = PSD.fromBuffer(buffer);
                psd.parse();
                
                // 获取图像数据
                const imageData = psd.image.toPng();
                originalImageData = imageData;
                
                // 创建图像对象以获取尺寸
                const img = new Image();
                img.onload = function() {
                    originalWidth = img.width;
                    originalHeight = img.height;
                    
                    // 显示原始尺寸
                    imageDimensionsElement.textContent = `${originalWidth} × ${originalHeight}`;
                    
                    // 显示输出尺寸（初始为原始尺寸）
                    outputDimensionsElement.textContent = `${originalWidth} × ${originalHeight}`;
                    
                    // 显示预览
                    previewImage.src = imageData.src;
                    previewImage.style.display = 'block';
                    previewPlaceholder.style.display = 'none';
                    
                    // 隐藏加载指示器
                    loadingIndicator.style.display = 'none';
                    
                    // 启用转换按钮
                    convertBtn.disabled = false;
                    
                    // 显示文件信息
                    fileInfo.style.display = 'block';
                };
                img.src = imageData.src;
            } catch (error) {
                console.error('PSD解析错误:', error);
                loadingIndicator.style.display = 'none';
                alert('无法解析该PSD文件，请确保文件格式正确且未损坏');
            }
        }
        
        // 转换图像
        function convertImage() {
            if (!originalImageData) {
                alert('请先上传PSD文件');
                return;
            }
            
            // 显示加载指示器
            loadingIndicator.style.display = 'block';
            
            // 创建临时图像进行转换
            const tempImage = new Image();
            tempImage.onload = function() {
                // 创建canvas元素
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // 计算新尺寸
                const newWidth = Math.round(originalWidth * currentScale / 100);
                const newHeight = Math.round(originalHeight * currentScale / 100);
                
                // 设置canvas尺寸
                canvas.width = newWidth;
                canvas.height = newHeight;
                
                // 绘制图像（缩放）
                ctx.drawImage(tempImage, 0, 0, newWidth, newHeight);
                
                // 根据选择的格式转换图像
                let mimeType, dataUrl;
                
                switch(currentFormat) {
                    case 'png':
                        mimeType = 'image/png';
                        dataUrl = canvas.toDataURL(mimeType);
                        break;
                    case 'jpeg':
                        mimeType = 'image/jpeg';
                        dataUrl = canvas.toDataURL(mimeType, currentQuality / 100);
                        break;
                    case 'webp':
                        mimeType = 'image/webp';
                        // 注意：某些浏览器可能不支持webp格式的toDataURL
                        try {
                            dataUrl = canvas.toDataURL(mimeType);
                        } catch (e) {
                            alert('您的浏览器不支持WebP格式转换，请使用Chrome或Edge浏览器');
                            loadingIndicator.style.display = 'none';
                            return;
                        }
                        break;
                    case 'bmp':
                        mimeType = 'image/bmp';
                        // BMP格式需要通过第三方库或自定义方法生成
                        // 这里使用一个简化的实现
                        dataUrl = convertToBMP(canvas);
                        break;
                    default:
                        mimeType = 'image/png';
                        dataUrl = canvas.toDataURL(mimeType);
                }
                
                // 保存转换后的图像数据
                convertedImageData = dataUrl;
                
                // 更新预览
                previewImage.src = dataUrl;
                
                // 隐藏加载指示器
                loadingIndicator.style.display = 'none';
                
                // 启用下载按钮
                downloadBtn.disabled = false;
                
                // 更新输出尺寸显示
                outputDimensionsElement.textContent = `${newWidth} × ${newHeight}`;
            };
            
            tempImage.src = originalImageData.src;
        }
        
        // 下载图像
        function downloadImage() {
            if (!convertedImageData) {
                alert('请先转换图像');
                return;
            }
            
            // 创建下载链接
            const link = document.createElement('a');
            const fileName = psdFile.name.replace('.psd', '') + `_${currentScale}percent.${currentFormat}`;
            
            link.download = fileName;
            link.href = convertedImageData;
            link.click();
        }
        
        // 将canvas转换为BMP格式（简化版）
        function convertToBMP(canvas) {
            const ctx = canvas.getContext('2d');
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // 创建BMP文件头
            const fileSize = 54 + (canvas.width * canvas.height * 3); // 54字节头 + 像素数据
            const fileHeader = new ArrayBuffer(54);
            const view = new DataView(fileHeader);
            
            // BMP文件头
            view.setUint8(0, 0x42); // 'B'
            view.setUint8(1, 0x4D); // 'M'
            view.setUint32(2, fileSize, true); // 文件大小
            view.setUint32(10, 54, true); // 像素数据偏移量
            view.setUint32(14, 40, true); // 信息头大小
            view.setInt32(18, canvas.width, true); // 宽度
            view.setInt32(22, canvas.height, true); // 高度
            view.setUint16(26, 1, true); // 颜色平面数
            view.setUint16(28, 24, true); // 每像素位数
            view.setUint32(34, 0, true); // 压缩方式（0=不压缩）
            view.setUint32(38, 0, true); // 水平分辨率
            view.setUint32(42, 0, true); // 垂直分辨率
            view.setUint32(46, 0, true); // 使用的颜色数
            view.setUint32(50, 0, true); // 重要颜色数
            
            // 创建像素数据
            const pixelData = new Uint8Array(fileSize - 54);
            let pixelIndex = 0;
            
            // BMP像素数据是倒置的（从下到上）
            for (let y = canvas.height - 1; y >= 0; y--) {
                for (let x = 0; x < canvas.width; x++) {
                    const dataIndex = (y * canvas.width + x) * 4;
                    
                    // BMP格式是BGR顺序，并且需要填充到4字节对齐
                    pixelData[pixelIndex++] = data[dataIndex + 2]; // 蓝色
                    pixelData[pixelIndex++] = data[dataIndex + 1]; // 绿色
                    pixelData[pixelIndex++] = data[dataIndex];     // 红色
                }
                
                // 每行填充到4字节对齐
                const padding = (4 - (canvas.width * 3) % 4) % 4;
                for (let p = 0; p < padding; p++) {
                    pixelData[pixelIndex++] = 0;
                }
            }
            
            // 合并文件头和像素数据
            const bmpData = new Uint8Array(fileSize);
            bmpData.set(new Uint8Array(fileHeader), 0);
            bmpData.set(pixelData, 54);
            
            // 转换为base64数据URL
            const base64String = btoa(String.fromCharCode.apply(null, bmpData));
            return `data:image/bmp;base64,${base64String}`;
        }
        
        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // 初始化应用
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
