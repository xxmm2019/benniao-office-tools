<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>屏幕颜色吸管工具 -- 笨鸟办公工具集箱</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"
     crossorigin="anonymous"></script>
    <link rel="canonical" href="https://www.benniaooffice.com/tools/benniao-eyedropper/">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a3a, #2c3e50);
            color: #f1f1f1;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background-color: rgba(30, 40, 50, 0.85);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #4fc3f7;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        
        .subtitle {
            font-size: 1.1rem;
            margin-bottom: 30px;
            color: #aaa;
        }
        
        .color-preview {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: 4px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .color-preview:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }
        
        .color-info {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .color-value {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            min-width: 200px;
            user-select: all;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .color-value:hover {
            background-color: rgba(0, 0, 0, 0.4);
        }
        
        .color-value:active {
            transform: scale(0.98);
        }
        
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 16px 32px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        
        .btn-primary {
            background: linear-gradient(to right, #4fc3f7, #2979ff);
            color: white;
        }
        
        .btn-secondary {
            background: linear-gradient(to right, #ff9800, #f57c00);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(to right, #4CAF50, #2E7D32);
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .magnifier {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 3px solid white;
            border-radius: 50%;
            overflow: hidden;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
            display: none;
        }
        
        .magnifier canvas {
            width: 100%;
            height: 100%;
        }
        
        .crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 3px;
            height: 3px;
            background-color: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 0 1px black;
        }
        
        .instructions {
            background-color: rgba(0, 0, 0, 0.25);
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
            text-align: left;
        }
        
        .instructions h3 {
            color: #4fc3f7;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .instructions ol {
            margin-left: 20px;
            line-height: 1.6;
        }
        
        .instructions li {
            margin-bottom: 8px;
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(to right, #4CAF50, #2E7D32);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transform: translateX(150%);
            transition: transform 0.4s ease;
            z-index: 1001;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #aaa;
            text-align: center;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .color-preview {
                width: 150px;
                height: 150px;
            }
            
            .color-value {
                font-size: 1.2rem;
                min-width: 180px;
            }
            
            .btn {
                padding: 14px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-eye-dropper"></i> 屏幕颜色吸管</h1>
        <p class="subtitle">单击"启动吸管"按钮，然后在屏幕任意位置选择颜色</p>
        
        <div class="color-preview" id="colorPreview"></div>
        
        <div class="color-info">
            <div class="color-value" id="colorValue">#000000</div>
        </div>
        
        <div class="buttons">
            <button class="btn btn-primary" id="startPicker">
                <i class="fas fa-eye-dropper"></i> 启动吸管
            </button>
            <button class="btn btn-secondary" id="stopPicker" disabled>
                <i class="fas fa-stop"></i> 停止拾取
            </button>
            <button class="btn btn-success" id="copyColor">
                <i class="fas fa-copy"></i> 复制颜色值
            </button>
        </div>
        
        <div class="instructions">
            <h3><i class="fas fa-info-circle"></i> 使用说明</h3>
            <ol>
                <li>点击"启动吸管"按钮，允许工具捕获您的屏幕</li>
                <li>移动鼠标到您想要取色的位置</li>
                <li>单击鼠标左键选择颜色，或按ESC键取消</li>
                <li>使用"复制颜色值"按钮复制当前颜色</li>
                <li>要停止取色，点击"停止拾取"按钮或按ESC键</li>
            </ol>
        </div>
        
        <footer>
            <p>© 2026 笨鸟办公工具集箱 | 屏幕颜色吸管工具</p>
        </footer>
    </div>
    
    <div class="magnifier" id="magnifier">
        <canvas id="magnifierCanvas"></canvas>
        <div class="crosshair"></div>
    </div>
    
    <div class="notification" id="notification">
        <i class="fas fa-check-circle"></i>
        <span id="notificationText">颜色已复制到剪贴板</span>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // DOM元素
            const startPickerBtn = document.getElementById('startPicker');
            const stopPickerBtn = document.getElementById('stopPicker');
            const copyColorBtn = document.getElementById('copyColor');
            const colorPreview = document.getElementById('colorPreview');
            const colorValue = document.getElementById('colorValue');
            const magnifier = document.getElementById('magnifier');
            const magnifierCanvas = document.getElementById('magnifierCanvas');
            const magnifierCtx = magnifierCanvas.getContext('2d');
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notificationText');
            
            // 状态变量
            let isPicking = false;
            let currentColor = '#000000';
            let mediaStream = null;
            let videoElement = null;
            
            // 初始化颜色预览
            colorPreview.style.backgroundColor = currentColor;
            
            // 启动颜色拾取器
            startPickerBtn.addEventListener('click', async function() {
                try {
                    // 请求屏幕共享权限
                    mediaStream = await navigator.mediaDevices.getDisplayMedia({
                        video: { 
                            cursor: 'always'
                        },
                        audio: false
                    });
                    
                    // 创建隐藏的video元素来捕获屏幕
                    videoElement = document.createElement('video');
                    videoElement.srcObject = mediaStream;
                    videoElement.autoplay = true;
                    videoElement.style.display = 'none';
                    document.body.appendChild(videoElement);
                    
                    // 等待video元素准备好
                    await new Promise(resolve => {
                        videoElement.onloadedmetadata = () => {
                            videoElement.play();
                            resolve();
                        };
                    });
                    
                    // 设置拾取状态
                    isPicking = true;
                    startPickerBtn.disabled = true;
                    stopPickerBtn.disabled = false;
                    magnifier.style.display = 'block';
                    
                    // 显示提示
                    showNotification('取色模式已启动，移动鼠标选择颜色，点击左键确认', 'info');
                    
                } catch (error) {
                    console.error('无法访问屏幕:', error);
                    showNotification('无法访问屏幕，请确保已授予权限', 'error');
                    showNotification('将使用备用取色模式（仅限当前页面）', 'info');
                    
                    // 使用备用方案：仅当前页面取色
                    startPageColorPicker();
                }
            });
            
            // 备用方案：仅当前页面取色
            function startPageColorPicker() {
                isPicking = true;
                startPickerBtn.disabled = true;
                stopPickerBtn.disabled = false;
                magnifier.style.display = 'none'; // 隐藏放大镜，因为备用方案不支持
                
                showNotification('当前页面取色模式已启动，移动鼠标选择颜色', 'info');
            }
            
            // 停止颜色拾取器
            stopPickerBtn.addEventListener('click', stopColorPicker);
            
            // 复制颜色值
            copyColorBtn.addEventListener('click', function() {
                navigator.clipboard.writeText(currentColor).then(() => {
                    showNotification(`颜色值 ${currentColor} 已复制到剪贴板`);
                }).catch(err => {
                    // 备用复制方法
                    const textArea = document.createElement('textarea');
                    textArea.value = currentColor;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        showNotification(`颜色值 ${currentColor} 已复制到剪贴板`);
                    } catch (e) {
                        showNotification('复制失败，请手动复制颜色值', 'error');
                    }
                    document.body.removeChild(textArea);
                });
            });
            
            // 鼠标移动事件 - 实时预览颜色
            document.addEventListener('mousemove', function(e) {
                if (!isPicking) return;
                
                // 更新放大镜位置
                magnifier.style.left = (e.clientX + 15) + 'px';
                magnifier.style.top = (e.clientY + 15) + 'px';
                
                // 获取颜色
                let color = '#000000';
                
                if (videoElement && mediaStream) {
                    // 从屏幕共享视频中获取颜色
                    try {
                        magnifierCanvas.width = magnifier.clientWidth;
                        magnifierCanvas.height = magnifier.clientHeight;
                        
                        // 绘制放大镜视图
                        const zoom = 5;
                        const size = 20;
                        
                        magnifierCtx.drawImage(
                            videoElement,
                            e.screenX - size/2, e.screenY - size/2, size, size,
                            0, 0, magnifierCanvas.width, magnifierCanvas.height
                        );
                        
                        // 在放大镜上绘制网格
                        drawMagnifierGrid();
                        
                        // 创建临时canvas获取颜色
                        const tempCanvas = document.createElement('canvas');
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCanvas.width = 1;
                        tempCanvas.height = 1;
                        
                        tempCtx.drawImage(videoElement, e.screenX, e.screenY, 1, 1, 0, 0, 1, 1);
                        const pixelData = tempCtx.getImageData(0, 0, 1, 1).data;
                        color = rgbToHex(pixelData[0], pixelData[1], pixelData[2]);
                        
                    } catch (err) {
                        // 如果无法从视频获取，尝试备用方法
                        color = getColorFromPage(e.clientX, e.clientY);
                    }
                } else {
                    // 从当前页面获取颜色（备用方案）
                    color = getColorFromPage(e.clientX, e.clientY);
                }
                
                // 更新颜色预览
                updateColorPreview(color, false);
            });
            
            // 在放大镜上绘制网格
            function drawMagnifierGrid() {
                const gridSize = magnifierCanvas.width / 10;
                magnifierCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                magnifierCtx.lineWidth = 1;
                
                // 绘制垂直线
                for (let x = 0; x <= magnifierCanvas.width; x += gridSize) {
                    magnifierCtx.beginPath();
                    magnifierCtx.moveTo(x, 0);
                    magnifierCtx.lineTo(x, magnifierCanvas.height);
                    magnifierCtx.stroke();
                }
                
                // 绘制水平线
                for (let y = 0; y <= magnifierCanvas.height; y += gridSize) {
                    magnifierCtx.beginPath();
                    magnifierCtx.moveTo(0, y);
                    magnifierCtx.lineTo(magnifierCanvas.width, y);
                    magnifierCtx.stroke();
                }
                
                // 绘制中心十字线
                magnifierCtx.strokeStyle = 'white';
                magnifierCtx.lineWidth = 2;
                magnifierCtx.beginPath();
                magnifierCtx.moveTo(magnifierCanvas.width/2, 0);
                magnifierCtx.lineTo(magnifierCanvas.width/2, magnifierCanvas.height);
                magnifierCtx.stroke();
                magnifierCtx.beginPath();
                magnifierCtx.moveTo(0, magnifierCanvas.height/2);
                magnifierCtx.lineTo(magnifierCanvas.width, magnifierCanvas.height/2);
                magnifierCtx.stroke();
            }
            
            // 鼠标点击事件 - 选择颜色
            document.addEventListener('click', function(e) {
                if (!isPicking) return;
                
                e.preventDefault();
                
                let color = '#000000';
                
                if (videoElement && mediaStream) {
                    try {
                        // 从屏幕共享视频中获取颜色
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = 1;
                        canvas.height = 1;
                        
                        ctx.drawImage(videoElement, e.screenX, e.screenY, 1, 1, 0, 0, 1, 1);
                        const pixelData = ctx.getImageData(0, 0, 1, 1).data;
                        color = rgbToHex(pixelData[0], pixelData[1], pixelData[2]);
                    } catch (err) {
                        color = getColorFromPage(e.clientX, e.clientY);
                    }
                } else {
                    // 从当前页面获取颜色（备用方案）
                    color = getColorFromPage(e.clientX, e.clientY);
                }
                
                // 更新颜色
                updateColorPreview(color, true);
                
                // 显示成功消息
                showNotification(`已选择颜色: ${color}`);
                
                // 停止拾取
                stopColorPicker();
            });
            
            // ESC键停止拾取
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && isPicking) {
                    stopColorPicker();
                    showNotification('取色模式已取消', 'info');
                }
            });
            
            // 从页面获取颜色（备用方案）
            function getColorFromPage(x, y) {
                const element = document.elementFromPoint(x, y);
                if (element) {
                    // 获取元素的背景颜色
                    const style = window.getComputedStyle(element);
                    let bgColor = style.backgroundColor;
                    
                    // 如果背景颜色是透明或rgba(0,0,0,0)，尝试获取父元素的颜色
                    if (bgColor === 'rgba(0, 0, 0, 0)' || bgColor === 'transparent') {
                        // 向上查找3层父元素
                        let parent = element.parentElement;
                        for (let i = 0; i < 3 && parent; i++) {
                            const parentStyle = window.getComputedStyle(parent);
                            bgColor = parentStyle.backgroundColor;
                            if (bgColor !== 'rgba(0, 0, 0, 0)' && bgColor !== 'transparent') {
                                break;
                            }
                            parent = parent.parentElement;
                        }
                    }
                    
                    // 转换rgb/rgba为hex
                    if (bgColor && bgColor.startsWith('rgb')) {
                        const rgb = bgColor.match(/\d+/g).map(Number);
                        return rgbToHex(rgb[0], rgb[1], rgb[2]);
                    }
                }
                return '#000000';
            }
            
            // 更新颜色预览
            function updateColorPreview(color, isFinal) {
                currentColor = color;
                colorPreview.style.backgroundColor = color;
                
                // 根据颜色亮度调整文本颜色
                const brightness = getBrightness(color);
                colorValue.style.color = brightness > 128 ? '#000' : '#fff';
                colorValue.style.backgroundColor = brightness > 128 ? 'rgba(255, 255, 255, 0.3)' : 'rgba(0, 0, 0, 0.3)';
                
                // 更新颜色值显示
                colorValue.textContent = color;
                
                if (isFinal) {
                    // 如果是最终选择，添加选中动画
                    colorPreview.style.transform = 'scale(1.1)';
                    setTimeout(() => {
                        colorPreview.style.transform = 'scale(1)';
                    }, 300);
                }
            }
            
            // 停止颜色拾取
            function stopColorPicker() {
                isPicking = false;
                startPickerBtn.disabled = false;
                stopPickerBtn.disabled = true;
                magnifier.style.display = 'none';
                
                // 停止屏幕共享
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                    mediaStream = null;
                }
                
                // 移除video元素
                if (videoElement) {
                    document.body.removeChild(videoElement);
                    videoElement = null;
                }
            }
            
            // 显示通知
            function showNotification(message, type = 'success') {
                notificationText.textContent = message;
                
                // 设置不同通知类型的样式
                if (type === 'error') {
                    notification.style.background = 'linear-gradient(to right, #f44336, #c62828)';
                } else if (type === 'info') {
                    notification.style.background = 'linear-gradient(to right, #2196F3, #0D47A1)';
                } else {
                    notification.style.background = 'linear-gradient(to right, #4CAF50, #2E7D32)';
                }
                
                notification.classList.add('show');
                
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 3000);
            }
            
            // 工具函数：RGB转十六进制
            function rgbToHex(r, g, b) {
                return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
            }
            
            // 工具函数：获取颜色亮度
            function getBrightness(hexColor) {
                // 转换hex为rgb
                const r = parseInt(hexColor.slice(1, 3), 16);
                const g = parseInt(hexColor.slice(3, 5), 16);
                const b = parseInt(hexColor.slice(5, 7), 16);
                
                // 计算相对亮度
                return (r * 299 + g * 587 + b * 114) / 1000;
            }
            
            // 页面卸载时清理资源
            window.addEventListener('beforeunload', function() {
                if (mediaStream) {
                    mediaStream.getTracks().forEach(track => track.stop());
                }
            });
            
            // 初始化放大镜canvas尺寸
            magnifierCanvas.width = magnifier.clientWidth;
            magnifierCanvas.height = magnifier.clientHeight;
        });
    </script>
</body>
</html>
