                    const nameItem = document.createElement('div');
                    nameItem.className = 'name-item';
                    
                    // 添加名字
                    const nameText = document.createElement('div');
                    nameText.className = 'name-text';
                    nameText.textContent = fullName;
                    nameItem.appendChild(nameText);
                    
                    // 添加解释
                    const explanation = document.createElement('div');
                    explanation.className = 'name-explanation';
                    
                    // 添加解释标签
                    const tags = document.createElement('div');
                    tags.style.marginBottom = '8px';
                    
                    // 根据性别添加标签
                    if (gender === 'male') {
                        tags.innerHTML += '<span class="explanation-tag">男孩名</span>';
                    } else if (gender === 'female') {
                        tags.innerHTML += '<span class="explanation-tag">女孩名</span>';
                    } else {
                        tags.innerHTML += '<span class="explanation-tag">中性名</span>';
                    }
                    
                    // 根据字数添加标签
                    if (length === "2") {
                        tags.innerHTML += '<span class="explanation-tag">两字名</span>';
                    } else if (length === "3") {
                        tags.innerHTML += '<span class="explanation-tag">三字名</span>';
                    } else {
                        tags.innerHTML += '<span class="explanation-tag">四字名</span>';
                    }
                    
                    explanation.appendChild(tags);
                    
                    // 添加解释文本
                    const explanationText = document.createElement('p');
                    explanationText.textContent = nameData.explanation;
                    explanation.appendChild(explanationText);
                    
                    nameItem.appendChild(explanation);
                    
                    // 添加到列表
                    namesList.appendChild(nameItem);
                }
                
                // 更新按钮文本
                generateBtn.innerHTML = '<i class="fas fa-sync-alt"></i> 换一批名字';
            }
            
            // 重置函数
            function resetForm() {
                surnameInput.value = '';
                genderSelect.value = 'male';
                lengthSelect.value = '3';
                namesList.innerHTML = '输入姓氏并选择性别和名字字数后，点击"开始取名"按钮生成名字';
                namesList.className = 'placeholder';
                generateBtn.innerHTML = '<i class="fas fa-magic"></i> 开始取名';
            }
            
            // 添加事件监听
            generateBtn.addEventListener('click', generateNames);
            resetBtn.addEventListener('click', resetForm);
            
            // 初始示例数据
            surnameInput.value = '任';
            
            // 键盘支持：按Enter键生成名字
            surnameInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    generateNames();
                }
            });
        });
    </script>
</body>
</html>
