<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本反转工具 - 笨鸟办公工具集箱</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"
     crossorigin="anonymous"></script>
    <link rel="canonical" href="https://www.benniaooffice.com/tools/text-reverser/app.html">
    <style>
        :root {
            --accent: #f97316;
            --accent-soft: #f9731633;
            --bg: #0f172a;
            --text: #0f172a;
            --text-muted: #475569;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f97316 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.3rem;
            margin-bottom: 8px;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 18px;
            padding: 26px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        label {
            font-size: 14px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="number"],
        input[type="url"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
            font-family: inherit;
        }

        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            background: var(--accent);
            color: white;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
            background-color: #ea580c;
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #64748b;
        }

        .btn-secondary:hover {
            background: #475569;
        }

        .btn-success {
            background: #10b981;
        }

        .muted {
            color: var(--text-muted);
            font-size: 13px;
        }

        .output-box {
            background: #f8fafc;
            border: 1px dashed var(--border);
            padding: 12px;
            border-radius: 12px;
            margin-top: 16px;
        }

        .preview {
            width: 100%;
            min-height: 180px;
            border-radius: 12px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview img {
            max-width: 100%;
            max-height: 300px;
            display: block;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--text);
            font-size: 12px;
        }

        .result {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        .code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
            font-size: 13px;
        }

        .tooltip {
            position: relative;
            display: inline-block;
        }

        .tooltip .tooltiptext {
            visibility: hidden;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            padding: 5px 10px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 12px;
            white-space: nowrap;
        }

        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .card {
                padding: 20px;
            }
            
            .row {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>文本反转工具</h1>
            <p>支持整段或按行反转文本</p>
        </div>
        <div class="card">
            <div>
                <label for="input">输入文本</label>
                <textarea id="input" placeholder="粘贴需要反转的文本"></textarea>
            </div>
            <div class="row" style="margin-top: 16px;">
                <div style="min-width: 200px; flex: 1;">
                    <label for="mode">反转模式</label>
                    <select id="mode">
                        <option value="chars">整段字符反转</option>
                        <option value="lines">按行顺序反转</option>
                        <option value="each-line">每行内部反转</option>
                    </select>
                </div>
                <div class="actions">
                    <button class="btn" id="convert">开始反转</button>
                    <button class="btn btn-secondary" id="copy">复制结果</button>
                </div>
            </div>
            <div class="output-box">
                <label for="output">输出结果</label>
                <textarea id="output" readonly placeholder="反转后的文本"></textarea>
            </div>
        </div>
    </div>

    <script>
        const input = document.getElementById('input');
        const mode = document.getElementById('mode');
        const output = document.getElementById('output');
        const convertBtn = document.getElementById('convert');
        const copyBtn = document.getElementById('copy');

        // 文本反转函数
        function reverseText() {
            const value = input.value;
            if (!value) {
                output.value = '';
                return;
            }
            
            switch(mode.value) {
                case 'chars':
                    // 整段字符反转
                    output.value = value.split('').reverse().join('');
                    break;
                case 'lines':
                    // 按行顺序反转
                    output.value = value.split(/\r?\n/).reverse().join('\n');
                    break;
                case 'each-line':
                    // 每行内部反转
                    output.value = value.split(/\r?\n/).map(line => 
                        line.split('').reverse().join('')
                    ).join('\n');
                    break;
                default:
                    output.value = value;
            }
        }

        // 复制文本到剪贴板
        async function copyToClipboard() {
            if (!output.value) {
                alert('没有内容可以复制');
                return;
            }
            
            try {
                await navigator.clipboard.writeText(output.value);
                
                // 显示复制成功反馈
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '已复制！';
                copyBtn.classList.add('btn-success');
                
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                    copyBtn.classList.remove('btn-success');
                }, 2000);
                
            } catch (err) {
                console.error('复制失败:', err);
                
                // 降级方案：使用旧的execCommand方法
                output.select();
                try {
                    const successful = document.execCommand('copy');
                    if (successful) {
                        copyBtn.textContent = '已复制！';
                        setTimeout(() => {
                            copyBtn.textContent = '复制结果';
                        }, 2000);
                    } else {
                        alert('复制失败，请手动选择文本并复制');
                    }
                } catch (execErr) {
                    alert('复制失败，请手动选择文本并复制');
                }
            }
        }

        // 事件监听
        convertBtn.addEventListener('click', reverseText);
        copyBtn.addEventListener('click', copyToClipboard);

        // 输入框内容变化时自动更新（可选功能）
        input.addEventListener('input', () => {
            if (input.value.trim()) {
                reverseText();
            } else {
                output.value = '';
            }
        });

        // 模式切换时自动更新
        mode.addEventListener('change', () => {
            if (input.value.trim()) {
                reverseText();
            }
        });
    </script>
</body>
</html>
