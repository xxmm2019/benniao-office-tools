<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线智能提词器- 笨鸟办公工具集箱</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"
     crossorigin="anonymous"></script>
    <link rel="canonical" href="https://www.benniaooffice.com/tools/benniao-teleprompter/">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #a855f7;
        }

        .subtitle {
            color: #94a3b8;
        }

        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .control-panel {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            height: fit-content;
        }

        .control-section {
            margin-bottom: 20px;
        }

        .control-section h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #cbd5e1;
        }

        #textInput {
            width: 100%;
            min-height: 150px;
            padding: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid #a855f7;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            line-height: 1.5;
            resize: vertical;
            margin-bottom: 10px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #a855f7;
            color: white;
        }

        .btn-primary:hover {
            background: #9333ea;
        }

        .btn-secondary {
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(168, 85, 247, 0.2);
        }

        .slider-control {
            margin-bottom: 15px;
        }

        .slider-control label {
            display: block;
            margin-bottom: 5px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .slider-value {
            float: right;
            background: rgba(168, 85, 247, 0.2);
            padding: 2px 10px;
            border-radius: 6px;
            color: #a855f7;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            width: 18px;
            height: 18px;
            background: #a855f7;
            border-radius: 50%;
            cursor: pointer;
        }

        .display-area {
            background: #1e293b;
            border-radius: 12px;
            padding: 30px;
            min-height: 500px;
        }

        .teleprompter-container {
            height: 400px;
            overflow: hidden;
            position: relative;
        }

        .teleprompter-content {
            position: absolute;
            width: 100%;
            top: 40%;
            padding: 20px;
            transition: top 0.1s linear;
            font-size: 48px;
            text-align: center;
            color: white;
        }

        .placeholder {
            text-align: center;
            color: #64748b;
            padding: 100px 20px;
        }

        .playback-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .play-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #a855f7;
            color: white;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.3);
            color: white;
            cursor: pointer;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #a855f7;
            transition: width 0.1s linear;
        }

        #fileInput {
            display: none;
        }

        .message {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 20px;
            background: #1e293b;
            border-radius: 8px;
            color: white;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>在线智能提词器</h1>
            <p class="subtitle">专业提词工具，支持文本导入、自动滚动</p>
        </header>

        <main class="main-content">
            <aside class="control-panel">
                <div class="control-section">
                    <h3> 导入文本</h3>
                    <textarea id="textInput" placeholder="输入或粘贴文本内容..."></textarea>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="loadFromTextInput()">应用文本</button>
                        <button class="btn btn-secondary" onclick="importFile()">导入TXT</button>
                        <button class="btn btn-secondary" onclick="clearText()">清空</button>
                    </div>
                    <input type="file" id="fileInput" accept=".txt" onchange="handleFileSelect(event)">
                </div>

                <div class="control-section">
                    <h3> 字体设置</h3>
                    <div class="slider-control">
                        <label>字体大小 <span class="slider-value" id="fontSizeValue">48px</span></label>
                        <input type="range" id="fontSize" min="24" max="120" value="48" step="2">
                    </div>
                    <div class="slider-control">
                        <label>滚动速度 <span class="slider-value" id="speedValue">5</span></label>
                        <input type="range" id="scrollSpeed" min="1" max="20" value="5" step="1">
                    </div>
                </div>

                <div class="control-section">
                    <h3> 高级选项</h3>
                    <div style="display: flex; gap: 20px;">
                        <label style="color: #94a3b8;">
                            <input type="checkbox" id="mirrorToggle" onchange="toggleMirror()">
                            镜像模式
                        </label>
                        <label style="color: #94a3b8;">
                            <input type="checkbox" id="autoSplitToggle" checked onchange="toggleAutoSplit()">
                            自动分段
                        </label>
                    </div>
                </div>
            </aside>

            <section class="display-area">
                <div class="teleprompter-container" id="teleprompterContainer">
                    <div class="teleprompter-content" id="teleprompterContent">
                        <div class="placeholder">
                            <p> 请在左侧输入或粘贴文本</p>
                            <p style="font-size: 1rem; margin-top: 10px; color: #64748b;">
                                支持自动分段、实时滚动
                            </p>
                        </div>
                    </div>
                </div>

                <div class="playback-controls">
                    <button class="control-btn" onclick="resetScroll()" title="重置"></button>
                    <button class="play-btn" id="playBtn" onclick="togglePlay()"></button>
                    <button class="control-btn" onclick="toggleFullscreen()" title="全屏"></button>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let isPlaying = false;
        let scrollSpeed = 5;
        let currentText = '';
        let animationId = null;
        let currentPosition = 40;
        let isMirror = false;
        let autoSplit = true;
        let isFullscreen = false;

        // 初始化
        document.getElementById('fontSize').addEventListener('input', (e) => {
            const size = e.target.value;
            document.getElementById('fontSizeValue').textContent = size + 'px';
            document.getElementById('teleprompterContent').style.fontSize = size + 'px';
        });

        document.getElementById('scrollSpeed').addEventListener('input', (e) => {
            scrollSpeed = parseInt(e.target.value);
            document.getElementById('speedValue').textContent = scrollSpeed;
        });

        // 导入文件
        function importFile() {
            document.getElementById('fileInput').click();
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('textInput').value = e.target.result;
                loadFromTextInput();
                showMessage('文件导入成功');
            };
            reader.readAsText(file, 'UTF-8');
        }

        // 加载文本
        function loadFromTextInput() {
            const text = document.getElementById('textInput').value.trim();
            if (!text) {
                showMessage('请先输入文本内容', 'error');
                return;
            }
            
            currentText = text;
            let formattedText = text;
            
            if (autoSplit) {
                formattedText = text
                    .split(/\n\s*\n/)
                    .filter(p => p.trim())
                    .map(p => p.trim())
                    .join('\n\n');
                
                if (!formattedText.includes('\n\n')) {
                    formattedText = text
                        .split(/[。！？.!?]\s*/)
                        .filter(s => s.trim())
                        .map(s => s.trim() + '。')
                        .join('\n\n');
                }
            }
            
            const paragraphs = formattedText
                .split('\n\n')
                .map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`)
                .join('');
            
            document.getElementById('teleprompterContent').innerHTML = paragraphs;
            resetScroll();
            showMessage('文本应用成功');
        }

        // 清空文本
        function clearText() {
            document.getElementById('textInput').value = '';
            document.getElementById('teleprompterContent').innerHTML = `
                <div class="placeholder">
                    <p> 请在左侧输入或粘贴文本</p>
                </div>`;
            resetScroll();
            showMessage('内容已清空');
        }

        // 播放控制
        function togglePlay() {
            if (!currentText) {
                showMessage('请先导入文本内容', 'error');
                return;
            }
            
            isPlaying = !isPlaying;
            document.getElementById('playBtn').textContent = isPlaying ? '' : '';
            
            if (isPlaying) {
                startScroll();
            } else {
                stopScroll();
            }
        }

        function startScroll() {
            const content = document.getElementById('teleprompterContent');
            const container = document.getElementById('teleprompterContainer');
            
            function scroll() {
                if (!isPlaying) return;
                
                currentPosition -= scrollSpeed / 100;
                content.style.top = currentPosition + '%';
                
                const contentHeight = content.offsetHeight;
                const containerHeight = container.offsetHeight;
                const progress = Math.min((40 - currentPosition) / (40 + contentHeight/containerHeight*100) * 100, 100);
                document.getElementById('progressFill').style.width = progress + '%';
                
                if (currentPosition + contentHeight/containerHeight*100 <= 0) {
                    stopScroll();
                    showMessage('播放完成');
                    return;
                }
                
                animationId = requestAnimationFrame(scroll);
            }
            
            scroll();
        }

        function stopScroll() {
            isPlaying = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
        }

        function resetScroll() {
            stopScroll();
            currentPosition = 40;
            document.getElementById('teleprompterContent').style.top = '40%';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('playBtn').textContent = '';
        }

        // 高级功能
        function toggleMirror() {
            isMirror = !isMirror;
            document.getElementById('teleprompterContent').style.transform = 
                isMirror ? 'scaleX(-1)' : 'none';
        }

        function toggleAutoSplit() {
            autoSplit = !autoSplit;
            if (currentText) {
                loadFromTextInput();
            }
        }

        function toggleFullscreen() {
            if (!currentText) {
                showMessage('请先导入文本内容', 'error');
                return;
            }
            
            if (!isFullscreen) {
                const elem = document.querySelector('.display-area');
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                }
                isFullscreen = true;
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
                isFullscreen = false;
            }
        }

        // 消息提示
        function showMessage(text, type = 'success') {
            const message = document.createElement('div');
            message.className = 'message';
            message.textContent = text;
            message.style.background = type === 'error' ? '#ef4444' : '#1e293b';
            document.body.appendChild(message);
            
            setTimeout(() => {
                message.remove();
            }, 3000);
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePlay();
            } else if (e.code === 'ArrowUp') {
                e.preventDefault();
                scrollSpeed = Math.min(scrollSpeed + 1, 20);
                document.getElementById('scrollSpeed').value = scrollSpeed;
                document.getElementById('speedValue').textContent = scrollSpeed;
            } else if (e.code === 'ArrowDown') {
                e.preventDefault();
                scrollSpeed = Math.max(scrollSpeed - 1, 1);
                document.getElementById('scrollSpeed').value = scrollSpeed;
                document.getElementById('speedValue').textContent = scrollSpeed;
            } else if (e.code === 'KeyF') {
                e.preventDefault();
                toggleFullscreen();
            } else if (e.code === 'Escape' && document.fullscreenElement) {
                isFullscreen = false;
            }
        });
    </script>
</body>
</html>
