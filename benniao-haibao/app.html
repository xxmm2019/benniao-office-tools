    <script>
        // DOM元素 - 提前缓存，避免重复查询
        const posterForm = document.getElementById('posterForm');
        const generateBtn = document.getElementById('generateBtn');
        const btnText = document.getElementById('btnText');
        const previewArea = document.getElementById('previewArea');
        const previewPlaceholder = document.getElementById('previewPlaceholder');
        const posterCanvas = document.getElementById('posterCanvas');
        const downloadBtn = document.getElementById('downloadBtn');
        const backgroundInput = document.getElementById('background');
        const fileNameDiv = document.getElementById('fileName');
        const qrCodeTemp = document.getElementById('qrCodeTemp');
        const urlInput = document.getElementById('url');
        const titleInput = document.getElementById('title');
        const subtitleInput = document.getElementById('subtitle');
        const descriptionInput = document.getElementById('description');
        
        // 海报生成参数 - 集中管理，便于维护
        const posterConfig = {
            width: 1080,
            height: 1920,
            title: {
                fontSize: 82,
                fontFamily: 'Arial, sans-serif',
                color: '#ffffff',
                x: 220,
                y: 300,
                maxWidth: 880
            },
            subtitle: {
                fontSize: 36,
                fontFamily: 'Arial, sans-serif',
                color: '#e2e8f0',
                x: 200,
                y: 350,
                maxWidth: 880
            },
            description: {
                fontSize: 28,
                fontFamily: 'Arial, sans-serif',
                color: '#cbd5e1',
                x: 100,
                y: 1700,
                maxWidth: 900,
                lineHeight: 40
            },
            qrCode: {
                size: 300,
                x: 390,
                y: 1300,
                padding: 20
            }
        };

        // 检查QRCode库是否加载成功
        function checkQRCodeLibrary() {
            if (typeof QRCode === 'undefined') {
                showMessage(' 二维码库加载失败，正在尝试备用方案...', 'error');
                return loadBackupQRCode();
            }
            return Promise.resolve();
        }

        // 加载备用的二维码生成方案
        function loadBackupQRCode() {
            return new Promise((resolve, reject) => {
                // 避免重复加载备用脚本
                if (document.getElementById('backup-qrcode-script')) {
                    resolve();
                    return;
                }
                const backupScript = document.createElement('script');
                backupScript.id = 'backup-qrcode-script';
                backupScript.src = 'https://www.benniaooffice.com/bntool/assets/vendor/qrcodejs/qrcode.min.js';
                backupScript.onload = resolve;
                backupScript.onerror = () => {
                    showMessage(' 二维码库加载失败，请刷新页面重试', 'error');
                    reject(new Error('QRCode library failed to load'));
                };
                document.head.appendChild(backupScript);
            });
        }

        // 文件上传处理 - 优化文件名显示，增加大小限制提示
        backgroundInput.addEventListener('change', function(e) {
            fileNameDiv.textContent = '';
            if (this.files && this.files[0]) {
                const file = this.files[0];
                // 限制文件大小为10MB
                const maxSize = 10 * 1024 * 1024;
                if (file.size > maxSize) {
                    showMessage(` 文件过大（${(file.size/1024).toFixed(1)}KB），请选择10MB以内的图片`, 'error');
                    this.value = '';
                    return;
                }
                fileNameDiv.textContent = ` 已选择: ${file.name} (${(file.size / 1024).toFixed(1)}KB)`;
            }
        });

        // 拖拽上传 - 修复边框样式丢失问题
        previewArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.style.borderColor = 'var(--purple-500)';
        });

        previewArea.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.style.borderColor = 'var(--border-default)';
        });

        previewArea.addEventListener('drop', function(e) {
            e.preventDefault();
            this.style.borderColor = 'var(--border-default)';
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                backgroundInput.files = e.dataTransfer.files;
                // 手动触发change事件，复用文件校验逻辑
                const changeEvent = new Event('change');
                backgroundInput.dispatchEvent(changeEvent);
            }
        });

        // 生成海报 - 优化逻辑，增加容错
        posterForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const url = urlInput.value.trim();
            const title = titleInput.value.trim() || '海报标题';
            const subtitle = subtitleInput.value.trim() || '副标题';
            const description = descriptionInput.value.trim() || '描述文字';
            const backgroundFile = backgroundInput.files[0];

            // 验证URL
            if (!isValidUrl(url)) {
                showMessage('请输入有效的链接地址（支持网址/小程序链接）', 'error');
                return;
            }

            // 显示加载状态
            generateBtn.disabled = true;
            btnText.innerHTML = '<span class="loading"></span> 生成中...';

            try {
                // 检查二维码库
                await checkQRCodeLibrary();
                
                // 创建Canvas上下文 - 增加容错
                const ctx = posterCanvas.getContext('2d');
                if (!ctx) {
                    throw new Error('Canvas上下文创建失败，请更换浏览器重试');
                }
                
                // 清空画布
                ctx.clearRect(0, 0, posterConfig.width, posterConfig.height);

                // 绘制背景
                await drawBackground(ctx, backgroundFile);

                // 绘制文字
                drawText(ctx, title, subtitle, description);

                // 生成并绘制二维码
                await drawQRCode(ctx, url);

                // 显示海报
                posterCanvas.style.display = 'block';
                previewPlaceholder.style.display = 'none';
                downloadBtn.style.display = 'block';

                showMessage(' 海报生成成功!', 'success');
            } catch (error) {
                console.error('生成海报时出错:', error);
                showMessage(` 生成失败: ${error.message || '未知错误'}`, 'error');
            } finally {
                // 恢复按钮状态
                generateBtn.disabled = false;
                btnText.textContent = ' 生成海报';
            }
        });

        // 绘制背景 - 优化图片裁剪逻辑，避免变形
        async function drawBackground(ctx, backgroundFile) {
            if (backgroundFile) {
                // 绘制上传的背景图片
                const img = new Image();
                // 禁止跨域图片污染canvas
                img.crossOrigin = 'anonymous';
                await new Promise((resolve, reject) => {
                    img.onload = resolve;
                    img.onerror = () => reject(new Error('背景图片加载失败，请选择有效的图片文件'));
                    img.src = URL.createObjectURL(backgroundFile);
                });
                
                // 居中裁剪图片 - 优化计算，确保完全覆盖画布
                const scale = Math.max(
                    posterConfig.width / img.width,
                    posterConfig.height / img.height
                );
                const newWidth = img.width * scale;
                const newHeight = img.height * scale;
                const x = (posterConfig.width - newWidth) / 2;
                const y = (posterConfig.height - newHeight) / 2;
                
                ctx.drawImage(img, x, y, newWidth, newHeight);
                // 释放URL对象，避免内存泄漏
                URL.revokeObjectURL(img.src);
            } else {
                // 绘制默认渐变背景
                const gradient = ctx.createLinearGradient(0, 0, posterConfig.width, posterConfig.height);
                gradient.addColorStop(0, '#0f172a');
                gradient.addColorStop(0.5, '#1e293b');
                gradient.addColorStop(1, '#0f172a');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, posterConfig.width, posterConfig.height);

                // 添加装饰性元素
                drawBackgroundDecorations(ctx);
            }
        }

        // 绘制背景装饰
        function drawBackgroundDecorations(ctx) {
            // 添加光晕效果
            const radialGradient = ctx.createRadialGradient(
                posterConfig.width / 2, 
                posterConfig.height / 2, 
                0,
                posterConfig.width / 2, 
                posterConfig.height / 2, 
                posterConfig.width
            );
            radialGradient.addColorStop(0, 'rgba(147, 51, 234, 0.1)');
            radialGradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = radialGradient;
            ctx.fillRect(0, 0, posterConfig.width, posterConfig.height);
        }

        // 绘制文字 - 优化换行逻辑，支持中文分词
        function drawText(ctx, title, subtitle, description) {
            // 绘制标题
            ctx.font = `bold ${posterConfig.title.fontSize}px ${posterConfig.title.fontFamily}`;
            ctx.fillStyle = posterConfig.title.color;
            ctx.textAlign = 'left';
            
            // 处理标题换行
            wrapText(ctx, title, posterConfig.title.x, posterConfig.title.y, 
                     posterConfig.title.maxWidth, posterConfig.title.fontSize + 10);

            // 绘制副标题
            ctx.font = `${posterConfig.subtitle.fontSize}px ${posterConfig.subtitle.fontFamily}`;
            ctx.fillStyle = posterConfig.subtitle.color;
            wrapText(ctx, subtitle, posterConfig.subtitle.x, 
                     posterConfig.subtitle.y + posterConfig.title.fontSize + 20, 
                     posterConfig.subtitle.maxWidth, posterConfig.subtitle.fontSize + 5);

            // 绘制描述文字
            ctx.font = `${posterConfig.description.fontSize}px ${posterConfig.description.fontFamily}`;
            ctx.fillStyle = posterConfig.description.color;
            
            const lines = description.split('\n');
            let y = posterConfig.description.y;
            lines.forEach(line => {
                if (line.trim()) {
                    wrapText(ctx, line, posterConfig.description.x, y, 
                             posterConfig.description.maxWidth, posterConfig.description.lineHeight);
                    y += posterConfig.description.lineHeight;
                }
            });
        }

        // 文字换行处理 - 优化中文支持，修复单个字符溢出问题
        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            if (!text) return;
            
            let currentText = '';
            let lineY = y;

            for (let i = 0; i < text.length; i++) {
                const char = text.charAt(i);
                const testText = currentText + char;
                const testWidth = ctx.measureText(testText).width;
                
                if (testWidth > maxWidth && currentText !== '') {
                    ctx.fillText(currentText, x, lineY);
                    currentText = char;
                    lineY += lineHeight;
                } else {
                    currentText = testText;
                }
            }

            // 绘制最后一行
            if (currentText !== '') {
                ctx.fillText(currentText, x, lineY);
            }
        }

        // 绘制二维码 - 增加容错，优化渲染
        async function drawQRCode(ctx, url) {
            return new Promise((resolve, reject) => {
                try {
                    // 清空临时容器
                    qrCodeTemp.innerHTML = '';
                    
                    // 创建二维码
                    const qr = new QRCode(qrCodeTemp, {
                        text: url,
                        width: posterConfig.qrCode.size,
                        height: posterConfig.qrCode.size,
                        colorDark: "#000000",
                        colorLight: "#FFFFFF",
                        correctLevel: QRCode.CorrectLevel.H
                    });
                    
                    // 等待二维码生成 - 增加超时处理
                    const timeoutTimer = setTimeout(() => {
                        reject(new Error('二维码生成超时'));
                    }, 3000);
                    
                    setTimeout(() => {
                        clearTimeout(timeoutTimer);
                        const qrCanvas = qrCodeTemp.querySelector('canvas');
                        if (!qrCanvas) {
                            reject(new Error('二维码生成失败'));
                            return;
                        }
                        
                        // 绘制二维码白色背景
                        ctx.fillStyle = '#ffffff';
                        ctx.fillRect(
                            posterConfig.qrCode.x - posterConfig.qrCode.padding,
                            posterConfig.qrCode.y - posterConfig.qrCode.padding,
                            posterConfig.qrCode.size + posterConfig.qrCode.padding * 2,
                            posterConfig.qrCode.size + posterConfig.qrCode.padding * 2
                        );
                        
                        // 绘制二维码
                        ctx.drawImage(
                            qrCanvas,
                            posterConfig.qrCode.x,
                            posterConfig.qrCode.y,
                            posterConfig.qrCode.size,
                            posterConfig.qrCode.size
                        );
                        
                        resolve();
                    }, 100);
                } catch (error) {
                    reject(error);
                }
            });
        }

        // 下载海报 - 优化文件名，增加容错
        downloadBtn.addEventListener('click', function() {
            try {
                // 检查canvas是否有效
                if (posterCanvas.style.display !== 'block') {
                    showMessage(' 请先生成海报再下载', 'error');
                    return;
                }
                const link = document.createElement('a');
                // 优化文件名，增加可读性
                const posterTitle = titleInput.value.trim().replace(/[^a-zA-Z0-9\u4e00-\u9fa5]/g, '_') || '未命名海报';
                link.download = `${posterTitle}_${new Date().getTime()}.png`;
                // 生成高清图片
                link.href = posterCanvas.toDataURL('image/png', 1.0);
                link.click();
                showMessage(' 开始下载高清海报...', 'success');
            } catch (error) {
                showMessage(` 下载失败: ${error.message}`, 'error');
            }
        });

        // URL验证 - 优化正则，支持更多链接格式（小程序/普通网址）
        function isValidUrl(string) {
            if (!string) return false;
            try {
                new URL(string);
                return true;
            } catch (_) {
                // 匹配小程序链接、域名等非标准URL
                return /^[a-zA-Z]+:\/\/.+/.test(string) || 
                       /^[a-zA-Z0-9][a-zA-Z0-9-]+[a-zA-Z0-9]\.[a-zA-Z]{2,}(\/.+)?$/.test(string) ||
                       /^[wx|mp]:\/\/.+/.test(string);
            }
        }
 

        // 消息提示 - 优化动画，避免消息重叠
        function showMessage(text, type = 'success') {
            // 移除之前的消息
            const existingMessages = document.querySelectorAll('.message');
            existingMessages.forEach(msg => {
                msg.style.animation = 'slideOutRight 0.3s ease';
                setTimeout(() => msg.remove(), 300);
            });
            
            // 创建新消息
            const message = document.createElement('div');
            message.className = `message ${type}`;
            message.textContent = text;
            document.body.appendChild(message);

            // 自动关闭
            setTimeout(() => {
                message.style.animation = 'slideOutRight 0.3s ease';
                setTimeout(() => message.remove(), 300);
            }, 3000);
        }

        // 初始化 - 优化逻辑，增加表单默认值
        document.addEventListener('DOMContentLoaded', function() {
            // 添加表单验证
            const inputs = document.querySelectorAll('input[required], textarea[required]');
            inputs.forEach(input => {
                input.addEventListener('invalid', function(e) {
                    e.preventDefault();
                    showMessage('请填写必填字段', 'error');
                });
            });
            
            // 显示二维码库加载状态
            if (typeof QRCode === 'undefined') {
                console.warn('QRCode库未加载，将使用备用方案');
            } else {
                console.log('QRCode库已成功加载');
            }
        });
    </script>
</body>
</html>
