        }

        .contact-copy-btn {
            padding: 6px 16px;
            background: linear-gradient(135deg, #9333ea 0%, #ec4899 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.3s ease;
            min-height: 32px;
        }

        .contact-copy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(147, 51, 234, 0.4);
        }

        .contact-copy-btn:active {
            transform: scale(0.95);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            .control-row {
                flex-direction: column;
            }

            .control-group {
                min-width: 100%;
            }

            .lottery-stage {
                height: 400px;
            }

            .name-item {
                font-size: 16px;
                padding: 10px 20px;
            }

            .stats {
                flex-direction: column;
            }

            .stat-card {
                width: 100%;
            }

            /* 移动端全屏优化 */
            .lottery-stage.fullscreen .name-item.winner.single-winner {
                font-size: 15vw;
                padding: 8vw 15vw;
            }

            .lottery-stage.fullscreen .name-item.winner.multi-winner {
                font-size: 8vw;
                padding: 4vw 6vw;
            }

            .winners-container {
                gap: 15px;
                padding: 10px;
            }

            .winners-container.count-2,
            .winners-container.count-3,
            .winners-container.count-4,
            .winners-container.count-5,
            .winners-container.count-6 {
                grid-template-columns: repeat(2, 1fr);
            }

            .close-fullscreen {
                top: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
            }
        }

        /* 消息提示 */
        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 24px;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: var(--text-primary);
            font-weight: 600;
            z-index: 1000;
            opacity: 0;
            transition: all 0.3s ease;
            min-width: 300px;
            max-width: 90vw;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .message.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .message.success {
            border-color: rgba(34, 197, 94, 0.5);
            background: rgba(34, 197, 94, 0.2);
        }

        .message.error {
            border-color: rgba(239, 68, 68, 0.5);
            background: rgba(239, 68, 68, 0.2);
        }

        /* 全屏模式下的滚动提示 */
        .fullscreen-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: var(--text-secondary);
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 20px;
            z-index: 10001;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: none;
        }

        .lottery-stage.fullscreen ~ .fullscreen-hint {
            display: block;
            animation: fadeInUp 0.5s ease 0.5s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 0.8;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* 复选框样式 */
        input[type="checkbox"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--gold-500);
            border-radius: 4px;
            background: rgba(15, 23, 42, 0.5);
            cursor: pointer;
            position: relative;
        }

        input[type="checkbox"]:checked {
            background: var(--gold-500);
        }

        input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #000;
            font-weight: bold;
        }

        /* 文件上传区域美化 */
        .file-upload-area {
            border: 2px dashed rgba(255, 215, 0, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(15, 23, 42, 0.3);
        }

        .file-upload-area:hover {
            border-color: rgba(255, 215, 0, 0.6);
            background: rgba(15, 23, 42, 0.5);
        }

        .file-upload-area.dragover {
            border-color: var(--gold-500);
            background: rgba(255, 215, 0, 0.1);
        }
    </style>
</head>
<body>
    <!-- 背景装饰 -->
    <div class="bg-decoration blob-1"></div>
    <div class="bg-decoration blob-2"></div>
    <div class="bg-decoration blob-3"></div>

    <!-- 装饰图标 -->
    <div class="decorative-icons">
        <div class="icon"></div>
        <div class="icon"></div>
        <div class="icon"></div>
        <div class="icon"></div>
        <div class="icon"></div>
        <div class="icon"></div>
        <div class="icon"></div>
        <div class="icon"></div>
    </div>

    <div class="container">
        <h1> 年会滚动抽奖</h1>
        <p class="subtitle">3D姓名墙滚动效果 | 按空格键开始/停止抽奖 | 全屏震撼显示</p>

        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="control-row">
                <div class="control-group">
                    <label for="fileInput"> 导入名单（TXT文件，每行一个姓名）</label>
                    <input type="file" id="fileInput" accept=".txt">
                </div>
                <div class="control-group">
                    <label for="drawCount"> 本轮抽取人数</label>
                    <input type="number" id="drawCount" min="1" value="1" placeholder="输入抽取人数">
                </div>
                <div class="control-group">
                    <label for="roundName"> 奖项名称</label>
                    <input type="text" id="roundName" placeholder="如：三等奖" value="幸运奖">
                </div>
            </div>
            <div class="control-row">
                <button id="startBtn" onclick="toggleLottery()">
                    <span id="startIcon"></span>
                    <span id="startText">开始抽奖（空格键）</span>
                </button>
                <button class="btn-secondary" onclick="resetLottery()">
                     重置抽奖
                </button>
                <button class="btn-secondary" onclick="exportWinners()">
                     导出中奖名单
                </button>
                <button class="btn-danger" onclick="clearAllWinners()">
                     清空中奖记录
                </button>
            </div>
            <div class="control-row" style="align-items: center;">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="excludeWinners" checked>
                    中奖后不再参与抽奖
                </label>
                <button class="btn-secondary" onclick="toggleFullscreen()" style="margin-left: auto; padding: 8px 16px; font-size: 14px;">
                     全屏显示
                </button>
            </div>
        </div>

        <!-- 统计信息 -->
        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">总人数</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="remainingCount">0</div>
                <div class="stat-label">剩余可抽</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="winnersCount">0</div>
                <div class="stat-label">已中奖</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="currentRound">0</div>
                <div class="stat-label">当前轮次</div>
            </div>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <div class="status-text" id="statusText"> 请导入名单开始抽奖</div>
            <div class="hint-text"> 按空格键开始/停止滚动，按ESC键退出全屏，点击全屏按钮进入全屏模式</div>
        </div>

        <!-- 3D姓名墙 -->
        <div class="lottery-stage">
            <div id="nameWall"></div>
        </div>

        <!-- 关闭全屏按钮 -->
        <div class="close-fullscreen" onclick="exitFullscreen()" title="退出全屏 (ESC)"></div>
        
        <!-- 全屏提示 -->
        <div class="fullscreen-hint">按ESC键退出全屏模式</div>

        <!-- 中奖名单 -->
        <div class="winners-section">
            <h2> 中奖名单</h2>
            <div id="winnersContainer">
                <p class="empty-message">暂无中奖记录</p>
            </div>
        </div>
 
    </div>

    <!-- 消息提示 -->
    <div class="message" id="message"></div>

    <script>
        // 全局变量
        let allNames = [];
        let availableNames = [];
        let winners = [];
        let roundWinners = [];
        let isRunning = false;
        let animationId = null;
        let nameElements = [];
        let currentRound = 0;

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化文件拖拽功能
            initFileDragDrop();
            
            // 更新统计信息
            updateStats();
            
            // 初始化键盘快捷键提示
            document.addEventListener('keydown', handleKeyboardShortcuts);
            
            // 初始化按钮状态
            updateButtonState();
        });

        // 初始化文件拖拽功能
        function initFileDragDrop() {
            const fileInput = document.getElementById('fileInput');
            const fileLabel = fileInput.parentElement;
            
            // 创建拖拽区域
            const dragArea = document.createElement('div');
            dragArea.className = 'file-upload-area';
            dragArea.innerHTML = `
                <div style="font-size: 48px; margin-bottom: 10px;"></div>
                <div style="margin-bottom: 5px; font-weight: 600; color: var(--text-secondary);">
                    点击选择文件 或 拖拽文件到这里
                </div>
                <div style="font-size: 12px; opacity: 0.7;">
                    支持TXT格式，每行一个姓名
                </div>
            `;
            
            // 替换原有文件输入
            fileInput.style.display = 'none';
            fileLabel.appendChild(dragArea);
            
            // 点击拖拽区域触发文件选择
            dragArea.addEventListener('click', () => {
                fileInput.click();
            });
            
            // 拖拽事件处理
            dragArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                dragArea.classList.add('dragover');
            });
            
            dragArea.addEventListener('dragleave', () => {
                dragArea.classList.remove('dragover');
            });
            
            dragArea.addEventListener('drop', (e) => {
                e.preventDefault();
                dragArea.classList.remove('dragover');
                
                if (e.dataTransfer.files.length) {
                    const file = e.dataTransfer.files[0];
                    if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
                        fileInput.files = e.dataTransfer.files;
                        fileInput.dispatchEvent(new Event('change'));
                    } else {
                        showMessage('请选择TXT格式文件', 'error');
                    }
                }
            });
            
            // 文件选择变化事件
            fileInput.addEventListener('change', handleFileSelect);
        }

        // 处理文件选择
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const text = event.target.result;
                    allNames = text.split('\n')
                        .map(name => name.trim())
                        .filter(name => name.length > 0);
                    
                    if (allNames.length === 0) {
                        showMessage('文件为空，请检查格式', 'error');
                        return;
                    }

                    availableNames = [...allNames];
                    currentRound = 0;
                    updateStats();
                    initNameWall();
                    showMessage(`成功导入 ${allNames.length} 个名字`, 'success');
                    document.getElementById('statusText').textContent = ' 准备就绪，按空格键开始抽奖';
                    updateButtonState();
                } catch (error) {
                    showMessage('文件读取失败，请检查文件格式', 'error');
                    console.error('File read error:', error);
                }
            };
            
            reader.onerror = function() {
                showMessage('文件读取失败，请重试', 'error');
            };
            
            reader.readAsText(file, 'UTF-8');
        }

        // 初始化姓名墙
        function initNameWall() {
            const wall = document.getElementById('nameWall');
            wall.innerHTML = '';
            nameElements = [];

            const excludeWinners = document.getElementById('excludeWinners').checked;
            const displayNames = excludeWinners ? availableNames : allNames;

            if (displayNames.length === 0) {
                const emptyMessage = document.createElement('div');
                emptyMessage.style.cssText = `
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    color: var(--text-tertiary);
                    font-size: 20px;
                    text-align: center;
                `;
                emptyMessage.textContent = '请导入名单开始抽奖';
                wall.appendChild(emptyMessage);
                return;
            }

            // 创建姓名元素
            displayNames.forEach((name, index) => {
                const div = document.createElement('div');
                div.className = 'name-item';
                div.textContent = name;
                
                // 随机初始位置和3D变换
                const x = Math.random() * (wall.offsetWidth - 150);
                const y = Math.random() * (wall.offsetHeight - 50);
                const z = Math.random() * 200 - 100;
                const rotateY = Math.random() * 360;
                
                div.style.left = x + 'px';
                div.style.top = y + 'px';
                div.style.transform = `translateZ(${z}px) rotateY(${rotateY}deg)`;
                
                // 存储初始位置用于动画
                div.dataset.x = x;
                div.dataset.y = y;
                div.dataset.z = z;
                div.dataset.rotateY = rotateY;
                div.dataset.vx = (Math.random() - 0.5) * 3;
                div.dataset.vy = (Math.random() - 0.5) * 3;
                div.dataset.vz = (Math.random() - 0.5) * 2;
                div.dataset.vRotate = (Math.random() - 0.5) * 5;
                
                wall.appendChild(div);
                nameElements.push(div);
            });
        }

        // 动画循环
        function animate() {
            if (!isRunning) return;

            const wall = document.getElementById('nameWall');
            const wallWidth = wall.offsetWidth;
            const wallHeight = wall.offsetHeight;

            nameElements.forEach(el => {
                if (!el.dataset.x) return;

                let x = parseFloat(el.dataset.x);
                let y = parseFloat(el.dataset.y);
                let z = parseFloat(el.dataset.z);
                let rotateY = parseFloat(el.dataset.rotateY);
                let vx = parseFloat(el.dataset.vx);
                let vy = parseFloat(el.dataset.vy);
                let vz = parseFloat(el.dataset.vz);
                let vRotate = parseFloat(el.dataset.vRotate);

                // 更新位置
                x += vx;
                y += vy;
                z += vz;
                rotateY += vRotate;

                // 边界检测和反弹
                const elementWidth = el.offsetWidth || 150;
                const elementHeight = el.offsetHeight || 50;

                if (x < 0 || x > wallWidth - elementWidth) {
                    vx = -vx;
                    x = Math.max(0, Math.min(wallWidth - elementWidth, x));
                }
                if (y < 0 || y > wallHeight - elementHeight) {
                    vy = -vy;
                    y = Math.max(0, Math.min(wallHeight - elementHeight, y));
                }
                if (z < -100 || z > 100) {
                    vz = -vz;
                    z = Math.max(-100, Math.min(100, z));
                }

                // 保存新状态
                el.dataset.x = x;
                el.dataset.y = y;
                el.dataset.z = z;
                el.dataset.rotateY = rotateY;
                el.dataset.vx = vx;
                el.dataset.vy = vy;
                el.dataset.vz = vz;
                el.dataset.vRotate = vRotate;

                // 应用变换
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.style.transform = `translateZ(${z}px) rotateY(${rotateY}deg)`;
            });

            animationId = requestAnimationFrame(animate);
        }

        // 切换抽奖状态
        function toggleLottery() {
            if (allNames.length === 0) {
                showMessage('请先导入名单', 'error');
                return;
            }

            const drawCount = parseInt(document.getElementById('drawCount').value) || 1;
            const excludeWinners = document.getElementById('excludeWinners').checked;
            const pool = excludeWinners ? availableNames : allNames;

            if (pool.length === 0) {
                showMessage('没有可抽奖的人员', 'error');
                return;
            }

            if (drawCount > pool.length) {
                showMessage(`剩余可抽人数不足，当前剩余 ${pool.length} 人`, 'error');
                return;
            }

            if (!isRunning) {
                // 开始滚动
                startLottery();
            } else {
                // 停止并抽奖
                stopAndDraw();
            }
        }

        // 开始抽奖滚动
        function startLottery() {
            isRunning = true;
            currentRound++;
            roundWinners = [];
            
            // 更新按钮状态
            document.getElementById('startIcon').textContent = '';
            document.getElementById('startText').textContent = '停止抽奖（空格键）';
            document.getElementById('statusText').textContent = ' 正在滚动中...';
            
            // 移除之前的中奖样式
            nameElements.forEach(el => {
                el.classList.remove('winner', 'single-winner', 'multi-winner');
                el.style.display = '';
            });
            
            // 清除多人中奖容器
            const winnersContainer = document.querySelector('.winners-container');
            if (winnersContainer) {
                winnersContainer.remove();
            }
            
            // 进入全屏模式
            enterFullscreen();
            
            // 开始动画
            animate();
            
            showMessage(`第 ${currentRound} 轮抽奖开始`, 'success');
        }

        // 停止滚动并抽取中奖者
        function stopAndDraw() {
            isRunning = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
            }
            
            // 更新按钮状态
            document.getElementById('startIcon').textContent = '';
            document.getElementById('startText').textContent = '开始抽奖（空格键）';
            
            // 随机抽取
            const drawCount = parseInt(document.getElementById('drawCount').value) || 1;
            const excludeWinners = document.getElementById('excludeWinners').checked;
            const pool = excludeWinners ? availableNames : allNames;
            
            // Fisher-Yates洗牌算法
            const shuffled = [...pool];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            
            roundWinners = shuffled.slice(0, drawCount);
            
            // 显示中奖者
            displayWinners();
            
            // 更新数据
            updateAfterDraw();
            
            // 更新状态
            const roundName = document.getElementById('roundName').value || '幸运奖';
            document.getElementById('statusText').textContent = 
                ` 恭喜 ${roundWinners.length} 位获得【${roundName}】！`;
        }

        // 显示中奖者
        function displayWinners() {
            const winnerCount = roundWinners.length;
            const stage = document.querySelector('.lottery-stage');
            
            if (winnerCount === 1) {
                // 单个中奖者：大字号居中
                nameElements.forEach(el => {
                    if (roundWinners.includes(el.textContent)) {
                        el.classList.add('winner', 'single-winner');
                        el.style.position = 'fixed';
                        el.style.top = '50%';
                        el.style.left = '50%';
                        el.style.transform = 'translate(-50%, -50%)';
                    }
                });
            } else {
                // 多个中奖者：创建网格容器
                const winnersContainer = document.createElement('div');
                winnersContainer.className = 'winners-container';
                
                // 根据人数添加对应的class
                if (winnerCount <= 10) {
                    winnersContainer.classList.add(`count-${winnerCount}`);
                } else {
                    winnersContainer.classList.add('count-many');
                }
                
                stage.appendChild(winnersContainer);
                
                // 隐藏其他名字，只显示中奖者
                nameElements.forEach(el => {
                    if (roundWinners.includes(el.textContent)) {
                        el.style.display = 'none';
                    }
                });
                
                // 创建中奖者卡片
                roundWinners.forEach(name => {
                    const winnerCard = document.createElement('div');
                    winnerCard.className = 'name-item winner multi-winner';
                    
                    // 根据人数添加对应的class
                    if (winnerCount <= 10) {
                        winnerCard.classList.add(`count-${winnerCount}`);
                    } else {
                        winnerCard.classList.add('count-many');
                    }
                    
                    winnerCard.textContent = name;
                    winnersContainer.appendChild(winnerCard);
                });
            }
        }

        // 抽奖后更新数据
        function updateAfterDraw() {
            const excludeWinners = document.getElementById('excludeWinners').checked;
            
            // 从可用名单中移除（如果启用了排除功能）
            if (excludeWinners) {
                roundWinners.forEach(name => {
                    const index = availableNames.indexOf(name);
                    if (index > -1) {
                        availableNames.splice(index, 1);
                    }
                });
            }

            // 添加到总中奖名单
            const roundName = document.getElementById('roundName').value || '幸运奖';
            winners.push({
                round: roundName,
                names: [...roundWinners],
                time: new Date().toLocaleString('zh-CN', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                })
            });

            updateWinnersDisplay();
            updateStats();
            updateButtonState();
            
            showMessage(`抽奖完成！选出 ${roundWinners.length} 位中奖者`, 'success');
        }

        // 进入全屏模式
        function enterFullscreen() {
            const stage = document.querySelector('.lottery-stage');
            stage.classList.add('fullscreen');
            
            // 阻止滚动
            document.body.style.overflow = 'hidden';
            
            // 更新姓名墙大小
            setTimeout(() => {
                const wall = document.getElementById('nameWall');
                if (wall) {
                    wall.style.transform = 'scale(1.05)';
                }
            }, 100);
        }

        // 退出全屏模式
        function exitFullscreen() {
            const stage = document.querySelector('.lottery-stage');
            stage.classList.remove('fullscreen');
            
            // 恢复滚动
            document.body.style.overflow = '';
            
            // 恢复姓名墙大小
            const wall = document.getElementById('nameWall');
            if (wall) {
                wall.style.transform = '';
            }
            
            // 移除多人中奖容器
            const winnersContainer = stage.querySelector('.winners-container');
            if (winnersContainer) {
                winnersContainer.remove();
            }
            
            // 清除中奖者样式
            nameElements.forEach(el => {
                el.classList.remove('winner', 'single-winner', 'multi-winner');
                el.style.position = '';
                el.style.top = '';
                el.style.left = '';
                el.style.transform = '';
                el.style.display = '';
            });
            
            // 如果需要，重新初始化姓名墙
            const excludeWinners = document.getElementById('excludeWinners').checked;
            if (excludeWinners && roundWinners.length > 0) {
                initNameWall();
            }
        }

        // 切换全屏显示
        function toggleFullscreen() {
            const stage = document.querySelector('.lottery-stage');
            if (stage.classList.contains('fullscreen')) {
                exitFullscreen();
            } else {
                enterFullscreen();
            }
        }

        // 处理键盘快捷键
        function handleKeyboardShortcuts(e) {
            // 空格键：开始/停止抽奖
            if (e.code === 'Space') {
                e.preventDefault();
                if (allNames.length > 0) {
                    toggleLottery();
                }
            }
            
            // ESC键：退出全屏
            if (e.code === 'Escape') {
                const stage = document.querySelector('.lottery-stage');
                if (stage.classList.contains('fullscreen')) {
                    exitFullscreen();
                }
            }
            
            // F11键：切换全屏
            if (e.code === 'F11') {
                e.preventDefault();
                toggleFullscreen();
            }
            
            // Ctrl+S：保存中奖名单
            if (e.ctrlKey && e.code === 'KeyS') {
                e.preventDefault();
                if (winners.length > 0) {
                    exportWinners();
                }
            }
        }

        // 更新统计信息
        function updateStats() {
            document.getElementById('totalCount').textContent = allNames.length;
            document.getElementById('remainingCount').textContent = availableNames.length;
            document.getElementById('winnersCount').textContent = 
                winners.reduce((sum, round) => sum + round.names.length, 0);
            document.getElementById('currentRound').textContent = currentRound;
        }

        // 更新按钮状态
        function updateButtonState() {
            const startBtn = document.getElementById('startBtn');
            const hasNames = allNames.length > 0;
            const hasAvailable = availableNames.length > 0;
            
            startBtn.disabled = !hasNames || !hasAvailable;
            
            if (!hasNames) {
                startBtn.title = '请先导入名单';
            } else if (!hasAvailable) {
                startBtn.title = '所有人员已中奖';
            } else {
                startBtn.title = '';
            }
        }

        // 更新中奖名单显示
        function updateWinnersDisplay() {
            const container = document.getElementById('winnersContainer');
            
            if (winners.length === 0) {
                container.innerHTML = '<p class="empty-message">暂无中奖记录</p>';
                return;
            }

            // 按时间倒序显示
            const sortedWinners = [...winners].reverse();
            
            container.innerHTML = sortedWinners.map((round, index) => {
                const roundNumber = winners.length - index;
                return `
                <div class="round-winners">
                    <div class="round-title">
                        <span></span>
                        第 ${roundNumber} 轮：${round.round} 
                        <span style="opacity: 0.7;">(${round.names.length}人)</span>
                        <span style="margin-left: auto; font-size: 14px; font-weight: normal;">${round.time}</span>
                    </div>
                    <div class="winners-list">
                        ${round.names.map((name, i) => 
                            `<span class="winner-tag" title="点击查看">${i + 1}. ${name}</span>`
                        ).join('')}
                    </div>
                </div>
                `;
            }).join('');
        }

        // 重置抽奖
        function resetLottery() {
            if (isRunning) {
                isRunning = false;
                cancelAnimationFrame(animationId);
            }
            
            if (!confirm('确定要重置抽奖吗？当前轮次和中奖记录将保留，但名单会重置。')) {
                return;
            }
            
            // 退出全屏
            exitFullscreen();
            
            availableNames = [...allNames];
            roundWinners = [];
            
            // 更新按钮状态
            document.getElementById('startIcon').textContent = '';
            document.getElementById('startText').textContent = '开始抽奖（空格键）';
            document.getElementById('statusText').textContent = ' 已重置，按空格键开始抽奖';
            
            initNameWall();
            updateStats();
            updateButtonState();
            showMessage('抽奖已重置，可重新开始', 'success');
        }

        // 清空中奖记录
        function clearAllWinners() {
            if (winners.length === 0) {
                showMessage('暂无中奖记录', 'error');
                return;
            }
            
            if (!confirm('确定要清空所有中奖记录吗？此操作不可恢复。')) {
                return;
            }
            
            winners = [];
            currentRound = 0;
            updateWinnersDisplay();
            updateStats();
            updateButtonState();
            showMessage('已清空所有中奖记录', 'success');
        }

        // 导出中奖名单
        function exportWinners() {
            if (winners.length === 0) {
                showMessage('暂无中奖记录可导出', 'error');
                return;
            }

            let text = '年会抽奖中奖名单\n';
            text += '='.repeat(50) + '\n\n';
            
            text += `抽奖总人数：${allNames.length}\n`;
            text += `中奖总人数：${winners.reduce((sum, round) => sum + round.names.length, 0)}\n`;
            text += `抽奖时间：${new Date().toLocaleString('zh-CN')}\n\n`;
            
            winners.forEach((round, index) => {
                text += `第 ${index + 1} 轮：${round.round}\n`;
                text += `时间：${round.time}\n`;
                text += `中奖人员（${round.names.length}人）：\n`;
                round.names.forEach((name, i) => {
                    text += `  ${i + 1}. ${name}\n`;
                });
                text += '\n';
            });

            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `中奖名单_${new Date().toLocaleDateString('zh-CN').replace(/\//g, '-')}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showMessage('中奖名单已导出', 'success');
        }

        // 复制联系信息
        async function copyContactInfo(text, type) {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const textArea = document.createElement('textarea');
                    textArea.value = text;
                    textArea.style.position = 'fixed';
                    textArea.style.left = '-999999px';
                    textArea.style.top = '-999999px';
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    
                    try {
                        const successful = document.execCommand('copy');
                        if (!successful) throw new Error('Copy command failed');
                    } finally {
                        document.body.removeChild(textArea);
                    }
                }
                
                showMessage(`${type}已复制：${text}`, 'success');
            } catch (error) {
                console.error('Copy failed:', error);
                showMessage('复制失败，请手动复制', 'error');
            }
        }

        // 显示消息
        function showMessage(text, type = 'success') {
            const message = document.getElementById('message');
            message.textContent = text;
            message.className = `message ${type} show`;
            
            // 自动隐藏
            setTimeout(() => {
                message.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
