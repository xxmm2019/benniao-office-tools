namespace App\\Services;

class PaymentProcessor {
    private $paymentGateway;
    private $logger;
    
    /**
     * 构造函数
     * @param PaymentGateway $gateway 支付网关
     * @param Logger $logger 日志记录器
     */
    public function __construct(PaymentGateway $gateway, Logger $logger) {
        $this->paymentGateway = $gateway;
        $this->logger = $logger;
    }
    
    /**
     * 处理支付
     * @param array $order 订单信息
     * @return array 支付结果
     */
    public function processPayment(array $order): array {
        try {
            // 验证订单数据
            if (!$this->validateOrder($order)) {
                throw new \\InvalidArgumentException("订单数据无效");
            }
            
            // 计算总金额
            $total = $this->calculateTotal($order['items']);
            
            // 调用支付网关
            $result = $this->paymentGateway->charge(
                $order['customer_id'],
                $total,
                $order['currency']
            );
            
            // 记录支付日志
            $this->logger->info("支付成功", [
                'order_id' => $order['id'],
                'amount' => $total,
                'transaction_id' => $result['transaction_id']
            ]);
            
            return [
                'success' => true,
                'message' => '支付处理成功',
                'transaction_id' => $result['transaction_id']
            ];
            
        } catch (\\Exception $e) {
            $this->logger->error("支付处理失败: " . $e->getMessage(), [
                'order_id' => $order['id'],
                'error' => $e->getMessage()
            ]);
            
            return [
                'success' => false,
                'message' => '支付处理失败: ' . $e->getMessage()
            ];
        }
    }
    
    /**
     * 验证订单
     * @param array $order 订单信息
     * @return bool 验证结果
     */
    private function validateOrder(array $order): bool {
        return isset($order['id']) 
            && isset($order['customer_id']) 
            && isset($order['items']) 
            && count($order['items']) > 0;
    }
    
    /**
     * 计算总金额
     * @param array $items 订单项目
     * @return float 总金额
     */
    private function calculateTotal(array $items): float {
        $total = 0.0;
        
        foreach ($items as $item) {
            $total += $item['price'] * $item['quantity'];
        }
        
        return round($total, 2);
    }
}

        // PHP关键字列表
        const phpKeywords = [
            'abstract', 'and', 'array', 'as', 'break', 'callable', 'case', 'catch', 
            'class', 'clone', 'const', 'continue', 'declare', 'default', 'die', 'do', 
            'echo', 'else', 'elseif', 'empty', 'enddeclare', 'endfor', 'endforeach', 
            'endif', 'endswitch', 'endwhile', 'eval', 'exit', 'extends', 'final', 
            'for', 'foreach', 'function', 'global', 'goto', 'if', 'implements', 
            'include', 'include_once', 'instanceof', 'insteadof', 'interface', 
            'isset', 'list', 'namespace', 'new', 'or', 'print', 'private', 
            'protected', 'public', 'require', 'require_once', 'return', 'static', 
            'switch', 'throw', 'trait', 'try', 'unset', 'use', 'var', 'while', 
            'xor', 'yield', '__halt_compiler', 'fn', 'match', 'enum', 'readonly'
        ];
        
        // PHP内置函数列表（部分）
        const phpFunctions = [
            'count', 'strlen', 'substr', 'str_replace', 'explode', 'implode',
            'array_merge', 'array_keys', 'array_values', 'in_array', 'date',
            'time', 'strtotime', 'json_encode', 'json_decode', 'file_get_contents',
            'file_put_contents', 'isset', 'empty', 'is_null', 'is_array',
            'is_string', 'is_int', 'is_numeric', 'filter_var', 'htmlspecialchars',
            'trim', 'ltrim', 'rtrim', 'strpos', 'stripos', 'strtolower', 'strtoupper'
        ];
        
        // 显示状态消息
        function showStatus(message, type) {
            statusMessage.textContent = message;
            statusMessage.className = 'status ' + type;
            
            // 3秒后隐藏消息
            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 3000);
        }
        
        // 格式化PHP代码
        function formatPHPCode(code) {
            // 移除多余的空格和制表符
            let formatted = code.replace(/\t/g, '    ');
            
            // 标准化换行符
            formatted = formatted.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            
            // 标准化空格
            formatted = formatted.replace(/\s+\n/g, '\n');
            formatted = formatted.replace(/\n\s*\n\s*\n/g, '\n\n');
            
            // 在特定符号前后添加空格以提高可读性
            formatted = formatted.replace(/([=+\-*\/.%&|^<>!]=|[=+\-*\/.%&|^<>!])\s*/g, ' $1 ');
            formatted = formatted.replace(/\s*([{}();,:])\s*/g, '$1 ');
            formatted = formatted.replace(/([{}();,:])(?=\w)/g, '$1 ');
            
            // 修复可能由上述操作引起的多余空格
            formatted = formatted.replace(/\s+/g, ' ');
            formatted = formatted.replace(/\(\s+/g, '(');
            formatted = formatted.replace(/\s+\)/g, ')');
            
            // 添加适当的缩进
            let lines = formatted.split('\n');
            let indentLevel = 0;
            const indentSize = 4;
            let inCommentBlock = false;
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                
                // 处理多行注释的开始和结束
                if (line.startsWith('/*') && !line.endsWith('*/')) {
                    inCommentBlock = true;
                }
                
                // 减少缩进级别对于闭合块
                if (line.startsWith('}') || line.startsWith(')') || line.includes('};') || line.includes(');')) {
                    indentLevel = Math.max(0, indentLevel - 1);
                }
                
                // 应用当前缩进
                lines[i] = ' '.repeat(indentLevel * indentSize) + line;
                
                // 增加缩进级别对于新块
                if (line.endsWith('{') || line.endsWith('(') || 
                    line.includes('function') || line.includes('class') || 
                    line.includes('if') || line.includes('else') || 
                    line.includes('for') || line.includes('foreach') || 
                    line.includes('while') || line.includes('switch') ||
                    line.includes('try') || line.includes('catch')) {
                    
                    // 检查是否是单行块
                    if (!line.includes('}') && !line.match(/\)\s*\{/)) {
                        indentLevel++;
                    }
                }
                
                // 处理多行注释的结束
                if (inCommentBlock && line.endsWith('*/')) {
                    inCommentBlock = false;
                }
            }
            
            return lines.join('\n');
        }
        
        // 应用PHP语法高亮
        function highlightPHP(code) {
            // 替换HTML实体
            code = code.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&');
            
            // 高亮PHP标签
            code = code.replace(/&lt;\?php/g, '<span class="php-html">&lt;?php</span>');
            code = code.replace(/\?&gt;/g, '<span class="php-html">?&gt;</span>');
            
            // 高亮注释
            code = code.replace(/\/\/.*$/gm, '<span class="php-comment">$&</span>');
            code = code.replace(/\/\*[\s\S]*?\*\//g, '<span class="php-comment">$&</span>');
            code = code.replace(/#.*$/gm, '<span class="php-comment">$&</span>');
            
            // 高亮字符串（单引号和双引号）
            code = code.replace(/'[^']*'/g, '<span class="php-string">$&</span>');
            code = code.replace(/"([^"\\]|\\.)*"/g, '<span class="php-string">$&</span>');
            
            // 高亮数字
            code = code.replace(/\b\d+(\.\d+)?\b/g, '<span class="php-number">$&</span>');
            
            // 高亮变量
            code = code.replace(/\$[a-zA-Z_\x7f-\xff][a-zA-Z0-9_\x7f-\xff]*/g, '<span class="php-variable">$&</span>');
            
            // 高亮关键字
            phpKeywords.forEach(keyword => {
                const regex = new RegExp(`\\b${keyword}\\b`, 'g');
                code = code.replace(regex, `<span class="php-keyword">${keyword}</span>`);
            });
            
            // 高亮函数
            phpFunctions.forEach(func => {
                const regex = new RegExp(`\\b${func}\\(`, 'g');
                code = code.replace(regex, `<span class="php-function">${func}</span>(`);
            });
            
            // 高亮用户定义函数
            code = code.replace(/\bfunction\s+([a-zA-Z_\x7f-\xff][a-zA-Z0-9_\x7f-\xff]*)/g, 'function <span class="php-function">$1</span>');
            
            // 高亮类名
            code = code.replace(/\bclass\s+([a-zA-Z_\x7f-\xff][a-zA-Z0-9_\x7f-\xff]*)/g, 'class <span class="php-function">$1</span>');
            
            return code;
        }
        
        // 处理格式化按钮点击

                phpOutput.innerHTML = `<div style="color: #f72585; padding: 20px;">格式化错误: ${error.message}</div>`;
            }
        });

        copyBtn.addEventListener('click', () => {

                return;
            }
            
            // 创建一个临时文本区域来复制文本
            const tempTextArea = document.createElement('textarea');
            tempTextArea.value = outputText;
            document.body.appendChild(tempTextArea);
            tempTextArea.select();
            
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showStatus('代码已复制到剪贴板！', 'success');
                } else {
                    showStatus('复制失败，请手动选择并复制代码', 'error');
                }
            } catch (err) {
                showStatus('复制失败: ' + err, 'error');
            }
            
            document.body.removeChild(tempTextArea);
        });
        
        // 处理清空按钮点击
        clearBtn.addEventListener('click', () => {
            phpInput.value = '';
            phpOutput.innerHTML = '<div style="color: #a9b7c6; text-align: center; padding: 50px 20px;"><i class="fas fa-arrow-left" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.7;"></i><p>格式化后的PHP代码将显示在这里</p><p style="font-size: 0.9rem; margin-top: 10px; opacity: 0.8;">支持语法高亮和美化排版</p></div>';
            showStatus('内容已清空', 'success');
        });
        
        // 处理示例按钮点击
        exampleBtn.addEventListener('click', () => {
            phpInput.value = exampleCode;
            showStatus('示例代码已加载，点击"格式化PHP代码"查看效果', 'success');
        });
        
        // 页面加载时自动格式化示例代码
        window.addEventListener('DOMContentLoaded', () => {
            formatBtn.click();
        });
    </script>
</body>
</html>
