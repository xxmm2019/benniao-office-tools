<!DOCTYPE html>
<html lang="zh-CN">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAML 格式化工具 - 笨鸟办公工具箱</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"
     crossorigin="anonymous"></script>
    <link rel="canonical" href="https://www.benniaooffice.com/tools/yaml-formatter/app.html">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f59e0b 0%, #f59e0b 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, #f59e0b 0%, #f59e0b 100%);
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            background: linear-gradient(135deg, #e68a00 0%, #e68a00 100%);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d 0%, #5a6268 100%);
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #5a6268 0%, #4e555b 100%);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn:disabled:hover {
            box-shadow: none;
        }

        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .editor-panel {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
        }

        .editor-title {
            font-weight: 600;
            color: #333;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .editor-title i {
            color: #f59e0b;
        }

        .editor-textarea {
            width: 100%;
            flex: 1;
            min-height: 320px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: none;
            transition: border-color 0.3s, box-shadow 0.3s;
            background: white;
        }

        .editor-textarea:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .editor-textarea.error {
            border-color: #dc3545;
            background-color: #fff5f5;
        }

        .editor-textarea:read-only {
            background-color: #f8f9fa;
            cursor: default;
        }

        .status-box {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status-box.error {
            background: #ffebee;
            border-left-color: #dc3545;
        }

        .status-box.warning {
            background: #fff3cd;
            border-left-color: #ffc107;
        }

        .status-box.info {
            background: #d1ecf1;
            border-left-color: #17a2b8;
        }

        .status-box.active {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-box p {
            color: #2e7d32;
            font-size: 14px;
            margin: 0;
        }

        .status-box.error p {
            color: #721c24;
        }

        .status-box.warning p {
            color: #856404;
        }

        .status-box.info p {
            color: #0c5460;
        }

        .status-icon {
            font-size: 18px;
        }

        .copy-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .copy-btn:hover {
            opacity: 1;
        }

        .copy-btn.copied {
            background: #4caf50;
        }

        .line-counter {
            position: absolute;
            left: 15px;
            bottom: 15px;
            font-size: 12px;
            color: #6c757d;
            background: rgba(255, 255, 255, 0.9);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .error-line {
            position: absolute;
            right: 15px;
            bottom: 15px;
            font-size: 12px;
            color: #dc3545;
            background: rgba(255, 235, 238, 0.9);
            padding: 2px 8px;
            border-radius: 4px;
            display: none;
        }

        .error-line.active {
            display: block;
        }

        .controls {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .control {
            display: flex;
            flex-direction: column;
            gap: 6px;
            font-size: 14px;
            color: #333;
        }

        .control input,
        .control select,
        .control textarea {
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #d0d7de;
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .editor-container {
                grid-template-columns: 1fr;
            }

            .editor-textarea {
                min-height: 240px;
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .card {
                padding: 20px;
            }
            
            .btn {
                padding: 10px 20px;
                font-size: 13px;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-code"></i> YAML 格式化工具</h1>
            <p>格式化 YAML 结构，统一缩进，实时验证</p>
        </div>

        <div class="card">
            <div class="status-box" id="status-box">
                <i class="fas fa-check-circle status-icon"></i>
                <p id="status-message">已完成转换</p>
            </div>

            <div class="action-bar">
                <div class="btn-group">
                    <button class="btn" onclick="convert()">
                        <i class="fas fa-sync-alt"></i>
                        立即转换
                    </button>
                    <button class="btn btn-secondary" onclick="loadSample()">
                        <i class="fas fa-file-code"></i>
                        加载示例
                    </button>
                    <button class="btn btn-secondary" onclick="clearAll()">
                        <i class="fas fa-trash-alt"></i>
                        清空全部
                    </button>
                </div>
                <div class="controls">
                    <div class="control">
                        <label for="indent-size">缩进大小:</label>
                        <select id="indent-size" onchange="updateIndent()">
                            <option value="2">2 空格</option>
                            <option value="4" selected>4 空格</option>
                            <option value="8">8 空格</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="editor-container">
                <div class="editor-panel">
                    <div class="editor-header">
                        <span class="editor-title">
                            <i class="fas fa-pencil-alt"></i>
                            输入 YAML
                        </span>
                        <span class="line-counter" id="input-line-counter">行数: 0</span>
                    </div>
                    <textarea class="editor-textarea" id="input" 
                              placeholder="粘贴 YAML 内容..."
                              oninput="updateLineCount()"></textarea>
                    <button class="copy-btn" onclick="copyToClipboard('input')" title="复制内容">
                        <i class="far fa-copy"></i>
                    </button>
                    <span class="error-line" id="input-error-line"></span>
                </div>

                <div class="editor-panel">
                    <div class="editor-header">
                        <span class="editor-title">
                            <i class="fas fa-check-circle"></i>
                            格式化结果
                        </span>
                        <span class="line-counter" id="output-line-counter">行数: 0</span>
                    </div>
                    <textarea class="editor-textarea" id="output" 
                              placeholder="格式化后的 YAML 将显示在这里..." 
                              readonly></textarea>
                    <button class="copy-btn" onclick="copyToClipboard('output')" title="复制结果">
                        <i class="far fa-copy"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let indentSize = 4;
        let isConverting = false;

        // 更新缩进设置
        function updateIndent() {
            indentSize = parseInt(document.getElementById('indent-size').value);
            const input = document.getElementById('input').value;
            if (input.trim()) {
                convert();
            }
        }

        // 更新行数统计
        function updateLineCount() {
            const input = document.getElementById('input');
            const output = document.getElementById('output');
            const inputCounter = document.getElementById('input-line-counter');
            const outputCounter = document.getElementById('output-line-counter');
            
            inputCounter.textContent = `行数: ${input.value.split('\n').length}`;
            outputCounter.textContent = `行数: ${output.value.split('\n').length}`;
        }

        // 增强的 YAML 解析器
        function parseYAML(yaml) {
            const lines = yaml.split(/\r?\n/);
            const root = {};
            const stack = [{ indent: -1, value: root, type: 'object' }];
            const errors = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const lineNumber = i + 1;
                
                // 跳过空行和注释
                if (!line.trim() || line.trim().startsWith('#')) {
                    continue;
                }

                const indent = line.match(/^\s*/)[0].length;
                const trimmed = line.trim();

                // 查找当前缩进的父级
                while (stack.length > 1 && stack[stack.length - 1].indent >= indent) {
                    stack.pop();
                }

                const current = stack[stack.length - 1];

                try {
                    // 处理数组项
                    if (trimmed.startsWith('- ')) {
                        if (!Array.isArray(current.value)) {
                            throw new Error(`第 ${lineNumber} 行: 数组只能在数组上下文中使用`);
                        }
                        
                        const itemValue = trimmed.slice(2).trim();
                        const value = parseYAMLValue(itemValue);
                        
                        // 如果是复杂结构，需要推入栈中
                        if (value && typeof value === 'object') {
                            current.value.push(value);
                            stack.push({ indent, value, type: Array.isArray(value) ? 'array' : 'object' });
                        } else {
                            current.value.push(value);
                        }
                        continue;
                    }

                    // 处理键值对
                    const colonIndex = trimmed.indexOf(':');
                    if (colonIndex === -1) {
                        throw new Error(`第 ${lineNumber} 行: 缺少冒号(:)`);
                    }

                    const key = trimmed.substring(0, colonIndex).trim();
                    const valuePart = trimmed.substring(colonIndex + 1).trim();

                    if (current.type !== 'object') {
                        throw new Error(`第 ${lineNumber} 行: 对象只能在对象上下文中使用`);
                    }

                    // 处理空值或复杂值
                    if (valuePart === '') {
                        current.value[key] = {};
                        stack.push({ indent, value: current.value[key], type: 'object' });
                    } else if (valuePart === '[]') {
                        current.value[key] = [];
                        stack.push({ indent, value: current.value[key], type: 'array' });
                    } else if (valuePart === '{}') {
                        current.value[key] = {};
                        stack.push({ indent, value: current.value[key], type: 'object' });
                    } else {
                        current.value[key] = parseYAMLValue(valuePart);
                    }
                } catch (error) {
                    errors.push({
                        line: lineNumber,
                        message: error.message
                    });
                    
                    // 如果是致命错误，停止解析
                    if (error.message.includes('致命')) {
                        break;
                    }
                }
            }

            if (errors.length > 0) {
                const error = new Error('YAML 解析错误');
                error.details = errors;
                throw error;
            }

            return root;
        }

        // 解析 YAML 值
        function parseYAMLValue(value) {
            // 布尔值
            if (value === 'true') return true;
            if (value === 'false') return false;
            
            // null 值
            if (value === 'null' || value === '~' || value === '') return null;
            
            // 数字
            if (!isNaN(value) && value.trim() !== '') {
                const num = Number(value);
                if (!isNaN(num)) return num;
            }
            
            // 带引号的字符串
            if ((value.startsWith("'") && value.endsWith("'")) || 
                (value.startsWith('"') && value.endsWith('"'))) {
                return value.substring(1, value.length - 1);
            }
            
            // 普通字符串
            return value;
        }

        // 生成 YAML 字符串
        function stringifyYAML(value, currentIndent = 0) {
            const pad = ' '.repeat(indentSize);
            const currentPadding = pad.repeat(currentIndent);
            
            if (Array.isArray(value)) {
                if (value.length === 0) return '[]';
                
                return value.map(item => {
                    if (item && typeof item === 'object') {
                        return `${currentPadding}- 
${stringifyYAML(item, currentIndent + 1)}`;
                    }
                    return `${currentPadding}- ${stringifyYAML(item, 0).trim()}`;
                }).join('\n');
            }
            
            if (value && typeof value === 'object') {
                const keys = Object.keys(value);
                if (keys.length === 0) return '{}';
                
                return keys.map(key => {
                    const val = value[key];
                    if (val && typeof val === 'object') {
                        return `${currentPadding}${key}:
${stringifyYAML(val, currentIndent + 1)}`;
                    }
                    const stringValue = stringifyYAML(val, 0).trim();
                    return `${currentPadding}${key}: ${stringValue}`;
                }).join('\n');
            }
            
            // 处理基本类型
            if (value === null || value === undefined) {
                return currentPadding + 'null';
            }
            if (typeof value === 'boolean') {
                return currentPadding + (value ? 'true' : 'false');
            }
            if (typeof value === 'number') {
                return currentPadding + value;
            }
            
            // 字符串类型，检查是否需要引号
            const str = String(value);
            if (str.includes(':') || str.includes('#') || str.trim() !== str) {
                return currentPadding + `"${str.replace(/"/g, '\\"')}"`;
            }
            
            return currentPadding + str;
        }

        // 转换函数
        function convert() {
            if (isConverting) return;
            
            const input = document.getElementById('input');
            const output = document.getElementById('output');
            const statusBox = document.getElementById('status-box');
            const statusMessage = document.getElementById('status-message');
            const statusIcon = statusBox.querySelector('.status-icon');
            const inputErrorLine = document.getElementById('input-error-line');

            // 重置状态
            input.classList.remove('error');
            inputErrorLine.classList.remove('active');
            statusBox.className = 'status-box';
            output.value = '';
            
            if (!input.value.trim()) {
                showStatus('请输入 YAML 内容', 'warning');
                return;
            }

            isConverting = true;
            const convertBtn = document.querySelector('.btn:first-child');
            const originalText = convertBtn.innerHTML;
            convertBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 转换中...';
            convertBtn.disabled = true;

            try {
                // 验证并解析 YAML
                const parsed = parseYAML(input.value);
                
                // 生成格式化后的 YAML
                const result = stringifyYAML(parsed);
                
                // 显示结果
                output.value = result;
                showStatus(' YAML 格式化成功', 'success');
                
            } catch (error) {
                // 处理错误
                input.classList.add('error');
                
                if (error.details && error.details.length > 0) {
                    const firstError = error.details[0];
                    statusMessage.textContent = ` 第 ${firstError.line} 行: ${firstError.message}`;
                    statusBox.className = 'status-box error active';
                    
                    // 显示错误行
                    inputErrorLine.textContent = `错误在第 ${firstError.line} 行`;
                    inputErrorLine.classList.add('active');
                } else {
                    showStatus(` 转换失败: ${error.message}`, 'error');
                }
                
                // 清空输出
                output.value = '';
                
                console.error('YAML 解析错误:', error);
            } finally {
                isConverting = false;
                convertBtn.innerHTML = originalText;
                convertBtn.disabled = false;
                updateLineCount();
                
                // 滚动到错误位置
                if (input.classList.contains('error')) {
                    const lines = input.value.split('\n');
                    const errorLine = parseInt(statusMessage.textContent.match(/第 (\d+) 行/)?.[1] || 0);
                    if (errorLine > 0) {
                        const lineHeight = 20;
                        input.scrollTop = (errorLine - 1) * lineHeight;
                        input.focus();
                    }
                }
            }
        }

        // 显示状态消息
        function showStatus(message, type = 'success') {
            const statusBox = document.getElementById('status-box');
            const statusMessage = document.getElementById('status-message');
            const statusIcon = statusBox.querySelector('.status-icon');
            
            statusBox.className = `status-box ${type} active`;
            statusMessage.textContent = message;
            
            // 更新图标
            statusIcon.className = 'fas status-icon';
            if (type === 'success') {
                statusIcon.classList.add('fa-check-circle');
            } else if (type === 'error') {
                statusIcon.classList.add('fa-exclamation-circle');
            } else if (type === 'warning') {
                statusIcon.classList.add('fa-exclamation-triangle');
            } else {
                statusIcon.classList.add('fa-info-circle');
            }
            
            // 自动隐藏成功消息
            if (type === 'success') {
                setTimeout(() => {
                    statusBox.classList.remove('active');
                }, 3000);
            }
        }

        // 复制到剪贴板
        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            const copyBtn = element.nextElementSibling;
            
            if (!element.value.trim()) {
                showStatus('没有内容可复制', 'warning');
                return;
            }

            navigator.clipboard.writeText(element.value)
                .then(() => {
                    copyBtn.classList.add('copied');
                    copyBtn.innerHTML = '<i class="fas fa-check"></i>';
                    showStatus(' 已复制到剪贴板', 'success');
                    
                    setTimeout(() => {
                        copyBtn.classList.remove('copied');
                        copyBtn.innerHTML = '<i class="far fa-copy"></i>';
                    }, 2000);
                })
                .catch(err => {
                    console.error('复制失败:', err);
                    showStatus(' 复制失败', 'error');
                });
        }

        // 加载示例
        function loadSample() {
            const sampleYAML = `# 配置文件示例
name: "示例应用"
version: "1.0.0"
description: "这是一个示例配置文件"
author: "开发团队"

# 数据库配置
database:
  host: "localhost"
  port: 3306
  username: "admin"
  password: "secret"
  enabled: true
  options:
    poolSize: 10
    timeout: 30

# 服务器配置
server:
  port: 8080
  ssl: false
  cors:
    - "https://example.com"
    - "https://api.example.com"

# 功能开关
features:
  - "authentication"
  - "caching"
  - "logging"
  - "monitoring"

# 日志配置
logging:
  level: "info"
  file: "/var/log/app.log"
  maxSize: "10MB"

# 空对象和数组
emptyObject: {}
emptyArray: []`;

            document.getElementById('input').value = sampleYAML;
            updateLineCount();
            convert();
        }

        // 清空所有内容
        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            document.getElementById('status-box').classList.remove('active');
            document.getElementById('input').classList.remove('error');
            document.getElementById('input-error-line').classList.remove('active');
            updateLineCount();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 实时验证输入（防抖处理）
            let debounceTimer;
            const input = document.getElementById('input');
            
            input.addEventListener('input', () => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    updateLineCount();
                    
                    // 如果内容有改变，清除之前的错误状态
                    if (input.value.trim()) {
                        input.classList.remove('error');
                        document.getElementById('input-error-line').classList.remove('active');
                    }
                }, 500);
            });

            // 添加键盘快捷键
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    convert();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
                    e.preventDefault();
                    clearAll();
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    loadSample();
                }
            });

            updateLineCount();
        });
    </script>
</body>
</html>
