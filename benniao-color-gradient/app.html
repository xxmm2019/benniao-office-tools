<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>CSS颜色渐变生成器 - 笨鸟办公工具集箱</title>
     <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"
     crossorigin="anonymous"></script>
    <link rel="canonical" href="https://www.benniaooffice.com/tools/benniao-color-gradient/">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(90deg, #11998E, #25C486, #38EF7D);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding-top: 20px;
        }
        
        h1 {
            font-size: 2.8rem;
            background: linear-gradient(90deg, #FF416C 0%, #FF4B2B 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 15px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #555;
            max-width: 800px;
            margin: 0 auto 25px;
            line-height: 1.6;
        }
        
        .tagline {
            background: rgba(255, 65, 108, 0.1);
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 20px;
            border-left: 5px solid #FF416C;
        }
        
        .app-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .controls {
            flex: 1;
            min-width: 300px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        
        .results {
            flex: 2;
            min-width: 400px;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: #444;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title i {
            color: #FF416C;
        }
        
        .color-inputs {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .color-input-group {
            flex: 1;
            min-width: 200px;
        }
        
        .color-input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        .color-input-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .color-input-container input[type="color"] {
            width: 60px;
            height: 60px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: transparent;
        }
        
        .color-input-container input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border-radius: 10px;
            border: 2px solid #ddd;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .steps-control {
            margin-bottom: 25px;
        }
        
        .steps-control label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        input[type="range"] {
            flex: 1;
            height: 10px;
            border-radius: 5px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #FF416C;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        .steps-value {
            width: 70px;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            text-align: center;
            font-weight: 600;
            background: #f9f9f9;
        }
        
        .actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 24px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background: linear-gradient(90deg, #FF416C 0%, #FF4B2B 100%);
            color: white;
        }
        
        .btn-secondary {
            background: #f1f3f5;
            color: #495057;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 14px rgba(0,0,0,0.1);
        }
        
        .gradient-preview {
            height: 150px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background: linear-gradient(90deg, #FF416C 0%, #FF4B2B 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .colors-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .color-item {
            height: 120px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 10px;
            color: white;
            font-weight: 600;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .color-item:hover {
            transform: scale(1.05);
        }
        
        .color-hex {
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 5px;
            text-align: center;
            font-family: monospace;
            font-size: 0.9rem;
        }
        
        .code-output {
            margin-top: 30px;
        }
        
        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        pre {
            background: #2b2b2b;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 10px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            line-height: 1.5;
            max-height: 300px;
            overflow-y: auto;
        }
        
        .instructions {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-top: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        
        .instructions h3 {
            color: #FF416C;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .instructions ul {
            padding-left: 20px;
            line-height: 1.7;
        }
        
        .instructions li {
            margin-bottom: 8px;
            color: #555;
        }
        
        .example-gradients {
            margin-top: 20px;
        }
        
        .example-list {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
        }
        
        .example-item {
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .example-item:hover {
            background: #e9ecef;
            border-color: #FF416C;
        }
        
        footer {
            margin-top: 40px;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            padding: 20px 0;
            border-top: 1px solid #ddd;
            width: 100%;
        }
        
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            
            .colors-list {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            }
            
            h1 {
                font-size: 2.2rem;
            }
        }
        
        @media (max-width: 480px) {
            .color-inputs {
                flex-direction: column;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .controls, .results {
                padding: 20px;
            }
            
            .colors-list {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            }
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-fill-drip"></i> CSS颜色渐变生成器</h1>
            <p class="subtitle">此工具以指定的步数生成 CSS 十六进制颜色渐变 (#)。例如，创建调色板和保持颜色的和谐很有用。</p>
            <div class="tagline">
                <i class="fas fa-lightbulb"></i> 选择起始和结束颜色，设置步数，然后生成平滑的渐变颜色序列！
            </div>
        </header>
        
        <div class="app-container">
            <div class="controls">
                <h2 class="section-title"><i class="fas fa-sliders-h"></i> 渐变设置</h2>
                
                <div class="color-inputs">
                    <div class="color-input-group">
                        <label for="startColor">起始颜色:</label>
                        <div class="color-input-container">
                            <input type="color" id="startColor" value="#FF416C">
                            <input type="text" id="startColorHex" value="#FF416C" maxlength="7">
                        </div>
                    </div>
                    
                    <div class="color-input-group">
                        <label for="endColor">结束颜色:</label>
                        <div class="color-input-container">
                            <input type="color" id="endColor" value="#FF4B2B">
                            <input type="text" id="endColorHex" value="#FF4B2B" maxlength="7">
                        </div>
                    </div>
                </div>
                
                <div class="steps-control">
                    <label for="steps">渐变步数: <span id="stepsLabel">7</span></label>
                    <div class="slider-container">
                        <input type="range" id="steps" min="2" max="20" value="7">
                        <span class="steps-value" id="stepsValue">7</span>
                    </div>
                </div>
                
                <div class="example-gradients">
                    <label>预设渐变示例:</label>
                    <div class="example-list">
                        <div class="example-item" data-start="#FF416C" data-end="#FF4B2B">红到橙</div>
                        <div class="example-item" data-start="#36D1DC" data-end="#5B86E5">青到蓝</div>
                        <div class="example-item" data-start="#834D9B" data-end="#D04ED6">紫到粉</div>
                        <div class="example-item" data-start="#11998e" data-end="#38ef7d">绿到青绿</div>
                        <div class="example-item" data-start="#FF5F6D" data-end="#FFC371">红珊瑚到杏黄</div>
                    </div>
                </div>
                
                <div class="actions">
                    <button class="btn btn-primary" id="generateBtn">
                        <i class="fas fa-magic"></i> 生成渐变
                    </button>
                    <button class="btn btn-secondary" id="resetBtn">
                        <i class="fas fa-redo"></i> 重置
                    </button>
                    <button class="btn btn-secondary" id="reverseBtn">
                        <i class="fas fa-exchange-alt"></i> 反转颜色
                    </button>
                </div>
            </div>
            
            <div class="results">
                <h2 class="section-title"><i class="fas fa-palette"></i> 渐变预览</h2>
                
                <div class="gradient-preview" id="gradientPreview">
                    渐变预览区域
                </div>
                
                <h3 class="section-title"><i class="fas fa-list"></i> 颜色序列 (共 <span id="colorsCount">7</span> 个颜色)</h3>
                <div class="colors-list" id="colorsList">
                    <!-- 颜色将通过JavaScript生成 -->
                </div>
                
                <div class="code-output">
                    <div class="code-header">
                        <h3 class="section-title"><i class="fas fa-code"></i> CSS 代码</h3>
                        <button class="btn btn-secondary" id="copyBtn">
                            <i class="far fa-copy"></i> 复制代码
                        </button>
                    </div>
                    <pre id="cssCode">/* 颜色渐变将在这里生成 */</pre>
                </div>
            </div>
        </div>
        
              </div>
　
        <footer>
           　
        </footer>
    </div>

    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">已复制到剪贴板</span>
    </div>

    <script>
        // 获取DOM元素
        const startColorInput = document.getElementById('startColor');
        const startColorHex = document.getElementById('startColorHex');
        const endColorInput = document.getElementById('endColor');
        const endColorHex = document.getElementById('endColorHex');
        const stepsSlider = document.getElementById('steps');
        const stepsValue = document.getElementById('stepsValue');
        const stepsLabel = document.getElementById('stepsLabel');
        const generateBtn = document.getElementById('generateBtn');
        const resetBtn = document.getElementById('resetBtn');
        const reverseBtn = document.getElementById('reverseBtn');
        const gradientPreview = document.getElementById('gradientPreview');
        const colorsList = document.getElementById('colorsList');
        const colorsCount = document.getElementById('colorsCount');
        const cssCode = document.getElementById('cssCode');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const exampleItems = document.querySelectorAll('.example-item');
        
        // 初始化变量
        let gradientColors = [];
        
        // 初始化
        function init() {
            updateStepsValue();
            generateGradient();
            
            // 设置事件监听器
            startColorInput.addEventListener('input', () => {
                startColorHex.value = startColorInput.value.toUpperCase();
                generateGradient();
            });
            
            startColorHex.addEventListener('input', () => {
                let hex = startColorHex.value;
                if (!hex.startsWith('#')) {
                    hex = '#' + hex;
                }
                if (/^#[0-9A-F]{6}$/i.test(hex)) {
                    startColorInput.value = hex;
                    generateGradient();
                }
            });
            
            endColorInput.addEventListener('input', () => {
                endColorHex.value = endColorInput.value.toUpperCase();
                generateGradient();
            });
            
            endColorHex.addEventListener('input', () => {
                let hex = endColorHex.value;
                if (!hex.startsWith('#')) {
                    hex = '#' + hex;
                }
                if (/^#[0-9A-F]{6}$/i.test(hex)) {
                    endColorInput.value = hex;
                    generateGradient();
                }
            });
            
            stepsSlider.addEventListener('input', () => {
                updateStepsValue();
                generateGradient();
            });
            
            generateBtn.addEventListener('click', generateGradient);
            
            resetBtn.addEventListener('click', () => {
                startColorInput.value = '#FF416C';
                startColorHex.value = '#FF416C';
                endColorInput.value = '#FF4B2B';
                endColorHex.value = '#FF4B2B';
                stepsSlider.value = 7;
                updateStepsValue();
                generateGradient();
                showToast('设置已重置');
            });
            
            reverseBtn.addEventListener('click', () => {
                const tempStartColor = startColorInput.value;
                const tempStartHex = startColorHex.value;
                
                startColorInput.value = endColorInput.value;
                startColorHex.value = endColorHex.value;
                endColorInput.value = tempStartColor;
                endColorHex.value = tempStartHex;
                
                generateGradient();
                showToast('颜色已反转');
            });
            
            copyBtn.addEventListener('click', copyCSSCode);
            
            // 为示例渐变添加事件监听器
            exampleItems.forEach(item => {
                item.addEventListener('click', () => {
                    const startColor = item.getAttribute('data-start');
                    const endColor = item.getAttribute('data-end');
                    
                    startColorInput.value = startColor;
                    startColorHex.value = startColor;
                    endColorInput.value = endColor;
                    endColorHex.value = endColor;
                    
                    generateGradient();
                    showToast(`已应用 ${item.textContent} 渐变`);
                });
            });
        }
        
        // 更新步数值显示
        function updateStepsValue() {
            const steps = parseInt(stepsSlider.value);
            stepsValue.textContent = steps;
            stepsLabel.textContent = steps;
        }
        
        // 生成渐变
        function generateGradient() {
            const startColor = startColorInput.value;
            const endColor = endColorInput.value;
            const steps = parseInt(stepsSlider.value);
            
            // 生成颜色数组
            gradientColors = generateGradientColors(startColor, endColor, steps);
            
            // 更新颜色计数
            colorsCount.textContent = steps;
            
            // 更新渐变预览
            updateGradientPreview(startColor, endColor);
            
            // 更新颜色列表
            updateColorsList();
            
            // 更新CSS代码
            updateCSSCode();
        }
        
        // 生成渐变颜色数组
        function generateGradientColors(startHex, endHex, steps) {
            // 将十六进制转换为RGB
            const startRgb = hexToRgb(startHex);
            const endRgb = hexToRgb(endHex);
            
            const colors = [];
            
            // 生成渐变中的每个颜色
            for (let i = 0; i < steps; i++) {
                const ratio = i / (steps - 1);
                
                // 计算每个颜色通道的中间值
                const r = Math.round(startRgb.r + (endRgb.r - startRgb.r) * ratio);
                const g = Math.round(startRgb.g + (endRgb.g - startRgb.g) * ratio);
                const b = Math.round(startRgb.b + (endRgb.b - startRgb.b) * ratio);
                
                // 将RGB转换回十六进制
                const hex = rgbToHex(r, g, b);
                colors.push(hex);
            }
            
            return colors;
        }
        
        // 十六进制转RGB
        function hexToRgb(hex) {
            // 移除#号
            hex = hex.replace('#', '');
            
            // 解析RGB值
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            
            return { r, g, b };
        }
        
        // RGB转十六进制
        function rgbToHex(r, g, b) {
            return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
        }
        
        // 更新渐变预览
        function updateGradientPreview(startColor, endColor) {
            gradientPreview.style.background = `linear-gradient(90deg, ${startColor} 0%, ${endColor} 100%)`;
        }
        
        // 更新颜色列表
        function updateColorsList() {
            colorsList.innerHTML = '';
            
            gradientColors.forEach((color, index) => {
                const colorItem = document.createElement('div');
                colorItem.className = 'color-item';
                colorItem.style.backgroundColor = color;
                colorItem.setAttribute('data-color', color);
                colorItem.setAttribute('data-index', index + 1);
                
                // 根据颜色亮度设置文字颜色
                const textColor = getContrastColor(color);
                
                const colorHex = document.createElement('div');
                colorHex.className = 'color-hex';
                colorHex.textContent = color;
                colorHex.style.color = textColor;
                
                colorItem.appendChild(colorHex);
                
                // 添加点击事件复制颜色
                colorItem.addEventListener('click', () => {
                    copyToClipboard(color);
                    showToast(`已复制 ${color} 到剪贴板`);
                });
                
                colorsList.appendChild(colorItem);
            });
        }
        
        // 根据背景颜色确定对比色（黑或白）
        function getContrastColor(hexColor) {
            const rgb = hexToRgb(hexColor);
            // 计算相对亮度
            const brightness = (rgb.r * 299 + rgb.g * 587 + rgb.b * 114) / 1000;
            return brightness > 128 ? '#000000' : '#FFFFFF';
        }
        
        // 更新CSS代码
        function updateCSSCode() {
            let code = '/* 渐变颜色序列 */\n';
            code += `/* 从 ${startColorHex.value} 到 ${endColorHex.value} */\n\n`;
            
            // 添加每个颜色的CSS变量
            code += ':root {\n';
            gradientColors.forEach((color, index) => {
                code += `  --gradient-color-${index + 1}: ${color};\n`;
            });
            code += '}\n\n';
            
            // 添加渐变类
            code += '/* 渐变背景类 */\n';
            code += `.gradient-bg {\n`;
            code += `  background: linear-gradient(90deg, ${gradientColors.join(', ')});\n`;
            code += `  background-size: ${100 * (gradientColors.length - 1)}% 100%;\n`;
            code += `}\n\n`;
            
            // 添加每个颜色的独立类
            code += '/* 单个颜色类 */\n';
            gradientColors.forEach((color, index) => {
                code += `.color-${index + 1} {\n`;
                code += `  background-color: ${color};\n`;
                code += `  color: ${getContrastColor(color)};\n`;
                code += `}\n`;
            });
            
            cssCode.textContent = code;
        }
        
        // 复制CSS代码到剪贴板
        function copyCSSCode() {
            copyToClipboard(cssCode.textContent);
            showToast('CSS代码已复制到剪贴板');
        }
        
        // 复制文本到剪贴板
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                console.log('文本已复制到剪贴板');
            }).catch(err => {
                console.error('复制失败: ', err);
                // 降级方案
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
            });
        }
        
        // 显示通知
        function showToast(message) {
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', init);
