<body>
    <div class="container">
        <div class="header">
            <h1>SQL 格式化工具</h1>

        <div class="card">

                        <span class="char-count" id="input-count">0 字符</span>
                    </div>
                    <textarea id="input" placeholder="粘贴您的 SQL 语句到这里，例如：
SELECT * FROM users WHERE age > 18 AND status = 'active' ORDER BY created_at DESC;"></textarea>
                </div>
                <div class="section">
                    <div class="section-header">
                        <label for="output">格式化结果</label>

                        清空
                    </button>
                    <button class="btn btn-primary" id="format">
                        格式化 SQL
                    </button>
                    <button class="btn btn-secondary" id="copy" disabled>
                        复制结果
                    </button>

    <div class="toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/sql-formatter@15.4.3/dist/sql-formatter.min.js"></script>
    <script>
        // DOM 元素
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const indentSelect = document.getElementById('indent');
        const dialectSelect = document.getElementById('dialect');
        const formatBtn = document.getElementById('format');
        const clearBtn = document.getElementById('clear');
        const copyBtn = document.getElementById('copy');
        const inputCount = document.getElementById('input-count');
        const outputCount = document.getElementById('output-count');
        const toast = document.getElementById('toast');

        // 显示提示消息
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 更新字符计数
        function updateCharCount() {
            const inputText = input.value;
            const outputText = output.value;
            inputCount.textContent = `${inputText.length} 字符`;
            outputCount.textContent = `${outputText.length} 字符`;
            
            // 更新复制按钮状态
            copyBtn.disabled = outputText.length === 0;
        }

        // 格式化 SQL
        function formatSql() {
            const sql = input.value.trim();
            if (!sql) {
                showToast('请输入 SQL 语句', true);
                return;
            }

            try {
                formatBtn.disabled = true;
                formatBtn.innerHTML = '<span class="loading"></span> 格式化中...';

                const indent = indentSelect.value;
                const dialect = dialectSelect.value;
                
                const config = {
                    language: dialect,
                    indent: indent === '\\t' ? '\t' : ' '.repeat(parseInt(indent))
                };

                const formatted = sqlFormatter.format(sql, config);
                output.value = formatted;
                
                showToast('SQL 格式化成功！');
            } catch (error) {
                console.error('格式化错误:', error);
                showToast('格式化失败：' + error.message, true);
                output.value = '// 格式化时发生错误：\n' + error.message + '\n\n// 原始 SQL：\n' + sql;
            } finally {
                formatBtn.disabled = false;
                formatBtn.textContent = '格式化 SQL';
                updateCharCount();
            }
        }

        // 清空内容
        function clearContent() {
            input.value = '';
            output.value = '';
            updateCharCount();
            input.focus();
            showToast('已清空所有内容');
        }

        // 复制结果
        async function copyResult() {
            if (!output.value) return;

            try {
                await navigator.clipboard.writeText(output.value);
                showToast('复制成功！');
            } catch (err) {
                // 降级方案
                output.select();
                document.execCommand('copy');
                showToast('已复制到剪贴板！');
            }
        }

        // 事件监听
        formatBtn.addEventListener('click', formatSql);
        clearBtn.addEventListener('click', clearContent);
        copyBtn.addEventListener('click', copyResult);

        input.addEventListener('input', updateCharCount);
        output.addEventListener('input', updateCharCount);

        // 快捷键支持
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                formatSql();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'l' && e.shiftKey) {
                e.preventDefault();
                clearContent();
            }
        });

        // 初始化
        updateCharCount();
        
        // 示例 SQL
        const exampleSQL = `SELECT users.id, users.name, orders.total, orders.created_at FROM users JOIN orders ON users.id = orders.user_id WHERE users.status = 'active' AND orders.total > 100 ORDER BY orders.created_at DESC;`;
        input.placeholder = exampleSQL;

        // 添加输入框自动调整高度
        input.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        output.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
