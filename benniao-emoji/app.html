            color: white;

            z-index: 1000;
            font-weight: 600;
        }
        
        .copy-notification.show {
            display: block;
            animation: fadeInOut 2s ease-in-out;
        }

            0% { opacity: 0; transform: translateY(10px); }

        // 初始化变量
        let currentCategory = "all";
        let searchQuery = "";
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            renderCategoryNav();
            renderAllEmojis();
            setupEventListeners();
            updateEmojiCount();
        });
        
        // 渲染分类导航
        function renderCategoryNav() {
            const categoryNav = document.getElementById('categoryNav');
            
            // 添加"全部"按钮
            const allButton = document.createElement('button');
            allButton.className = 'category-btn active';
            allButton.id = 'btn-all';
            allButton.innerHTML = '<i class="fas fa-th-large"></i> 全部';
            allButton.dataset.category = 'all';
            categoryNav.appendChild(allButton);
            
            // 添加各个分类按钮
            emojiData.forEach(category => {
                const button = document.createElement('button');
                button.className = 'category-btn';
                button.id = `btn-${category.id}`;
                button.innerHTML = `<i class="${category.icon}"></i> ${category.name}`;
                button.dataset.category = category.id;
                categoryNav.appendChild(button);
            });
        }
        
        // 渲染所有Emoji
        function renderAllEmojis() {
            const emojiContainer = document.getElementById('emojiContainer');
            emojiContainer.innerHTML = '';
            
            // 如果没有搜索结果，显示所有分类
            if (!searchQuery) {
                emojiData.forEach(category => {
                    // 如果当前分类不是"全部"且不是当前选中的分类，则跳过
                    if (currentCategory !== 'all' && currentCategory !== category.id) {
                        return;
                    }
                    
                    const categorySection = document.createElement('div');
                    categorySection.className = 'category-section';
                    categorySection.id = `section-${category.id}`;
                    
                    const categoryTitle = document.createElement('h2');
                    categoryTitle.className = 'category-title';
                    categoryTitle.innerHTML = `<div><i class="${category.icon}"></i> ${category.name}</div><div class="category-count">${category.emojis.length}个</div>`;
                    
                    const emojiGrid = document.createElement('div');
                    emojiGrid.className = 'emoji-grid';
                    
                    category.emojis.forEach(emoji => {
                        const emojiItem = createEmojiItem(emoji);
                        emojiGrid.appendChild(emojiItem);
                    });
                    
                    categorySection.appendChild(categoryTitle);
                    categorySection.appendChild(emojiGrid);
                    emojiContainer.appendChild(categorySection);
                });
            } else {
                // 如果有搜索关键词，显示搜索结果
                const searchResults = document.createElement('div');
                searchResults.className = 'category-section';
                searchResults.id = 'section-search-results';
                
                const searchTitle = document.createElement('h2');
                searchTitle.className = 'category-title';
                
                const emojiGrid = document.createElement('div');
                emojiGrid.className = 'emoji-grid';
                
                // 在所有分类中搜索匹配的Emoji
                let foundEmojis = [];
                emojiData.forEach(category => {
                    category.emojis.forEach(emoji => {
                        if (emoji.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                            emoji.char.includes(searchQuery)) {
                            foundEmojis.push(emoji);
                        }
                    });
                });
                
                // 显示搜索结果
                if (foundEmojis.length > 0) {
                    foundEmojis.forEach(emoji => {
                        const emojiItem = createEmojiItem(emoji);
                        emojiGrid.appendChild(emojiItem);
                    });
                    
                    searchTitle.innerHTML = `<div><i class="fas fa-search"></i> 搜索结果</div><div class="category-count">${foundEmojis.length}个</div>`;
                } else {
                    searchTitle.innerHTML = `<div><i class="fas fa-search"></i> 搜索结果</div><div class="category-count">0个</div>`;
                    const noResults = document.createElement('p');
                    noResults.textContent = '没有找到相关Emoji，请尝试其他搜索词';
                    noResults.style.textAlign = 'center';
                    noResults.style.padding = '20px';
                    noResults.style.color = '#6c757d';
                    noResults.style.width = '100%';
                    noResults.style.gridColumn = '1 / -1';
                    emojiGrid.appendChild(noResults);
                }
                
                searchResults.appendChild(searchTitle);
                searchResults.appendChild(emojiGrid);
                emojiContainer.appendChild(searchResults);
            }
        }
        
        // 创建单个Emoji项
        function createEmojiItem(emoji) {
            const emojiItem = document.createElement('div');
            emojiItem.className = 'emoji-item';
            
            const emojiChar = document.createElement('div');
            emojiChar.className = 'emoji-char';
            emojiChar.textContent = emoji.char;
            
            const emojiName = document.createElement('div');
            emojiName.className = 'emoji-name';
            emojiName.textContent = emoji.name;
            
            emojiItem.appendChild(emojiChar);
            emojiItem.appendChild(emojiName);
            
            // 添加点击复制功能
            emojiItem.addEventListener('click', function() {
                copyToClipboard(emoji.char, emojiItem);
            });
            
            return emojiItem;
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            // 分类按钮点击事件
            document.querySelectorAll('.category-btn').forEach(button => {
                button.addEventListener('click', function() {
                    // 更新活动按钮
                    document.querySelectorAll('.category-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    this.classList.add('active');
                    
                    // 更新当前分类
                    currentCategory = this.dataset.category;
                    
                    // 重新渲染Emoji
                    renderAllEmojis();
                });
            });
            
            // 搜索输入事件
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function() {
                searchQuery = this.value.trim();
                
                // 如果有搜索词，激活"全部"分类
                if (searchQuery) {
                    document.querySelectorAll('.category-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    document.getElementById('btn-all').classList.add('active');
                    currentCategory = 'all';
                }
                
                // 重新渲染Emoji
                renderAllEmojis();
            });
        }
        
        // 复制到剪贴板
        function copyToClipboard(text, element) {
            navigator.clipboard.writeText(text).then(() => {
                // 显示复制成功提示
                const notification = document.getElementById('copyNotification');
                notification.classList.add('show');
                
                // 添加复制成功样式
                element.classList.add('copied');
                
                // 3秒后移除样式
                setTimeout(() => {
                    element.classList.remove('copied');
                }, 1000);
                
                // 2秒后隐藏提示
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 2000);
            }).catch(err => {
                // 如果navigator.clipboard不可用，使用传统方法
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                // 显示复制成功提示
                const notification = document.getElementById('copyNotification');
                notification.classList.add('show');
                
                // 添加复制成功样式
                element.classList.add('copied');
                
                // 3秒后移除样式
                setTimeout(() => {
                    element.classList.remove('copied');
                }, 1000);
                
                // 2秒后隐藏提示
                setTimeout(() => {
                    notification.classList.remove('show');
                }, 2000);
            });
        }
        
        // 更新Emoji计数
        function updateEmojiCount() {
            let totalCount = 0;
            emojiData.forEach(category => {
                totalCount += category.emojis.length;
            });
            document.getElementById('emojiCount').textContent = `共 ${totalCount} 个Emoji符号`;
        }
