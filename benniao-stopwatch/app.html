<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全屏计时器 - 监控事物持续时间- 笨鸟办公工具集箱</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"
     crossorigin="anonymous"></script>
    <link rel="canonical" href="https://www.benniaooffice.com/tools/benniao-stopwatch/">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s ease;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        body.fullscreen {
            padding: 0;
        }
        
        .container {
            width: 100%;
            max-width: 1000px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        body.fullscreen .container {
            max-width: 100%;
            border-radius: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: linear-gradient(to right, #0f3460, #1a1a2e);
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        body.fullscreen header {
            padding: 15px;
        }
        
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        body.fullscreen h1 {
            font-size: 2rem;
        }
        
        h1 i {
            font-size: 2.2rem;
        }
        
        .subtitle {
            font-size: 1.1rem;
            opacity: 0.9;
            font-weight: 300;
        }
        
        body.fullscreen .subtitle {
            font-size: 1rem;
        }
        
        .timer-container {
            padding: 40px 20px;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.2);
        }
        
        body.fullscreen .timer-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
        }
        
        .time-display {
            font-size: 5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 40px;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(79, 195, 247, 0.7);
            letter-spacing: 2px;
        }
        
        body.fullscreen .time-display {
            font-size: 8rem;
            margin-bottom: 60px;
        }
        
        .milliseconds {
            font-size: 3.5rem;
            color: #4fc3f7;
        }
        
        body.fullscreen .milliseconds {
            font-size: 5.5rem;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        
        body.fullscreen .controls {
            margin-bottom: 60px;
        }
        
        .btn {
            padding: 15px 35px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }
        
        .btn:hover::before {
            left: 100%;
        }
        
        .btn-start {
            background: linear-gradient(to right, #00c853, #64dd17);
            color: white;
        }
        
        .btn-start:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 200, 83, 0.4);
        }
        
        .btn-pause {
            background: linear-gradient(to right, #ff9800, #ffb74d);
            color: white;
        }
        
        .btn-pause:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(255, 152, 0, 0.4);
        }
        
        .btn-reset {
            background: linear-gradient(to right, #f44336, #ef5350);
            color: white;
        }
        
        .btn-reset:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(244, 67, 54, 0.4);
        }
        
        .btn-record {
            background: linear-gradient(to right, #2196f3, #42a5f5);
            color: white;
        }
        
        .btn-record:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(33, 150, 243, 0.4);
        }
        
        .btn-fullscreen {
            background: linear-gradient(to right, #9c27b0, #ba68c8);
            color: white;
        }
        
        .btn-fullscreen:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(156, 39, 176, 0.4);
        }
        
        .btn:disabled {
            background: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .btn:disabled:hover::before {
            left: -100%;
        }
        
        .records-container {
            padding: 0 30px 30px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        body.fullscreen .records-container {
            display: none;
        }
        
        h2 {
            color: #bbdefb;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(187, 222, 251, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .records-list {
            max-height: 200px;
            overflow-y: auto;
            border-radius: 10px;
            background-color: rgba(0, 0, 0, 0.2);
            padding: 15px;
        }
        
        .record-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background-color: rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
            border-radius: 8px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #2196f3;
            animation: fadeIn 0.5s ease;
        }
        
        .record-item:nth-child(odd) {
            border-left-color: #4caf50;
        }
        
        .record-item:nth-child(even) {
            border-left-color: #9c27b0;
        }
        
        .record-time {
            font-weight: bold;
            color: #fff;
            font-size: 1.2rem;
        }
        
        .record-duration {
            color: #bbdefb;
            font-weight: 500;
        }
        
        .no-records {
            text-align: center;
            color: #90a4ae;
            font-style: italic;
            padding: 30px;
        }
        
        .instructions {
            background-color: rgba(15, 52, 96, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }
        
        body.fullscreen .instructions {
            display: none;
        }
        
        .instructions h3 {
            color: #bbdefb;
            margin-bottom: 15px;
        }
        
        .instructions ul {
            padding-left: 20px;
            color: #e3f2fd;
        }
        
        .instructions li {
            margin-bottom: 10px;
            line-height: 1.5;
        }
        
        .fullscreen-notice {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideIn 0.5s ease;
        }
        
        body.fullscreen .fullscreen-notice {
            display: flex;
        }
        
        .exit-fullscreen-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 1000;
            font-size: 1.5rem;
        }
        
        body.fullscreen .exit-fullscreen-btn {
            display: flex;
        }
        
        .fullscreen-controls {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            justify-content: center;
            gap: 15px;
            z-index: 1000;
        }
        
        body.fullscreen .fullscreen-controls {
            display: flex;
        }
        
        .fullscreen-controls .btn {
            padding: 12px 25px;
            font-size: 1rem;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        @keyframes pulse {
            0% { text-shadow: 0 0 10px rgba(79, 195, 247, 0.7); }
            50% { text-shadow: 0 0 30px rgba(79, 195, 247, 0.9); }
            100% { text-shadow: 0 0 10px rgba(79, 195, 247, 0.7); }
        }
        
        .pulse {
            animation: pulse 2s infinite;
        }
        
        @media (max-width: 768px) {
            .time-display {
                font-size: 3.5rem;
            }
            
            body.fullscreen .time-display {
                font-size: 5rem;
            }
            
            .milliseconds {
                font-size: 2.2rem;
            }
            
            body.fullscreen .milliseconds {
                font-size: 3.5rem;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 1rem;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            body.fullscreen h1 {
                font-size: 1.8rem;
            }
        }
        
        @media (max-width: 480px) {
            .time-display {
                font-size: 2.8rem;
            }
            
            body.fullscreen .time-display {
                font-size: 4rem;
            }
            
            .milliseconds {
                font-size: 1.8rem;
            }
            
            body.fullscreen .milliseconds {
                font-size: 2.5rem;
            }
            
            .controls {
                gap: 10px;
            }
            
            .btn {
                padding: 10px 15px;
                font-size: 0.9rem;
            }
            
            .fullscreen-controls .btn {
                padding: 10px 15px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="fullscreen-notice">
        <i class="fas fa-expand-arrows-alt"></i> 全屏模式 - 按ESC键或点击退出按钮可退出
    </div>
    
    <button class="exit-fullscreen-btn" id="exitFullscreenBtn" title="退出全屏">
        <i class="fas fa-compress"></i>
    </button>
    
    <div class="container">
        <header>
            <h1><i class="fas fa-stopwatch"></i> 全屏计时器</h1>
            <p class="subtitle">监控事物的持续时间，点击开始进入全屏模式</p>
        </header>
        
        <div class="timer-container">
            <div class="time-display">
                <span id="hours">00</span>:<span id="minutes">00</span>:<span id="seconds">00</span>.<span id="milliseconds" class="milliseconds">000</span>
            </div>
            
            <div class="controls">
                <button id="startBtn" class="btn btn-start">
                    <i class="fas fa-play"></i> 开始
                </button>
                <button id="pauseBtn" class="btn btn-pause" disabled>
                    <i class="fas fa-pause"></i> 暂停
                </button>
                <button id="resetBtn" class="btn btn-reset" disabled>
                    <i class="fas fa-stop"></i> 重置
                </button>
                <button id="recordBtn" class="btn btn-record" disabled>
                    <i class="fas fa-flag"></i> 记录
                </button>
                <button id="fullscreenBtn" class="btn btn-fullscreen">
                    <i class="fas fa-expand"></i> 全屏
                </button>
            </div>
        </div>
        
        <div class="records-container">
            <h2><i class="fas fa-history"></i> 时间记录</h2>
            <div class="records-list" id="recordsList">
                <div class="no-records">暂无记录，点击"记录"按钮可记录当前时间点</div>
            </div>
        </div>
        
        <div class="instructions">
            <h3><i class="fas fa-info-circle"></i> 使用说明</h3>
            <ul>
                <li><strong>开始</strong>：启动计时器并自动进入全屏模式</li>
                <li><strong>暂停</strong>：暂停当前计时，可以继续计时</li>
                <li><strong>重置</strong>：将计时器归零，清空所有记录</li>
                <li><strong>记录</strong>：记录当前时间点，用于跟踪多个时间节点</li>
                <li><strong>全屏</strong>：手动切换全屏模式</li>
                <li>计时器显示格式为：小时:分钟:秒.毫秒</li>
                <li>在全屏模式下，按ESC键或点击左上角退出按钮可退出全屏</li>
            </ul>
        </div>
    </div>
    
    <div class="fullscreen-controls">
        <button id="fsStartBtn" class="btn btn-start">
            <i class="fas fa-play"></i> 开始
        </button>
        <button id="fsPauseBtn" class="btn btn-pause" disabled>
            <i class="fas fa-pause"></i> 暂停
        </button>
        <button id="fsResetBtn" class="btn btn-reset" disabled>
            <i class="fas fa-stop"></i> 重置
        </button>
        <button id="fsRecordBtn" class="btn btn-record" disabled>
            <i class="fas fa-flag"></i> 记录
        </button>
        <button id="fsExitBtn" class="btn btn-fullscreen">
            <i class="fas fa-compress"></i> 退出全屏
        </button>
    </div>

    <script>
        // 获取DOM元素
        const hoursElement = document.getElementById('hours');
        const minutesElement = document.getElementById('minutes');
        const secondsElement = document.getElementById('seconds');
        const millisecondsElement = document.getElementById('milliseconds');
        
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const recordBtn = document.getElementById('recordBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const exitFullscreenBtn = document.getElementById('exitFullscreenBtn');
        const recordsList = document.getElementById('recordsList');
        
        // 全屏控制按钮
        const fsStartBtn = document.getElementById('fsStartBtn');
        const fsPauseBtn = document.getElementById('fsPauseBtn');
        const fsResetBtn = document.getElementById('fsResetBtn');
        const fsRecordBtn = document.getElementById('fsRecordBtn');
        const fsExitBtn = document.getElementById('fsExitBtn');
        
        // 计时器变量
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let isRunning = false;
        let records = [];
        let isFullscreen = false;
        
        // 格式化时间为两位数
        function formatTime(time) {
            return time < 10 ? `0${time}` : time;
        }
        
        // 格式化毫秒为三位数
        function formatMilliseconds(ms) {
            if (ms < 10) return `00${ms}`;
            if (ms < 100) return `0${ms}`;
            return ms;
        }
        
        // 更新时间显示
        function updateTimer() {
            const currentTime = Date.now();
            elapsedTime = currentTime - startTime;
            
            // 计算时间单位
            const hours = Math.floor(elapsedTime / (1000 * 60 * 60));
            const minutes = Math.floor((elapsedTime % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((elapsedTime % (1000 * 60)) / 1000);
            const milliseconds = Math.floor(elapsedTime % 1000);
            
            // 更新显示
            hoursElement.textContent = formatTime(hours);
            minutesElement.textContent = formatTime(minutes);
            secondsElement.textContent = formatTime(seconds);
            millisecondsElement.textContent = formatMilliseconds(milliseconds);
            
            // 全屏时添加脉冲动画
            if (isFullscreen && isRunning) {
                millisecondsElement.classList.add('pulse');
            } else {
                millisecondsElement.classList.remove('pulse');
            }
        }
        
        // 切换全屏模式
        function toggleFullscreen() {
            if (!isFullscreen) {
                // 进入全屏
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`全屏请求错误: ${err.message}`);
                });
                document.body.classList.add('fullscreen');
                isFullscreen = true;
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i> 退出全屏';
                fullscreenBtn.classList.remove('btn-fullscreen');
                fullscreenBtn.classList.add('btn-reset');
            } else {
                // 退出全屏
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
                document.body.classList.remove('fullscreen');
                isFullscreen = false;
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i> 全屏';
                fullscreenBtn.classList.remove('btn-reset');
                fullscreenBtn.classList.add('btn-fullscreen');
            }
        }
        
        // 开始计时器
        function startTimer() {
            if (!isRunning) {
                // 如果不在全屏模式，自动进入全屏
                if (!isFullscreen) {
                    toggleFullscreen();
                }
                
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(updateTimer, 10);
                isRunning = true;
                
                // 更新按钮状态
                updateButtonStates();
                
                startBtn.innerHTML = '<i class="fas fa-play"></i> 运行中';
                fsStartBtn.innerHTML = '<i class="fas fa-play"></i> 运行中';
                startBtn.classList.add('btn-pause');
                startBtn.classList.remove('btn-start');
                fsStartBtn.classList.add('btn-pause');
                fsStartBtn.classList.remove('btn-start');
            }
        }
        
        // 暂停计时器
        function pauseTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                
                // 更新按钮状态
                updateButtonStates();
                
                startBtn.innerHTML = '<i class="fas fa-play"></i> 继续';
                fsStartBtn.innerHTML = '<i class="fas fa-play"></i> 继续';
                startBtn.classList.remove('btn-pause');
                startBtn.classList.add('btn-start');
                fsStartBtn.classList.remove('btn-pause');
                fsStartBtn.classList.add('btn-start');
            }
        }
        
        // 重置计时器
        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            elapsedTime = 0;
            records = [];
            
            // 重置显示
            hoursElement.textContent = '00';
            minutesElement.textContent = '00';
            secondsElement.textContent = '00';
            millisecondsElement.textContent = '000';
            
            // 更新按钮状态
            updateButtonStates();
            
            startBtn.innerHTML = '<i class="fas fa-play"></i> 开始';
            fsStartBtn.innerHTML = '<i class="fas fa-play"></i> 开始';
            startBtn.classList.remove('btn-pause');
            startBtn.classList.add('btn-start');
            fsStartBtn.classList.remove('btn-pause');
            fsStartBtn.classList.add('btn-start');
            
            // 清空记录列表
            updateRecordsList();
        }
        
        // 记录当前时间
        function recordTime() {
            if (elapsedTime > 0) {
                // 获取当前时间显示值
                const hours = hoursElement.textContent;
                const minutes = minutesElement.textContent;
                const seconds = secondsElement.textContent;
                const milliseconds = millisecondsElement.textContent;
                
                // 创建记录对象
                const record = {
                    id: Date.now(),
                    time: `${hours}:${minutes}:${seconds}.${milliseconds}`,
                    duration: elapsedTime
                };
                
                // 添加到记录数组
                records.unshift(record);
                
                // 更新记录列表
                updateRecordsList();
                
                // 添加视觉反馈
                recordBtn.innerHTML = '<i class="fas fa-check"></i> 已记录';
                fsRecordBtn.innerHTML = '<i class="fas fa-check"></i> 已记录';
                setTimeout(() => {
                    if (isRunning) {
                        recordBtn.innerHTML = '<i class="fas fa-flag"></i> 记录';
                        fsRecordBtn.innerHTML = '<i class="fas fa-flag"></i> 记录';
                    }
                }, 800);
            }
        }
        
        // 更新按钮状态
        function updateButtonStates() {
            // 普通控制按钮
            startBtn.disabled = isRunning;
            pauseBtn.disabled = !isRunning;
            resetBtn.disabled = !isRunning && elapsedTime === 0;
            recordBtn.disabled = !isRunning;
            
            // 全屏控制按钮
            fsStartBtn.disabled = isRunning;
            fsPauseBtn.disabled = !isRunning;
            fsResetBtn.disabled = !isRunning && elapsedTime === 0;
            fsRecordBtn.disabled = !isRunning;
        }
        
        // 更新记录列表显示
        function updateRecordsList() {
            if (records.length === 0) {
                recordsList.innerHTML = '<div class="no-records">暂无记录，点击"记录"按钮可记录当前时间点</div>';
                return;
            }
            
            recordsList.innerHTML = '';
            records.forEach(record => {
                const recordItem = document.createElement('div');
                recordItem.className = 'record-item';
                recordItem.innerHTML = `
                    <div>
                        <div class="record-time">${record.time}</div>
                        <div class="record-duration">记录时间点 ${records.indexOf(record) + 1}</div>
                    </div>
                    <div>
                        <i class="fas fa-clock"></i>
                    </div>
                `;
                recordsList.appendChild(recordItem);
            });
        }
        
        // 添加按钮事件监听
        startBtn.addEventListener('click', startTimer);
        pauseBtn.addEventListener('click', pauseTimer);
        resetBtn.addEventListener('click', resetTimer);
        recordBtn.addEventListener('click', recordTime);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        exitFullscreenBtn.addEventListener('click', toggleFullscreen);
        
        // 全屏控制按钮事件监听
        fsStartBtn.addEventListener('click', startTimer);
        fsPauseBtn.addEventListener('click', pauseTimer);
        fsResetBtn.addEventListener('click', resetTimer);
        fsRecordBtn.addEventListener('click', recordTime);
        fsExitBtn.addEventListener('click', toggleFullscreen);
        
        // 监听全屏变化事件
        document.addEventListener('fullscreenchange', function() {
            isFullscreen = !!document.fullscreenElement;
            document.body.classList.toggle('fullscreen', isFullscreen);
            
            if (isFullscreen) {
                fullscreenBtn.innerHTML = '<i class="fas fa-compress"></i> 退出全屏';
                fullscreenBtn.classList.remove('btn-fullscreen');
                fullscreenBtn.classList.add('btn-reset');
            } else {
                fullscreenBtn.innerHTML = '<i class="fas fa-expand"></i> 全屏';
                fullscreenBtn.classList.remove('btn-reset');
                fullscreenBtn.classList.add('btn-fullscreen');
            }
        });
        
        // 添加键盘快捷键支持
        document.addEventListener('keydown', function(event) {
            // 空格键 - 开始/暂停
            if (event.code === 'Space') {
                event.preventDefault(); // 防止空格键滚动页面
                if (isRunning) {
                    pauseTimer();
                } else {
                    startTimer();
                }
            }
            
            // R键 - 重置
            if (event.code === 'KeyR' && (event.ctrlKey || event.metaKey)) {
                event.preventDefault();
                resetTimer();
            }
            
            // L键 - 记录时间
            if (event.code === 'KeyL' && isRunning) {
                event.preventDefault();
                recordTime();
            }
            
            // F键 - 切换全屏
            if (event.code === 'KeyF' && !event.ctrlKey) {
                event.preventDefault();
                toggleFullscreen();
            }
            
            // ESC键 - 退出全屏
            if (event.code === 'Escape' && isFullscreen) {
                toggleFullscreen();
            }
        });
        
        // 初始更新按钮状态
        updateButtonStates();
        
        // 初始更新记录列表
        updateRecordsList();
    </script>
</body>
</html>
