<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>图片尺寸调整工具 - 笨鸟办公工具集箱</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"
     crossorigin="anonymous"></script>
    <meta name="description" content="在线图片尺寸调整工具，支持自定义宽高、保持比例、多格式导出等功能">
    <link rel="canonical" href="https://www.benniaooffice.com/tools/image-resizer/app.html">
    <style>
        :root {
            --accent: #06b6d4;
            --accent-dark: #0891b2;
            --accent-soft: rgba(6, 182, 212, 0.1);
            --bg: #0f172a;
            --text: #0f172a;
            --text-light: #475569;
            --text-white: #f8fafc;
            --border: #e2e8f0;
            --card-bg: rgba(255, 255, 255, 0.98);
            --radius: 16px;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #06b6d4 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            text-align: center;
            color: var(--text-white);
            margin-bottom: 30px;
            padding: 20px 0;
        }

        .header h1 {
            font-size: clamp(1.8rem, 4vw, 2.5rem);
            margin-bottom: 12px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: clamp(1rem, 2vw, 1.2rem);
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: clamp(20px, 4vw, 30px);
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }

        .section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-title {
            color: #1f2937;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: "";
            display: block;
            width: 4px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 14px;
            color: var(--text-light);
            font-weight: 500;
        }

        input[type="number"],
        input[type="file"],
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: white;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .dimensions-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 10px 0;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        .preview-container {
            background: #f8fafc;
            border-radius: 12px;
            padding: 20px;
            border: 2px dashed var(--border);
            min-height: 300px;
            display: flex;
            flex-direction: column;
        }

        .preview-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .preview-placeholder {
            text-align: center;
            color: var(--text-light);
            padding: 40px 20px;
        }

        .preview-placeholder svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .preview-img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            display: block;
        }

        .image-info {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-light);
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-value {
            font-weight: 600;
            color: var(--text);
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .btn {
            flex: 1;
            min-width: 140px;
            padding: 14px 24px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            text-align: center;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--accent-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(6, 182, 212, 0.3);
        }

        .btn-secondary {
            background: #64748b;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #475569;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(100, 116, 139, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-icon {
            width: 18px;
            height: 18px;
        }

        .quality-control {
            margin-top: 15px;
        }

        .quality-slider {
            width: 100%;
            height: 6px;
            margin-top: 8px;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border);
            border-radius: 3px;
            outline: none;
        }

        .quality-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: 3px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .quality-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-light);
            margin-top: 5px;
        }

        .loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 12px;
            z-index: 10;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 14px;
            display: none;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #ef4444;
        }

        .reset-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: #f8fafc;
            color: var(--text);
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            
            .card {
                padding: 20px;
            }
            
            .btn {
                min-width: 100%;
            }
            
            .dimensions-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 文件上传区域样式 */
        .file-upload {
            position: relative;
            overflow: hidden;
            display: inline-block;
            width: 100%;
        }

        .file-upload input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .file-label {
            display: block;
            padding: 40px 20px;
            background: var(--accent-soft);
            border: 2px dashed var(--accent);
            border-radius: 12px;
            text-align: center;
            color: var(--accent-dark);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-label:hover {
            background: rgba(6, 182, 212, 0.15);
        }

        .file-label svg {
            width: 48px;
            height: 48px;
            margin-bottom: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>图片尺寸调整工具</h1>
            <p>上传图片，调整尺寸，立即下载优化后的图片</p>
        </header>

        <main class="card">
            <div id="alert" class="alert" role="alert"></div>
            
            <div class="grid">
                <!-- 左侧：控制面板 -->
                <div class="section">
                    <div>
                        <h3 class="section-title">上传图片</h3>
                        <div class="file-upload">
                            <input type="file" id="file" accept="image/*">
                            <label for="file" class="file-label">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
                                </svg>
                                <div>点击上传图片或拖拽到此处</div>
                                <div style="font-size: 12px; margin-top: 8px; opacity: 0.7;">支持 JPG、PNG、WebP 格式，最大 10MB</div>
                            </label>
                        </div>
                    </div>

                    <div>
                        <h3 class="section-title">调整尺寸</h3>
                        <div class="dimensions-grid">
                            <div class="control-group">
                                <label for="width">宽度 (px)</label>
                                <input type="number" id="width" min="1" max="10000" placeholder="输入宽度">
                            </div>
                            <div class="control-group">
                                <label for="height">高度 (px)</label>
                                <input type="number" id="height" min="1" max="10000" placeholder="输入高度">
                            </div>
                        </div>
                        
                        <div class="checkbox-group">
                            <input type="checkbox" id="lock" checked>
                            <label for="lock">保持原始比例</label>
                        </div>
                        
                        <div class="row">
                            <button id="resetSize" class="reset-btn">重置为原始尺寸</button>
                        </div>
                    </div>

                    <div>
                        <h3 class="section-title">输出设置</h3>
                        <div class="control-group">
                            <label for="format">输出格式</label>
                            <select id="format">
                                <option value="image/png">PNG (高质量，透明背景)</option>
                                <option value="image/jpeg">JPEG (高压缩，适合照片)</option>
                                <option value="image/webp">WebP (现代格式，最优压缩)</option>
                            </select>
                        </div>
                        
                        <div class="quality-control" id="qualityControl">
                            <label for="quality">JPEG/WebP 质量: <span id="qualityValue">92</span>%</label>
                            <input type="range" id="quality" min="10" max="100" value="92" step="1" class="quality-slider">
                            <div class="quality-labels">
                                <span>低</span>
                                <span>高</span>
                            </div>
                        </div>
                    </div>

                    <div class="actions">
                        <button id="resize" class="btn btn-primary" disabled>
                            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                            生成新图片
                        </button>
                        <a id="download" class="btn btn-secondary" download disabled>
                            <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                            </svg>
                            下载图片
                        </a>
                    </div>
                </div>

                <!-- 右侧：预览面板 -->
                <div class="section">
                    <h3 class="section-title">预览与信息</h3>
                    <div class="preview-container">
                        <div class="preview-area" id="previewArea">
                            <div class="preview-placeholder" id="previewPlaceholder">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                                <p>图片预览区域</p>
                                <p style="font-size: 12px; margin-top: 8px; opacity: 0.7;">上传图片后显示预览</p>
                            </div>
                            <img id="previewImg" class="preview-img" style="display: none;">
                            <div id="loading" class="loading" style="display: none;">
                                <div class="loading-spinner"></div>
                                <p>正在处理图片...</p>
                            </div>
                        </div>
                        
                        <div class="image-info" id="imageInfo" style="display: none;">
                            <div class="info-item">
                                <div>原始尺寸</div>
                                <div class="info-value" id="originalSize">-</div>
                            </div>
                            <div class="info-item">
                                <div>新尺寸</div>
                                <div class="info-value" id="newSize">-</div>
                            </div>
                            <div class="info-item">
                                <div>文件大小</div>
                                <div class="info-value" id="fileSize">-</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // DOM 元素
        const fileInput = document.getElementById('file');
        const widthInput = document.getElementById('width');
        const heightInput = document.getElementById('height');
        const lockInput = document.getElementById('lock');
        const formatSelect = document.getElementById('format');
        const qualitySlider = document.getElementById('quality');
        const qualityValue = document.getElementById('qualityValue');
        const qualityControl = document.getElementById('qualityControl');
        const resizeBtn = document.getElementById('resize');
        const downloadLink = document.getElementById('download');
        const previewArea = document.getElementById('previewArea');
        const previewImg = document.getElementById('previewImg');
        const previewPlaceholder = document.getElementById('previewPlaceholder');
        const loading = document.getElementById('loading');
        const alertBox = document.getElementById('alert');
        const resetSizeBtn = document.getElementById('resetSize');
        const imageInfo = document.getElementById('imageInfo');
        const originalSize = document.getElementById('originalSize');
        const newSize = document.getElementById('newSize');
        const fileSize = document.getElementById('fileSize');

        // 状态变量
        let originalImage = new Image();
        let aspectRatio = 1;
        let originalWidth = 0;
        let originalHeight = 0;
        let processedImageUrl = null;

        // 显示消息
        function showMessage(message, type = 'success') {
            alertBox.textContent = message;
            alertBox.className = `alert alert-${type}`;
            alertBox.style.display = 'block';
            
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }

        // 显示加载状态
        function showLoading(show) {
            loading.style.display = show ? 'flex' : 'none';
        }

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // 更新图片信息
        function updateImageInfo(newWidth, newHeight, blob) {
            originalSize.textContent = `${originalWidth} × ${originalHeight} 像素`;
            newSize.textContent = `${newWidth} × ${newHeight} 像素`;
            fileSize.textContent = formatFileSize(blob.size);
            imageInfo.style.display = 'flex';
        }

        // 处理文件上传
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            // 检查文件大小（限制为10MB）
            if (file.size > 10 * 1024 * 1024) {
                showMessage('文件大小不能超过10MB', 'error');
                return;
            }
            
            // 检查文件类型
            if (!file.type.startsWith('image/')) {
                showMessage('请上传图片文件', 'error');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (event) => {
                showLoading(true);
                originalImage = new Image();
                
                originalImage.onload = () => {
                    originalWidth = originalImage.naturalWidth;
                    originalHeight = originalImage.naturalHeight;
                    aspectRatio = originalWidth / originalHeight;
                    
                    // 更新输入框
                    widthInput.value = originalWidth;
                    heightInput.value = originalHeight;
                    
                    // 显示预览
                    previewImg.src = event.target.result;
                    previewImg.style.display = 'block';
                    previewPlaceholder.style.display = 'none';
                    
                    // 启用按钮
                    resizeBtn.disabled = false;
                    
                    // 更新图片信息
                    originalSize.textContent = `${originalWidth} × ${originalHeight} 像素`;
                    imageInfo.style.display = 'flex';
                    
                    showLoading(false);
                    showMessage('图片上传成功，可以开始调整尺寸');
                };
                
                originalImage.onerror = () => {
                    showLoading(false);
                    showMessage('图片加载失败，请重试', 'error');
                };
                
                originalImage.src = event.target.result;
            };
            
            reader.onerror = () => {
                showLoading(false);
                showMessage('文件读取失败', 'error');
            };
            
            reader.readAsDataURL(file);
        });

        // 拖放上传
        previewArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            previewArea.style.borderColor = 'var(--accent)';
            previewArea.style.backgroundColor = 'var(--accent-soft)';
        });

        previewArea.addEventListener('dragleave', () => {
            previewArea.style.borderColor = 'var(--border)';
            previewArea.style.backgroundColor = 'white';
        });

        previewArea.addEventListener('drop', (e) => {
            e.preventDefault();
            previewArea.style.borderColor = 'var(--border)';
            previewArea.style.backgroundColor = 'white';
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                fileInput.files = e.dataTransfer.files;
                fileInput.dispatchEvent(new Event('change'));
            } else {
                showMessage('请拖放图片文件', 'error');
            }
        });

        // 锁定比例
        widthInput.addEventListener('input', () => {
            if (lockInput.checked && widthInput.value && !isNaN(widthInput.value)) {
                heightInput.value = Math.round(Number(widthInput.value) / aspectRatio);
            }
        });

        heightInput.addEventListener('input', () => {
            if (lockInput.checked && heightInput.value && !isNaN(heightInput.value)) {
                widthInput.value = Math.round(Number(heightInput.value) * aspectRatio);
            }
        });

        // 重置尺寸
        resetSizeBtn.addEventListener('click', () => {
            widthInput.value = originalWidth;
            heightInput.value = originalHeight;
        });

        // 质量滑块
        qualitySlider.addEventListener('input', () => {
            qualityValue.textContent = qualitySlider.value;
        });

        // 格式选择变化时显示/隐藏质量控件
        formatSelect.addEventListener('change', () => {
            const format = formatSelect.value;
            qualityControl.style.display = (format === 'image/jpeg' || format === 'image/webp') ? 'block' : 'none';
        });

        // 初始隐藏质量控件（PNG默认）
        qualityControl.style.display = 'none';

        // 调整图片尺寸
        resizeBtn.addEventListener('click', async () => {
            if (!originalImage.src) {
                showMessage('请先上传图片', 'error');
                return;
            }
            
            const width = parseInt(widthInput.value);
            const height = parseInt(heightInput.value);
            
            if (!width || !height || width < 1 || height < 1) {
                showMessage('请输入有效的宽度和高度', 'error');
                return;
            }
            
            if (width > 10000 || height > 10000) {
                showMessage('尺寸不能超过10000像素', 'error');
                return;
            }
            
            showLoading(true);
            
            try {
                // 创建Canvas
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                
                // 设置画质
                const format = formatSelect.value;
                let quality = 0.92; // PNG默认质量
                
                if (format === 'image/jpeg' || format === 'image/webp') {
                    quality = parseInt(qualitySlider.value) / 100;
                }
                
                // 绘制图片
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = 'high';
                ctx.drawImage(originalImage, 0, 0, width, height);
                
                // 转换为Blob
                const blob = await new Promise((resolve) => {
                    canvas.toBlob((blob) => {
                        resolve(blob);
                    }, format, quality);
                });
                
                if (!blob) {
                    throw new Error('图片处理失败');
                }
                
                // 创建对象URL
                if (processedImageUrl) {
                    URL.revokeObjectURL(processedImageUrl);
                }
                
                processedImageUrl = URL.createObjectURL(blob);
                
                // 更新预览
                previewImg.src = processedImageUrl;
                previewImg.style.display = 'block';
                
                // 更新下载链接
                const formatExt = format.split('/')[1];
                downloadLink.href = processedImageUrl;
                downloadLink.download = `resized_${width}x${height}.${formatExt}`;
                downloadLink.disabled = false;
                
                // 更新图片信息
                updateImageInfo(width, height, blob);
                
                showLoading(false);
                showMessage(`图片调整成功！新尺寸：${width} × ${height} 像素`);
            } catch (error) {
                showLoading(false);
                showMessage('图片处理失败: ' + error.message, 'error');
                console.error('图片处理错误:', error);
            }
        });

        // 下载按钮点击事件
        downloadLink.addEventListener('click', () => {
            if (processedImageUrl) {
                // 下载后可以显示成功消息
                setTimeout(() => {
                    showMessage('图片下载开始，请检查您的下载文件夹');
                }, 100);
            }
        });

        // 页面卸载时清理对象URL
        window.addEventListener('beforeunload', () => {
            if (processedImageUrl) {
                URL.revokeObjectURL(processedImageUrl);
            }
        });

        // 初始状态
        resizeBtn.disabled = true;
        downloadLink.disabled = true;
    </script>
</body>
</html>
