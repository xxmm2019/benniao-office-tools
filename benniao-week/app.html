<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-calendar-alt"></i> 在线周数计算器</h1>
            <p class="subtitle">快速计算任意日期是当年的第几周</p>
        </header>
        
        <div class="main-content">
            <div class="input-section">
                <div class="date-selector">
                    <div class="date-group">
                        <label for="dateInput"><i class="far fa-calendar"></i> 选择日期</label>
                        <input type="date" id="dateInput" value="">
                    </div>
                </div>
                
                <div class="buttons">
                    <button id="calculateBtn">
                        <i class="fas fa-calculator"></i> 计算周数
                    </button>
                    <button id="todayBtn">
                        <i class="fas fa-calendar-day"></i> 今天
                    </button>
                </div>
            </div>
            
            <div class="result-section">
                <div class="result-header">
                    <i class="fas fa-chart-line"></i>
                    <h2>计算结果</h2>
                </div>
                
                <div class="result-content">
                    <div class="week-number">
                        <div class="label">当前周数</div>
                        <div class="value" id="weekNumber">--</div>
                        <div class="suffix">周</div>
                    </div>
                    
                    <div class="week-details">
                        <div class="detail-item">
                            <div class="label"><i class="far fa-calendar-check"></i> 所选日期</div>
                            <div class="value" id="selectedDate">未选择</div>
                        </div>
                        
                        <div class="detail-item">
                            <div class="label"><i class="far fa-calendar"></i> 所在年份</div>
                            <div class="value" id="year">--</div>
                        </div>
                        
                        <div class="detail-item">
                            <div class="label"><i class="fas fa-calendar-week"></i> 当年总周数</div>
                            <div class="value" id="totalWeeks">--</div>
                        </div>
                        
                        <div class="progress-container">
                            <div class="progress-label">
                                <span>年度进度</span>
                                <span id="progressPercent">0%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="info-section">
                <h3><i class="fas fa-info-circle"></i> 关于周数计算</h3>
                <p>本工具根据国际标准 ISO 8601 计算周数，规则如下：</p>
                <ul>
                    <li>每周从星期一开始，星期日结束</li>
                    <li>一年的第一周是包含该年第一个星期四的那一周</li>
                    <li>一年的第一周总是包含1月4日的那一周</li>
                    <li>如果1月1日是星期五、星期六或星期日，则这一天属于上一年的最后一周</li>
                </ul>
                <p>此计算方法被广泛应用于欧洲和许多国际标准中。</p>
            </div>
        </div>
        
        <footer>
          
        </footer>
    </div>

    <script>
        // 获取DOM元素
        const dateInput = document.getElementById('dateInput');
        const calculateBtn = document.getElementById('calculateBtn');
        const todayBtn = document.getElementById('todayBtn');
        const weekNumber = document.getElementById('weekNumber');
        const selectedDate = document.getElementById('selectedDate');
        const year = document.getElementById('year');
        const totalWeeks = document.getElementById('totalWeeks');
        const progressPercent = document.getElementById('progressPercent');
        const progressFill = document.getElementById('progressFill');
        
        // 设置默认日期为今天
        function setTodayDate() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            const todayString = `${year}-${month}-${day}`;
            dateInput.value = todayString;
            calculateWeekNumber(today);
        }
        
        // 根据ISO 8601标准计算周数
        function getWeekNumber(date) {
            // 创建一个新的日期对象，设置为目标日期
            const targetDate = new Date(date.valueOf());
            
            // 将时间设置为周四，ISO周从周一开始，周四在周中，可以避免跨年问题
            targetDate.setDate(targetDate.getDate() + 4 - (targetDate.getDay() || 7));
            
            // 获取年份的第一天
            const yearStart = new Date(targetDate.getFullYear(), 0, 1);
            
            // 计算从年初到目标日期经过的完整天数
            const days = Math.floor((targetDate - yearStart) / (24 * 60 * 60 * 1000)) + 1;
            
            // 计算周数
            const weekNum = Math.floor(days / 7) + 1;
            
            return weekNum;
        }
        
        // 获取一年的总周数
        function getWeeksInYear(year) {
            const dec31 = new Date(year, 11, 31);
            const weekNum = getWeekNumber(dec31);
            
            // 如果12月31日在下一年的第一周，则当前年有52周
            if (weekNum === 1) {
                return 52;
            }
            
            return weekNum;
        }
        
        // 计算年度进度百分比
        function getYearProgress(date) {
            const yearStart = new Date(date.getFullYear(), 0, 1);
            const yearEnd = new Date(date.getFullYear() + 1, 0, 1);
            const totalDays = (yearEnd - yearStart) / (1000 * 60 * 60 * 24);
            const passedDays = (date - yearStart) / (1000 * 60 * 60 * 24);
            
            return Math.round((passedDays / totalDays) * 100);
        }
        
        // 格式化日期显示
        function formatDate(date) {
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            };
            return date.toLocaleDateString('zh-CN', options);
        }
        
        // 计算并显示周数
        function calculateWeekNumber(date) {
            const weekNum = getWeekNumber(date);
            const yearNum = date.getFullYear();
            const totalWeeksInYear = getWeeksInYear(yearNum);
            const progress = getYearProgress(date);
            
            // 更新UI显示
            weekNumber.textContent = weekNum;
            selectedDate.textContent = formatDate(date);
            year.textContent = yearNum;
            totalWeeks.textContent = totalWeeksInYear;
            progressPercent.textContent = `${progress}%`;
            progressFill.style.width = `${progress}%`;
            
            // 添加动画效果
            weekNumber.style.transform = 'scale(1.1)';
            setTimeout(() => {
                weekNumber.style.transform = 'scale(1)';
            }, 300);
        }
        
        // 事件监听
        calculateBtn.addEventListener('click', () => {
            const selectedDate = new Date(dateInput.value);
            if (isNaN(selectedDate.getTime())) {
                alert('请选择有效的日期');
                return;
            }
            calculateWeekNumber(selectedDate);
        });
        
        todayBtn.addEventListener('click', setTodayDate);
        
        dateInput.addEventListener('change', () => {
            const selectedDate = new Date(dateInput.value);
            if (!isNaN(selectedDate.getTime())) {
                calculateWeekNumber(selectedDate);
            }
        });
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            setTodayDate();
        });
        
        // 添加键盘快捷键支持
        document.addEventListener('keydown', (e) => {
            // Ctrl/Command + Enter 计算
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                calculateBtn.click();
            }
            
            // Ctrl/Command + T 跳转到今天
            if ((e.ctrlKey || e.metaKey) && e.key === 't') {
                e.preventDefault();
                todayBtn.click();
            }
        });
    </script>
</body>
