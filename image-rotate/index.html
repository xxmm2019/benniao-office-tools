    <style>
        :root {
            --accent: #f97316;
            --accent-soft: #f9731633;
            --bg: #0f172a;
            --text: #0f172a;
            --text-muted: #475569;
            --border: #e2e8f0;
        }

        * {

            padding: 0;

        }

        body {

        .container {

        .header {

        .header h1 {

        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);

        .card h2 {

            color: #334155;
            border-bottom: 1px solid #e2e8f0;
        }

        .features li:before {
            content: "";
            color: var(--accent);
            font-weight: bold;
            margin-right: 10px;
        }

        .btn {
            display: inline-block;
            padding: 12px 26px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 6px 10px 6px 0;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 20px rgba(15, 23, 42, 0.2);
        }

        .btn-secondary {
            background: #64748b;
        }

        .preview {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
        }

        .preview iframe {

            height: 420px;
