// 页面加载完成后执行
document.addEventListener('DOMContentLoaded', function() {
    console.log('页面加载完成');
    
    // 为功能卡片添加点击效果
    const featureCards = document.querySelectorAll('.feature-card');
    
    featureCards.forEach(card => {
        card.addEventListener('click', function() {
            this.style.backgroundColor = '#f0f0f0';
            
            setTimeout(() => {
                this.style.backgroundColor = '';
            }, 300);
        });
    });
    
    // 平滑滚动到功能区域
    const exploreBtn = document.querySelector('.btn');
    if (exploreBtn) {
        exploreBtn.addEventListener('click', function(e) {
            e.preventDefault();
            
            const targetId = this.getAttribute('href');
            const targetElement = document.querySelector(targetId);
            
            if (targetElement) {
                window.scrollTo({
                    top: targetElement.offsetTop - 80,
                    behavior: 'smooth'
                });
            }
        });
    }
    
    // 添加当前年份到页脚
    const currentYear = new Date().getFullYear();
    const footerParagraph = document.querySelector('footer p');
    
    if (footerParagraph) {
        footerParagraph.innerHTML = footerParagraph.innerHTML.replace('2023', currentYear);
    }
    
    // 动态问候语
    const heroHeading = document.querySelector('.hero h1');
    if (heroHeading) {
        const hour = new Date().getHours();
        let greeting;
        
        if (hour < 12) {
            greeting = '早上好';
        } else if (hour < 18) {
            greeting = '下午好';
        } else {
            greeting = '晚上好';
        }
        
        heroHeading.innerHTML = `${greeting}，欢迎使用View编辑器`;
    }
});

                    <label class="form-label">项目名称</label>

                        <label style="display: flex; align-items: center; gap: 10px;">

                        </label>
                        <label style="display: flex; align-items: center; gap: 10px;">

                        </label>

    <!-- CodeMirror库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/xml/xml.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/css/css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/htmlmixed/htmlmixed.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/closetag.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/edit/matchtags.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/addon/selection/active-line.min.js"></script>
    <!-- JSZip库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script>
        // 初始化变量
        let htmlEditor, cssEditor, jsEditor;
        let currentTab = 'html';
        let isResizing = false;
        
        // 初始化CodeMirror编辑器
        function initCodeEditors() {
            // HTML编辑器
            htmlEditor = CodeMirror.fromTextArea(document.getElementById('htmlCode'), {
                mode: 'htmlmixed',
                theme: 'dracula',
                lineNumbers: true,
                autoCloseTags: true,
                styleActiveLine: true,
                lineWrapping: true,
                tabSize: 2
            });
            
            // CSS编辑器
            cssEditor = CodeMirror.fromTextArea(document.getElementById('cssCode'), {
                mode: 'css',
                theme: 'dracula',
                lineNumbers: true,
                styleActiveLine: true,
                lineWrapping: true,
                tabSize: 2
            });
            
            // JavaScript编辑器
            jsEditor = CodeMirror.fromTextArea(document.getElementById('jsCode'), {
                mode: 'javascript',
                theme: 'dracula',
                lineNumbers: true,
                styleActiveLine: true,
                lineWrapping: true,
                tabSize: 2
            });
            
            // 默认显示HTML编辑器
            showEditor('html');
            
            // 监听编辑器变化
            htmlEditor.on('change', updatePreview);
            cssEditor.on('change', updatePreview);
            jsEditor.on('change', updatePreview);
            
            // 初始更新预览
            updatePreview();
        }
        
        // 显示指定编辑器
        function showEditor(tabName) {
            currentTab = tabName;
            
            // 更新选项卡
            document.querySelectorAll('.code-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.tab === tabName) {
                    tab.classList.add('active');
                }
            });
            
            // 显示对应编辑器
            const editors = [
                { name: 'html', editor: htmlEditor },
                { name: 'css', editor: cssEditor },
                { name: 'js', editor: jsEditor }
            ];
            
            editors.forEach(item => {
                const display = item.name === tabName ? 'block' : 'none';
                item.editor.display.wrapper.style.display = display;
            });
            
            // 更新状态
            updateStatus();
        }
        
        // 更新实时预览
        function updatePreview() {
            const htmlCode = htmlEditor.getValue();
            const cssCode = cssEditor.getValue();
            const jsCode = jsEditor.getValue();
            
            // 创建完整的HTML文档
            const fullHtml = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <meta name="viewport" content="width=device-width, initial-scale=1.0">
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                    <style>${cssCode}</style>
                </head>
                <body>
                    ${htmlCode}
                    <script>${jsCode}<\/script>
                </body>
                </html>
            `;
            
            // 更新预览iframe
            const previewFrame = document.getElementById('previewFrame');
            const iframeDoc = previewFrame.contentDocument || previewFrame.contentWindow.document;
            
            iframeDoc.open();
            iframeDoc.write(fullHtml);
            iframeDoc.close();
            
            // 更新状态信息
            updateStatus();
        }
        
        // 更新状态信息
        function updateStatus() {
            // 更新代码行数
            document.getElementById('htmlLines').textContent = htmlEditor.lineCount();
            document.getElementById('cssLines').textContent = cssEditor.lineCount();
            document.getElementById('jsLines').textContent = jsEditor.lineCount();
            
            // 更新编辑器状态
            const statusMap = {
                'html': '编辑HTML',
                'css': '编辑CSS',
                'js': '编辑JavaScript'
            };
            
            document.getElementById('editorStatus').textContent = statusMap[currentTab] || '就绪';
        }
        
        // 初始化组件库
        function initComponentLibrary() {
            // 组件分类筛选
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const category = this.dataset.category;
                    
                    // 更新活动按钮
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    // 筛选组件
                    document.querySelectorAll('.component-item').forEach(item => {
                        if (category === 'all' || item.dataset.category === category) {
                            item.style.display = 'flex';
                        } else {
                            item.style.display = 'none';
                        }
                    });
                });
            });
            
            // 组件点击插入功能
            document.querySelectorAll('.component-item').forEach(item => {
                item.addEventListener('click', function() {
                    const componentType = this.dataset.component;
                    insertComponent(componentType);
                });
            });
        }
        
        // 插入组件
        function insertComponent(type) {
            let htmlSnippet = '';
            let cssSnippet = '';
            
            switch(type) {
                case 'header':
                    htmlSnippet = `

                    cssSnippet = `

                    break;
                    
                default:
                    htmlSnippet = `

                    cssSnippet = `

            // 插入到HTML编辑器中
            const cursor = htmlEditor.getCursor();
            htmlEditor.replaceRange(htmlSnippet, cursor);
            
            // 插入到CSS编辑器中
            const cssCursor = cssEditor.getCursor();
            cssEditor.replaceRange(cssSnippet, cssCursor);
            
            // 更新预览
            updatePreview();
            
            // 显示成功提示
            showNotification(`已插入 ${type} 组件`);

        // 显示通知
        function showNotification(message, type = 'success') {
            // 创建通知元素
            const notification = document.createElement('div');
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: ${type === 'success' ? '#28a745' : '#dc3545'};
                color: white;
                padding: 15px 25px;
                border-radius: 8px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
                z-index: 1000;
                font-weight: 500;
                animation: slideIn 0.3s, fadeOut 0.3s 2.7s;
            `;
            
            document.body.appendChild(notification);
            
            // 3秒后移除
            setTimeout(() => {
                notification.remove();
            }, 3000);
        }
        
        // 初始化导出功能
        function initExportFunctionality() {
            const exportModal = document.getElementById('exportModal');
            const exportBtn = document.getElementById('exportCode');
            const closeModalBtn = document.getElementById('closeExportModal');
            const copyCodeBtn = document.getElementById('copyCode');
            const downloadCodeBtn = document.getElementById('downloadCode');
            const exportPreview = document.getElementById('exportPreview');
            
            // 打开导出模态框
            exportBtn.addEventListener('click', function() {
                updateExportPreview();
                exportModal.style.display = 'flex';
            });
            
            // 关闭导出模态框
            closeModalBtn.addEventListener('click', function() {
                exportModal.style.display = 'none';
            });
            
            // 点击模态框外部关闭
            exportModal.addEventListener('click', function(e) {
                if (e.target === exportModal) {
                    exportModal.style.display = 'none';
                }
            });
            
            // 复制代码
            copyCodeBtn.addEventListener('click', function() {
                exportPreview.select();
                document.execCommand('copy');
                showNotification('代码已复制到剪贴板');
            });
            
            // 下载代码
            downloadCodeBtn.addEventListener('click', function() {
                const projectName = document.getElementById('projectName').value || 'my-project';
                const includeHTML = document.getElementById('includeHTML').checked;
                const includeCSS = document.getElementById('includeCSS').checked;
                const includeJS = document.getElementById('includeJS').checked;
                
                // 创建ZIP文件
                const zip = new JSZip();
                
                if (includeHTML) {
                    zip.file(`${projectName}/index.html`, htmlEditor.getValue());
                }
                
                if (includeCSS) {
                    zip.file(`${projectName}/style.css`, cssEditor.getValue());
                }
                
                if (includeJS) {
                    zip.file(`${projectName}/script.js`, jsEditor.getValue());
                }
                
                // 生成ZIP并下载
                zip.generateAsync({type: "blob"})
                    .then(function(content) {
                        const link = document.createElement('a');
                        link.href = URL.createObjectURL(content);
                        link.download = `${projectName}.zip`;
                        link.click();
                        URL.revokeObjectURL(link.href);
                        
                        showNotification('代码已成功下载');
                        exportModal.style.display = 'none';
                    })
                    .catch(function(error) {
                        console.error('下载失败:', error);
                        showNotification('下载失败，请重试', 'error');
                    });
            });
            
            // 监听输入变化，更新预览
            document.getElementById('projectName').addEventListener('input', updateExportPreview);
            document.getElementById('includeHTML').addEventListener('change', updateExportPreview);
            document.getElementById('includeCSS').addEventListener('change', updateExportPreview);
            document.getElementById('includeJS').addEventListener('change', updateExportPreview);
        }
        
        // 更新导出预览
        function updateExportPreview() {
            const projectName = document.getElementById('projectName').value || 'my-project';
            const includeHTML = document.getElementById('includeHTML').checked;
            const includeCSS = document.getElementById('includeCSS').checked;
            const includeJS = document.getElementById('includeJS').checked;
            
            let previewText = `项目: ${projectName}\n包含文件:\n`;
            
            if (includeHTML) previewText += "- index.html\n";
            if (includeCSS) previewText += "- style.css\n";
            if (includeJS) previewText += "- script.js\n";
            
            previewText += "\n文件结构:\n";
            previewText += `${projectName}/\n`;
            
            if (includeHTML) previewText += `  ├── index.html\n`;
            if (includeCSS) previewText += `  ├── style.css\n`;
            if (includeJS) previewText += `  └── script.js\n`;
            
            document.getElementById('exportPreview').value = previewText;
        }
        
        // 初始化事件监听
        function initEventListeners() {
            // 选项卡切换
            document.querySelectorAll('.code-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    showEditor(this.dataset.tab);
                });
            });
            
            // 运行代码按钮
            document.getElementById('runCode').addEventListener('click', updatePreview);
            
            // 刷新预览按钮
            document.getElementById('refreshPreview').addEventListener('click', updatePreview);
            
            // 格式化代码按钮
            document.getElementById('formatCode').addEventListener('click', function() {
                if (currentTab === 'html') {
                    // 简单的HTML格式化
                    const html = htmlEditor.getValue();
                    // 简单的格式化：添加换行和缩进
                    const formatted = html
                        .replace(/>\s*</g, '>\n<')
                        .replace(/<\/\w+>/g, '\n$&')
                        .replace(/<(\w+)([^>]*)>/g, '<$1$2>');
                    htmlEditor.setValue(formatted);
                    showNotification('HTML代码已格式化');
                } else if (currentTab === 'css') {
                    // 简单的CSS格式化
                    const css = cssEditor.getValue();
                    // 简单的格式化：添加换行和缩进
                    const formatted = css
                        .replace(/\{/g, ' {\n  ')
                        .replace(/\}/g, '\n}\n')
                        .replace(/;/g, ';\n  ')
                        .replace(/\n\s*\n/g, '\n');
                    cssEditor.setValue(formatted);
                    showNotification('CSS代码已格式化');
                } else if (currentTab === 'js') {
                    // 简单的JS格式化
                    const js = jsEditor.getValue();
                    // 简单的格式化：添加换行和缩进
                    const formatted = js
                        .replace(/\{/g, ' {\n  ')
                        .replace(/\}/g, '\n}\n')
                        .replace(/;/g, ';\n  ')
                        .replace(/,/g, ',\n  ')
                        .replace(/\n\s*\n/g, '\n');
                    jsEditor.setValue(formatted);
                    showNotification('JavaScript代码已格式化');
                }
            });
            
            // 面板大小调整
            const resizeHandle = document.getElementById('resizeHandle');
            const editorPanel = document.querySelector('.editor-panel');
            const previewPanel = document.querySelector('.preview-panel');
            
            resizeHandle.addEventListener('mousedown', function(e) {
                isResizing = true;
                document.body.style.cursor = 'col-resize';
                e.preventDefault();
            });
            
            document.addEventListener('mousemove', function(e) {
                if (!isResizing) return;
                
                const containerWidth = document.querySelector('.editor-wrapper').offsetWidth;
                const newEditorWidth = (e.clientX / containerWidth) * 100;
                
                if (newEditorWidth > 20 && newEditorWidth < 80) {
                    editorPanel.style.flex = `0 0 ${newEditorWidth}%`;
                    previewPanel.style.flex = `0 0 ${100 - newEditorWidth}%`;
                }
            });
            
            document.addEventListener('mouseup', function() {
                isResizing = false;
                document.body.style.cursor = 'default';
            });
            
            // 更新时间
            function updateTime() {
                const now = new Date();
                const timeString = now.toLocaleTimeString('zh-CN', { hour12: false });
                document.getElementById('currentTime').textContent = timeString;
            }
            
            setInterval(updateTime, 1000);
            updateTime();
        }
        
        // 初始化应用
        function initApp() {
            initCodeEditors();
            initComponentLibrary();
            initExportFunctionality();
            initEventListeners();
            
            // 初始状态更新
            updateStatus();
            
            // 添加CSS动画
            const style = document.createElement('style');
            style.textContent = `
                @keyframes slideIn {
                    from { transform: translateX(100%); opacity: 0; }
                    to { transform: translateX(0); opacity: 1; }
                }
                
                @keyframes fadeOut {
                    from { opacity: 1; }
                    to { opacity: 0; }
                }
            `;
            document.head.appendChild(style);
            
            console.log('View编辑器已初始化');
        }
        
        // 当页面加载完成后初始化应用
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
