<!DOCTYPE html>
<html lang="zh-CN">
<head>
     
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript 格式化工具 - 笨鸟办公工具集箱</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"
     crossorigin="anonymous"></script>
    <link rel="canonical" href="https://www.benniaooffice.com/tools/js-formatter/app.html">
    <style>
        :root {
            --accent: #f59e0b;
            --accent-soft: #f59e0b33;
            --bg: #0f172a;
            --text: #0f172a;
            --text-muted: #475569;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f59e0b 0%, #0f172a 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.3rem;
            margin-bottom: 8px;
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 18px;
            padding: 26px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 16px;
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        label {
            font-size: 14px;
            color: var(--text-muted);
        }

        input[type="text"],
        input[type="number"],
        input[type="url"],
        input[type="file"],
        select,
        textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: white;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            background: var(--accent);
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.2);
        }

        .btn-secondary {
            background: #64748b;
        }

        .muted {
            color: var(--text-muted);
            font-size: 13px;
        }

        .output-box {
            background: #f8fafc;
            border: 1px dashed var(--border);
            padding: 12px;
            border-radius: 12px;
        }

        .preview {
            width: 100%;
            min-height: 180px;
            border-radius: 12px;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview img {
            max-width: 100%;
            max-height: 300px;
            display: block;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--text);
            font-size: 12px;
        }

        .result {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        .code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>JavaScript 格式化工具</h1>
            <p>美化 JavaScript 代码并提升可读性</p>
        </div>
        <div class="card">
            <div class="grid">
                <div>
                    <label>输入 JavaScript</label>
                    <textarea id="input" placeholder="粘贴需要格式化的 JS 代码"></textarea>
                </div>
                <div>
                    <label>输出结果</label>
                    <textarea id="output" readonly placeholder="格式化后的代码"></textarea>
                </div>
            </div>
            <div class="row" style="margin-top: 16px;">
                <div style="min-width: 180px;">
                    <label>缩进设置</label>
                    <select id="indent">
                        <option value="2">2 空格</option>
                        <option value="4" selected>4 空格</option>
                        <option value="tab">Tab</option>
                    </select>
                </div>
                <div class="actions">
                    <button class="btn" id="format">格式化</button>
                    <button class="btn btn-secondary" id="clear">清空</button>
                    <button class="btn btn-secondary" id="copy">复制结果</button>
                </div>
            </div>
            <p class="muted" style="margin-top: 10px;">提示：格式化不会执行代码，所有处理都在浏览器本地完成。</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-beautify@1.15.1/js/lib/beautify.js" onerror="this.onerror=null;this.src='/assets/vendor/js-beautify/beautify.js';"></script>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const indentSelect = document.getElementById('indent');
        const formatBtn = document.getElementById('format');
        const clearBtn = document.getElementById('clear');
        const copyBtn = document.getElementById('copy');

        function formatCode() {
            const value = input.value;
            if (!value.trim()) {
                output.value = '';
                return;
            }
            const indent = indentSelect.value;
            const useTabs = indent === 'tab';
            const options = {
                indent_size: useTabs ? 1 : Number(indent),
                indent_with_tabs: useTabs,
            };
            output.value = js_beautify(value, options);
        }

        formatBtn.addEventListener('click', formatCode);
        clearBtn.addEventListener('click', () => {
            input.value = '';
            output.value = '';
        });
        copyBtn.addEventListener('click', () => {
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
        });
    </script>
     
</body>
</html>
