        }

            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e1e5eb;
        }
        
        .date-display {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .timezone-title {
            font-size: 1.2rem;
            color: #7f8c8d;
            margin-bottom: 15px;
        }
        
        .main-clock {
            font-size: 3.5rem;
            font-weight: 700;
            color: #2980b9;
            margin: 15px 0;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
        }
        
        .time-comparison {
            font-size: 1rem;
            color: #5a6c7d;
            background-color: #f0f7ff;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 10px;
            border: 1px solid #cce5ff;
        }
        
        .continent-selector {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 25px 0;
        }
        
        .continent-btn {
            padding: 10px 20px;
            background-color: white;
            border: 2px solid #e1e5eb;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            color: #5a6c7d;
            transition: all 0.3s ease;
        }
        
        .continent-btn:hover {
            border-color: #3498db;
            color: #3498db;
            transform: translateY(-2px);
        }
        
        .continent-btn.active {
            background-color: #3498db;
            color: white;
            border-color: #3498db;
        }
        
        .countries-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .country-card {
            background-color: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
        }
        
        .country-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .country-card.selected {
            border: 2px solid #3498db;
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.2);
        }
        
        .country-card.selected::before {
            content: "当前查看";
            position: absolute;
            top: -10px;
            right: 10px;
            background-color: #3498db;
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .country-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .country-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .country-flag {
            font-size: 1.5rem;
        }
        
        .country-time {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2980b9;
            margin: 5px 0;
        }
        
        .country-date {
            color: #7f8c8d;
            margin-bottom: 8px;
        }
        
        .time-difference {
            font-size: 0.9rem;
            padding: 3px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 10px;
            align-self: flex-start;
        }
        
        .time-slow {
            background-color: #f8f9fa;
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }
        
        .time-fast {
            background-color: #f8f9fa;
            color: #27ae60;
            border: 1px solid #27ae60;
        }
        
        .time-same {
            background-color: #f8f9fa;
            color: #7f8c8d;
            border: 1px solid #7f8c8d;
        }
        
        .continent-section {
            margin-bottom: 40px;
        }
        
        .continent-title {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e1e5eb;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
        }
        
        .continent-icon {
            font-size: 1.2rem;
            margin-right: 10px;
        }
        
        .table-container {
            background-color: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            overflow-x: auto;
        }
        
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e1e5eb;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background-color: #f8f9fa;
            padding: 12px 15px;
            text-align: left;
            color: #2c3e50;
            border-bottom: 2px solid #e1e5eb;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #e1e5eb;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        tr:hover td {
            background-color: #f8f9fa;
        }
        
        tr.selected-country td {
            background-color: #e8f4fc;
            border-left: 4px solid #3498db;
        }
        
        .country-flag-cell {
            font-size: 1.2rem;
            padding-right: 8px;
        }

            text-align: center;
            margin-top: 30px;
            color: #7f8c8d;
            font-size: 0.9rem;
            padding-top: 20px;
            border-top: 1px solid #e1e5eb;

            max-width: 600px;
            margin: 20px auto 30px;

            width: 100%;
            padding: 12px 20px;
            border: 2px solid #e1e5eb;
            border-radius: 25px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #3498db;
        }

            padding: 30px;
            color: #7f8c8d;
            font-size: 1.1rem;

            margin-top: 10px;
            color: #5a6c7d;
            font-size: 0.9rem;

            background-color: #e8f4fc;
            color: #2980b9;
            border-radius: 15px;
            font-size: 0.9rem;
            font-weight: 600;
        }

            }

            }

                font-size: 0.9rem;
            }

                margin: 10px 0 0 0;
                text-align: center;
            }

            { name: "马达加斯加", capital: "塔那那利佛", offset: 3, continent: "others", flag: "🇲🇬" },
            { name: "毛里求斯", capital: "路易港", offset: 4, continent: "others", flag: "🇲🇺" },
            { name: "塞舌尔", capital: "维多利亚", offset: 4, continent: "others", flag: "🇸🇨" }
        ];
        
        // 中文星期几
        const weekdays = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
        
        // 时间部分名称（用于将24小时制转换为12小时制的时间段）
        const timeParts = {
            0: "凌晨", 1: "凌晨", 2: "凌晨", 3: "凌晨", 4: "凌晨", 5: "凌晨",
            6: "早上", 7: "早上", 8: "早上", 9: "早上", 10: "上午", 11: "上午",
            12: "中午", 13: "下午", 14: "下午", 15: "下午", 16: "下午", 17: "下午",
            18: "晚上", 19: "晚上", 20: "晚上", 21: "晚上", 22: "晚上", 23: "晚上"
        };
        
        // 当前选中的大洲
        let selectedContinent = 'all';
        let searchQuery = '';
        
        // 当前选中的国家
        let selectedCountry = {
            name: "中国",
            capital: "北京",
            offset: 8,
            continent: "asia",
            flag: "🇨🇳"
        };
        
        // 中国作为对比基准
        const chinaCountry = {
            name: "中国",
            capital: "北京",
            offset: 8,
            flag: "🇨🇳"
        };
        
        // 存储所有国家卡片和表格行的引用，用于更新选中状态
        let countryCardElements = [];
        let tableRowElements = [];
        
        // 格式化数字，确保两位数显示
        function formatNumber(num) {
            return num < 10 ? '0' + num : num;
        }
        
        // 根据时区偏移量计算城市时间
        function getCityTime(offset) {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            return new Date(utc + (offset * 3600000));
        }
        
        // 格式化日期显示
        function formatDate(date, includeTimePart = false) {
            const year = date.getFullYear();
            const month = formatNumber(date.getMonth() + 1);
            const day = formatNumber(date.getDate());
            const weekday = weekdays[date.getDay()];
            const hour = date.getHours();
            const timePart = timeParts[hour];
            
            if (includeTimePart) {
                return `${year}年${month}月${day}日 ${weekday} ${timePart}`;
            } else {
                return `${year}年${month}月${day}日 ${weekday}`;
            }
        }
        
        // 格式化时间显示
        function formatTime(date, includeSeconds = true) {
            const hour = formatNumber(date.getHours());
            const minute = formatNumber(date.getMinutes());
            const second = formatNumber(date.getSeconds());
            
            if (includeSeconds) {
                return `${hour}:${minute}:${second}`;
            } else {
                return `${hour}:${minute}`;
            }
        }
        
        // 获取时间段（早上、下午、晚上）
        function getTimePart(date) {
            const hour = date.getHours();
            return timeParts[hour];
        }
        
        // 计算与当前选中国家的时差
        function getTimeDifference(offset) {
            const selectedOffset = selectedCountry.offset;
            const difference = offset - selectedOffset;
            
            if (difference === 0) {
                return { text: "相同", class: "time-same" };
            } else if (difference > 0) {
                return { text: `快${difference}小时`, class: "time-fast" };
            } else {
                return { text: `慢${Math.abs(difference)}小时`, class: "time-slow" };
            }
        }
        
        // 计算与中国的时差
        function getTimeDifferenceWithChina(offset) {
            const chinaOffset = chinaCountry.offset;
            const difference = offset - chinaOffset;
            
            if (difference === 0) {
                return { text: "与中国时间相同", class: "time-same" };
            } else if (difference > 0) {
                return { text: `比中国快${difference}小时`, class: "time-fast" };
            } else {
                return { text: `比中国慢${Math.abs(difference)}小时`, class: "time-slow" };
            }
        }
        
        // 更新主显示区域为指定国家的时间
        function updateMainDisplay(country) {
            selectedCountry = country;
            
            // 更新当前国家信息（包含国旗）
            document.getElementById('currentCountryInfo').innerHTML = `${country.flag} ${country.name} - ${country.capital}`;
            
            // 更新时区标题
            const utcOffset = country.offset >= 0 ? `UTC+${country.offset}` : `UTC${country.offset}`;
            document.querySelector('.timezone-title').innerHTML = 
                `${country.capital}时区 (${utcOffset}) <span class="current-timezone-info" id="currentCountryInfo">${country.flag} ${country.name} - ${country.capital}</span>`;
            
            // 更新主时钟和日期
            const countryTime = getCityTime(country.offset);
            document.getElementById('mainClock').textContent = formatTime(countryTime);
            document.getElementById('currentDate').textContent = formatDate(countryTime, true);
            
            // 更新与中国的时差对比
            const timeDiffWithChina = getTimeDifferenceWithChina(country.offset);
            const comparisonElement = document.getElementById('timeComparison');
            comparisonElement.textContent = timeDiffWithChina.text;
            comparisonElement.className = `time-comparison ${timeDiffWithChina.class}`;
            
            // 更新所有卡片的时差信息和选中状态
            updateAllTimeDifferences();
        }
        
        // 过滤国家数据
        function filterCountries() {
            let filtered = countries;
            
            // 按大洲筛选
            if (selectedContinent !== 'all') {
                filtered = filtered.filter(country => country.continent === selectedContinent);
            }
            
            // 按搜索词筛选
            if (searchQuery.trim() !== '') {
                const query = searchQuery.toLowerCase().trim();
                filtered = filtered.filter(country => 
                    country.name.toLowerCase().includes(query) || 
                    country.capital.toLowerCase().includes(query)
                );
            }
            
            return filtered;
        }
        
        // 生成国家卡片
        function generateCountryCards() {
            const container = document.getElementById('continentsContainer');
            container.innerHTML = '';
            
            const filteredCountries = filterCountries();
            
            if (filteredCountries.length === 0) {
                container.innerHTML = '<div class="no-results">未找到匹配的国家或地区</div>';
                return;
            }
            
            // 按大洲分组
            const countriesByContinent = {};
            filteredCountries.forEach(country => {
                if (!countriesByContinent[country.continent]) {
                    countriesByContinent[country.continent] = [];
                }
                countriesByContinent[country.continent].push(country);
            });
            
            // 清空卡片引用数组
            countryCardElements = [];
            
            // 生成各大洲的卡片
            for (const continent in countriesByContinent) {
                const continentCountries = countriesByContinent[continent];
                const continentSection = document.createElement('div');
                continentSection.className = 'continent-section';
                
                const continentTitle = document.createElement('div');
                continentTitle.className = 'continent-title';
                continentTitle.innerHTML = `
                    <span class="continent-icon">${continentIcons[continent]}</span>
                    ${continentNames[continent]}
                    <span style="font-size: 0.9rem; color: #7f8c8d; margin-left: 10px;">
                        ${continentCountries.length}个国家/地区
                    </span>
                `;
                
                continentSection.appendChild(continentTitle);
                
                const countriesContainer = document.createElement('div');
                countriesContainer.className = 'countries-container';
                
                continentCountries.forEach(country => {
                    const countryTime = getCityTime(country.offset);
                    const timePart = getTimePart(countryTime);
                    const timeDiff = getTimeDifference(country.offset);
                    
                    const countryCard = document.createElement('div');
                    countryCard.className = `country-card ${country.name === selectedCountry.name ? 'selected' : ''}`;
                    countryCard.dataset.country = country.name;
                    
                    countryCard.innerHTML = `
                        <div class="country-header">
                            <div class="country-name">
                                <span class="country-flag">${country.flag}</span>
                                ${country.name}
                            </div>
                        </div>
                        <div class="country-date">首都/主要城市: ${country.capital}</div>
                        <div class="country-time">${formatTime(countryTime, false)}</div>
                        <div class="country-date">${formatDate(countryTime)} ${timePart}</div>
                        <div class="time-difference ${timeDiff.class}">${timeDiff.text}</div>
                    `;
                    
                    // 添加点击事件
                    countryCard.addEventListener('click', () => {
                        updateMainDisplay(country);
                    });
                    
                    countriesContainer.appendChild(countryCard);
                    countryCardElements.push({
                        element: countryCard,
                        country: country
                    });
                });
                
                continentSection.appendChild(countriesContainer);
                container.appendChild(continentSection);
            }
        }
        
        // 生成完整国家表格
        function generateCountryTable() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            
            // 按大洲名称排序
            const sortedCountries = [...countries].sort((a, b) => {
                const continentOrder = ['asia', 'europe', 'north-america', 'south-america', 'africa', 'oceania', 'others'];
                return continentOrder.indexOf(a.continent) - continentOrder.indexOf(b.continent);
            });
            
            // 清空表格行引用数组
            tableRowElements = [];
            
            sortedCountries.forEach(country => {
                const countryTime = getCityTime(country.offset);
                const timePart = getTimePart(countryTime);
                const timeDiff = getTimeDifference(country.offset);
                
                const row = document.createElement('tr');
                row.className = country.name === selectedCountry.name ? 'selected-country' : '';
                row.dataset.country = country.name;
                
                row.innerHTML = `
                    <td><span class="country-flag-cell">${country.flag}</span> ${country.name}</td>
                    <td>${continentNames[country.continent]}</td>
                    <td>${country.capital}</td>
                    <td>${formatDate(countryTime)} ${formatTime(countryTime)} ${timePart}</td>
                    <td><span class="time-difference ${timeDiff.class}">${timeDiff.text}</span></td>
                `;
                
                // 添加点击事件
                row.addEventListener('click', () => {
                    updateMainDisplay(country);
                });
                
                tableBody.appendChild(row);
                tableRowElements.push({
                    element: row,
                    country: country
                });
            });
        }
        
        // 更新所有时间差异信息
        function updateAllTimeDifferences() {
            // 更新卡片的时间差异
            countryCardElements.forEach(item => {
                const timeDiff = getTimeDifference(item.country.offset);
                const timeDiffElement = item.element.querySelector('.time-difference');
                timeDiffElement.className = `time-difference ${timeDiff.class}`;
                timeDiffElement.textContent = timeDiff.text;
                
                // 更新选中状态
                if (item.country.name === selectedCountry.name) {
                    item.element.classList.add('selected');
                } else {
                    item.element.classList.remove('selected');
                }
            });
            
            // 更新表格的时间差异和选中状态
            tableRowElements.forEach(item => {
                const timeDiff = getTimeDifference(item.country.offset);
                const timeDiffElement = item.element.querySelector('.time-difference');
                timeDiffElement.className = `time-difference ${timeDiff.class}`;
                timeDiffElement.textContent = timeDiff.text;
                
                // 更新选中状态
                if (item.country.name === selectedCountry.name) {
                    item.element.classList.add('selected-country');
                } else {
                    item.element.classList.remove('selected-country');
                }
            });
            
            // 更新表格标题中的时差说明
            document.querySelector('#timeTable thead th:nth-child(5)').textContent = `时差 (与${selectedCountry.capital})`;
            
            // 更新与中国的时差对比
            const timeDiffWithChina = getTimeDifferenceWithChina(selectedCountry.offset);
            const comparisonElement = document.getElementById('timeComparison');
            comparisonElement.textContent = timeDiffWithChina.text;
            comparisonElement.className = `time-comparison ${timeDiffWithChina.class}`;
        }
        
        // 更新主时钟和日期显示
        function updateClock() {
            const selectedCountryTime = getCityTime(selectedCountry.offset);
            
            // 更新主时钟
            document.getElementById('mainClock').textContent = formatTime(selectedCountryTime);
            
            // 更新日期显示
            document.getElementById('currentDate').textContent = formatDate(selectedCountryTime, true);
            
            // 更新所有国家的时间信息
            updateAllCountryTimes();
            
            // 更新页脚时间
            const now = new Date();
            document.getElementById('updateTime').textContent = 
                `${formatDate(now)} ${formatTime(now)}`;
        }
        
        // 更新所有国家的时间信息
        function updateAllCountryTimes() {
            // 更新卡片时间
            countryCardElements.forEach(item => {
                const countryTime = getCityTime(item.country.offset);
                const timePart = getTimePart(countryTime);
                
                const timeElement = item.element.querySelector('.country-time');
                const dateElement = item.element.querySelector('.country-date:nth-child(4)');
                
                timeElement.textContent = formatTime(countryTime, false);
                dateElement.textContent = `${formatDate(countryTime)} ${timePart}`;
            });
            
            // 更新表格时间
            tableRowElements.forEach(item => {
                const countryTime = getCityTime(item.country.offset);
                const timePart = getTimePart(countryTime);
                
                const timeCell = item.element.querySelector('td:nth-child(4)');
                timeCell.textContent = `${formatDate(countryTime)} ${formatTime(countryTime)} ${timePart}`;
            });
        }
        
        // 初始化大洲选择器
        function initContinentSelector() {
            const continentBtns = document.querySelectorAll('.continent-btn');
            continentBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // 移除所有按钮的active类
                    continentBtns.forEach(b => b.classList.remove('active'));
                    // 给当前点击的按钮添加active类
                    this.classList.add('active');
                    // 更新选中的大洲
                    selectedContinent = this.getAttribute('data-continent');
                    // 重新生成卡片
                    generateCountryCards();
                });
            });
        }
        
        // 初始化搜索功能
        function initSearch() {
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function() {
                searchQuery = this.value;
                generateCountryCards();
            });
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化交互功能
            initContinentSelector();
            initSearch();
            
            // 初始生成卡片和表格
            generateCountryCards();
            generateCountryTable();
            
            // 初始更新
            updateClock();
            
            // 设置与中国的时差对比初始值
            const timeDiffWithChina = getTimeDifferenceWithChina(selectedCountry.offset);
            const comparisonElement = document.getElementById('timeComparison');
            comparisonElement.textContent = timeDiffWithChina.text;
            comparisonElement.className = `time-comparison ${timeDiffWithChina.class}`;
            
            // 每秒更新一次时钟
            setInterval(updateClock, 1000);
        });
    </script>
</body>
</html>
