    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5372697601462596"

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {

            box-sizing: border-box;

        body {

        header {

        .result-section:hover {

        .section-title {
            color: #2c3e50;

        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #5d6d7e;
            font-size: 0.95rem;
        }
        
        .seo-recommendation {
            background: #e8f4fc;
            padding: 20px;
            border-radius: 10px;
            margin-top: 30px;
            border-left: 5px solid #3498db;
        }
        
        .seo-title {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        
        .seo-title i {
            margin-right: 10px;
            color: #2ecc71;
        }
        
        .progress-container {
            margin: 25px 0;
        }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4a5568;
        }
        
        .progress-bar {
            height: 12px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, #2ecc71, #3498db);
            border-radius: 6px;
            width: 0;
            transition: width 1s ease-out;
        }
        
        .keyword-highlight {
            background-color: #fff3cd;
            padding: 3px 5px;
            border-radius: 3px;
            font-weight: 600;
        }
        
        .footer {
            text-align: center;
            padding: 20px;
            color: #5d6d7e;
            font-size: 0.9rem;
            margin-top: 30px;
            border-top: 1px solid #e2e8f0;
        }
        
        .tooltip {
            position: relative;
            display: inline-block;
            cursor: help;
        }
        
        .tooltip .tooltiptext {
            visibility: hidden;
            width: 250px;
            background-color: #2c3e50;
            color: white;
            text-align: center;
            border-radius: 6px;
            padding: 10px;
            position: absolute;
            z-index: 1;
            bottom: 125%;
            left: 50%;
            margin-left: -125px;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.85rem;
            font-weight: normal;
        }
        
        .tooltip:hover .tooltiptext {
            visibility: visible;
            opacity: 1;
        }
        
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
            
            h1 {
                font-size: 2.2rem;
            }
            
            .density-value {
                font-size: 2.8rem;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-search"></i> 关键词密度检测工具</h1>
            <p class="subtitle">为您提供在线关键词密度检测查询，检测关键词的密度百分比，可以快速检测页面关键词出现的数量和密度，更适合蜘蛛的搜索和SEO优化。</p>
        </header>
        
        <div class="main-content">
            <section class="input-section">
                <h2 class="section-title"><i class="fas fa-edit"></i> 输入文本和关键词</h2>
                
                <div class="input-group">
                    <label for="keyword">关键词 <span class="tooltip">(?)<span class="tooltiptext">输入您要检测的关键词，支持中文、英文及短语</span></span></label>
                    <input type="text" id="keyword" placeholder="例如：SEO优化 或 search engine optimization">
                </div>
                
                <div class="input-group">
                    <label for="content">要分析的文本内容 <span class="tooltip">(?)<span class="tooltiptext">粘贴或输入您要分析的文章、网页内容或任何文本</span></span></label>
                    <textarea id="content" placeholder="请在这里粘贴或输入您要分析的文本内容...">搜索引擎优化（SEO）是一种通过了解搜索引擎的运作规则来调整网站，以及提高目的网站在有关搜索引擎内排名的方式。搜索引擎优化对于任何网站来说都是至关重要的，因为搜索引擎通常是网站流量的主要来源。SEO优化的目标是提高网站在搜索引擎中的自然排名，从而获得更多的曝光和流量。一个成功的SEO策略需要综合考虑关键词密度、内容质量、链接建设等多个因素。</textarea>
                </div>
                
                <button id="analyzeBtn" class="btn">
                    <i class="fas fa-chart-bar"></i> 分析关键词密度
                </button>
                
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                    <p>正在分析中，请稍候...</p>
                </div>
            </section>
            
            <section class="result-section">
                <h2 class="section-title"><i class="fas fa-chart-pie"></i> 分析结果</h2>
                
                <div class="density-display">
                    <p class="density-label">关键词密度</p>
                    <div class="density-value" id="densityValue">0.00%</div>
                    <p id="densityStatus">等待分析...</p>
                </div>
                
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-value" id="keywordCount">0</div>
                        <div class="stat-label">关键词出现次数</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="wordCount">0</div>
                        <div class="stat-label">总词数</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="characterCount">0</div>
                        <div class="stat-label">总字符数</div>
                    </div>
                </div>
                
                <div class="progress-container">
                    <div class="progress-label">
                        <span>关键词密度范围</span>
                        <span id="currentDensityText">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="densityBar"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 5px; font-size: 0.85rem; color: #718096;">
                        <span>过低 (&lt;1%)</span>
                        <span>理想 (1-3%)</span>
                        <span>过高 (&gt;3%)</span>
                    </div>
                </div>
                
                <div class="seo-recommendation">
                    <h3 class="seo-title"><i class="fas fa-lightbulb"></i> SEO建议</h3>
                    <p id="seoAdvice">请先输入关键词和文本内容，然后点击"分析关键词密度"按钮获取优化建议。</p>
                    <p style="margin-top: 10px; font-size: 0.9rem;"><strong>蜘蛛友好提示：</strong> <span id="spiderTip">合理的关键词密度有助于搜索引擎蜘蛛更好地理解页面内容，但内容自然性和质量同样重要。</span></p>
                </div>
            </section>
        </div>
        
        <div class="footer">
           
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const analyzeBtn = document.getElementById('analyzeBtn');
            const keywordInput = document.getElementById('keyword');
            const contentInput = document.getElementById('content');
            const densityValue = document.getElementById('densityValue');
            const densityStatus = document.getElementById('densityStatus');
            const keywordCount = document.getElementById('keywordCount');
            const wordCount = document.getElementById('wordCount');
            const characterCount = document.getElementById('characterCount');
            const densityBar = document.getElementById('densityBar');
            const currentDensityText = document.getElementById('currentDensityText');
            const seoAdvice = document.getElementById('seoAdvice');
            const spiderTip = document.getElementById('spiderTip');
            const loading = document.getElementById('loading');
            
            // 设置示例关键词
            keywordInput.value = "SEO优化";
            
            // 分析按钮点击事件
            analyzeBtn.addEventListener('click', function() {
                const keyword = keywordInput.value.trim();
                const content = contentInput.value.trim();
                
                if (!keyword) {
                    alert("请输入关键词！");
                    keywordInput.focus();
                    return;
                }
                
                if (!content) {
                    alert("请输入要分析的文本内容！");
                    contentInput.focus();
                    return;
                }
                
                // 显示加载动画
                loading.style.display = "block";
                analyzeBtn.disabled = true;
                
                // 模拟分析过程（实际中这里会立即执行，但为了用户体验添加短暂延迟）
                setTimeout(() => {
                    analyzeKeywordDensity(keyword, content);
                    loading.style.display = "none";
                    analyzeBtn.disabled = false;
                }, 800);
            });
            
            // 关键词密度分析函数
            function analyzeKeywordDensity(keyword, content) {
                // 计算总字符数
                const totalChars = content.length;
                characterCount.textContent = totalChars;
                
                // 计算总词数（简单的中英文分词）
                const words = content.split(/\s+/).filter(word => word.length > 0);
                const totalWords = words.length;
                wordCount.textContent = totalWords;
                
                // 计算关键词出现次数（不区分大小写）
                const keywordLower = keyword.toLowerCase();
                const contentLower = content.toLowerCase();
                
                // 简单计数（可能不准确，但适用于演示）
                let count = 0;
                let searchIndex = 0;
                
                while (searchIndex < contentLower.length) {
                    const index = contentLower.indexOf(keywordLower, searchIndex);
                    if (index === -1) break;
                    
                    count++;
                    searchIndex = index + keywordLower.length;
                }
                
                // 如果简单计数为0，尝试更智能的匹配（处理中英文空格和标点）
                if (count === 0 && keyword.length > 1) {
                    // 创建正则表达式，匹配关键词作为独立词出现
                    const regex = new RegExp(`\\b${keywordLower.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'gi');
                    const matches = content.match(regex);
                    count = matches ? matches.length : 0;
                }
                
                keywordCount.textContent = count;
                
                // 计算密度百分比
                const density = totalWords > 0 ? (count / totalWords) * 100 : 0;
                const densityRounded = density.toFixed(2);
                densityValue.textContent = `${densityRounded}%`;
                
                // 更新进度条
                const barWidth = Math.min(density * 10, 100); // 密度超过10%时进度条满
                densityBar.style.width = `${barWidth}%`;
                currentDensityText.textContent = `${densityRounded}%`;
                
                // 设置密度状态和建议
                let status = "";
                let advice = "";
                let tip = "";
                
                if (density === 0) {
                    status = "未检测到关键词";
                    advice = `在文本中未找到关键词"${keyword}"。建议在标题、首段、段落开头和结尾适当添加关键词，但确保内容自然流畅。`;
                    tip = "蜘蛛无法识别您的页面与关键词的相关性，可能导致排名困难。";
                } else if (density < 1) {
                    status = "关键词密度较低";
                    advice = `关键词密度${densityRounded}%偏低。建议适当增加关键词"${keyword}"的出现频率，但不要堆砌。可以尝试在标题、小标题和结论部分自然融入。`;
                    tip = "蜘蛛可能认为您的页面与关键词相关性不足，但低密度优于关键词堆砌。";
                } else if (density <= 3) {
                    status = "关键词密度理想";
                    advice = `恭喜！关键词密度${densityRounded}%处于理想范围(1%-3%)。继续保持内容自然性和高质量，无需刻意调整关键词密度。`;
                    tip = "蜘蛛可以清晰识别页面主题，同时内容自然流畅，有利于排名。";
                } else if (density <= 5) {
                    status = "关键词密度偏高";
                    advice = `关键词密度${densityRounded}%略高。建议检查是否有不必要的关键词重复，确保关键词出现自然，不影响内容可读性。`;
                    tip = "蜘蛛可能认为有关键词堆砌嫌疑，建议适当减少关键词密度至3%以下。";
                } else {
                    status = "关键词密度过高";
                    advice = `警告：关键词密度${densityRounded}%过高，有关键词堆砌风险。请立即减少关键词重复，重新组织内容，使关键词出现更自然。`;
                    tip = "蜘蛛可能判定为关键词堆砌，这可能导致搜索引擎惩罚，严重影响排名。";
                }
                
                densityStatus.textContent = status;
                seoAdvice.textContent = advice;
                spiderTip.textContent = tip;
                
                // 根据密度值设置颜色
                if (density === 0) {
                    densityValue.style.color = "#95a5a6";
                } else if (density < 1) {
                    densityValue.style.color = "#e74c3c";
                } else if (density <= 3) {
                    densityValue.style.color = "#2ecc71";
                } else if (density <= 5) {
                    densityValue.style.color = "#f39c12";
                } else {
                    densityValue.style.color = "#e74c3c";
                }
            }
            
            // 页面加载时自动分析示例内容
            setTimeout(() => {
                analyzeBtn.click();
            }, 500);
        });
    </script>
</body>
</html>
