            { port: 202, protocol: "UDP", service: "AppleTalk Name Binding", description: "AppleTalk名称绑定协议", security: "low", category: "ddp", linux: true, windows: false, unix: true },
            { port: 203, protocol: "UDP", service: "AppleTalk Echo", description: "AppleTalk回显协议", security: "low", category: "ddp", linux: true, windows: false, unix: true },
            { port: 204, protocol: "UDP", service: "AppleTalk Zone Info", description: "AppleTalk区域信息协议", security: "low", category: "ddp", linux: true, windows: false, unix: true },
            
            // Kerberos (工程 Athena/MIT) 端口
            { port: 88, protocol: "TCP", service: "Kerberos", description: "Kerberos认证系统", security: "high", category: "kerberos", linux: true, windows: true, unix: true },
            { port: 88, protocol: "UDP", service: "Kerberos", description: "Kerberos认证系统", security: "high", category: "kerberos", linux: true, windows: true, unix: true },
            { port: 464, protocol: "TCP", service: "Kerberos kpasswd", description: "Kerberos密码更改服务", security: "high", category: "kerberos", linux: true, windows: true, unix: true },
            { port: 464, protocol: "UDP", service: "Kerberos kpasswd", description: "Kerberos密码更改服务", security: "high", category: "kerberos", linux: true, windows: true, unix: true },
            { port: 749, protocol: "TCP", service: "Kerberos Admin", description: "Kerberos管理服务", security: "high", category: "kerberos", linux: true, windows: true, unix: true },
            { port: 750, protocol: "TCP", service: "Kerberos-IV", description: "Kerberos版本4", security: "medium", category: "kerberos", linux: true, windows: true, unix: true },
            { port: 751, protocol: "Both", service: "Kerberos Master", description: "Kerberos主控服务", security: "high", category: "kerberos", linux: true, windows: true, unix: true },
            { port: 754, protocol: "TCP", service: "Kerberos pwserver", description: "Kerberos密码服务器", security: "high", category: "kerberos", linux: true, windows: true, unix: true },
            { port: 760, protocol: "TCP", service: "Kerberos krbupdate", description: "Kerberos注册服务", security: "high", category: "kerberos", linux: true, windows: true, unix: true },
            
            // 未注册端口 (动态/私有端口)
            { port: 49152, protocol: "TCP", service: "Dynamic/Private", description: "动态/私有端口范围的起始", security: "medium", category: "unregistered", linux: true, windows: true, unix: true },
            { port: 50000, protocol: "TCP", service: "Dynamic/Private", description: "常见动态端口分配", security: "medium", category: "unregistered", linux: true, windows: true, unix: true },
            { port: 53589, protocol: "UDP", service: "Dynamic/Private", description: "临时客户端端口示例", security: "medium", category: "unregistered", linux: true, windows: true, unix: true },
            { port: 55000, protocol: "TCP", service: "VNC Alternate", description: "VNC远程桌面的备用端口", security: "low", category: "unregistered", linux: true, windows: true, unix: true },
            { port: 60000, protocol: "UDP", service: "Dynamic/Private", description: "高端临时端口", security: "medium", category: "unregistered", linux: true, windows: true, unix: true },
            { port: 65535, protocol: "TCP", service: "Dynamic/Private", description: "动态/私有端口范围的结束", security: "medium", category: "unregistered", linux: true, windows: true, unix: true },
        ];

        // 分类信息
        const categories = {
            common: { 
                name: "常用服务端口", 
                icon: "fas fa-star",
                description: "最常用的网络服务端口"
            },
            web: { 
                name: "Web服务端口", 
                icon: "fas fa-globe",
                description: "HTTP/HTTPS及相关Web服务"
            },
            database: { 
                name: "数据库端口", 
                icon: "fas fa-database",
                description: "各类数据库管理系统端口"
            },
            remote: { 
                name: "远程访问端口", 
                icon: "fas fa-desktop",
                description: "远程登录和控制协议"
            },
            file: { 
                name: "文件共享端口", 
                icon: "fas fa-folder-open",
                description: "文件共享和传输协议"
            },
            mail: { 
                name: "邮件服务端口", 
                icon: "fas fa-envelope",
                description: "电子邮件相关协议"
            },
            unix: { 
                name: "UNIX特有端口", 
                icon: "fab fa-ubuntu",
                description: "UNIX/Linux系统特有的服务和协议"
            },
            registered: { 
                name: "注册端口", 
                icon: "fas fa-registered",
                description: "由IANA正式注册的端口 (1024-49151)"
            },
            ddp: { 
                name: "DDP端口", 
                icon: "fas fa-broadcast-tower",
                description: "数据报传递协议 (AppleTalk相关)"
            },
            kerberos: { 
                name: "Kerberos端口", 
                icon: "fas fa-user-shield",
                description: "Kerberos网络认证协议相关端口"
            },
            unregistered: { 
                name: "未注册端口", 
                icon: "fas fa-unlink",
                description: "动态/私有端口 (49152-65535)"
            }
        };

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            renderPorts(portsData);
            setupEventListeners();
        });

        // 渲染端口表格
        function renderPorts(ports) {
            const container = document.getElementById('portsContainer');
            container.innerHTML = '';
            
            // 按分类分组
            const groupedPorts = {};
            ports.forEach(port => {
                if (!groupedPorts[port.category]) {
                    groupedPorts[port.category] = [];
                }
                groupedPorts[port.category].push(port);
            });
            
            // 为每个分类创建表格
            Object.keys(categories).forEach(categoryId => {
                if (!groupedPorts[categoryId] || groupedPorts[categoryId].length === 0) return;
                
                const category = categories[categoryId];
                const portsInCategory = groupedPorts[categoryId];
                
                const categoryElement = document.createElement('div');
                categoryElement.className = 'port-category';
                categoryElement.innerHTML = `
                    <div class="category-header ${categoryId}">
                        <div>
                            <div class="category-title">
                                <div class="category-icon">
                                    <i class="${category.icon}"></i>
                                </div>
                                ${category.name}
                            </div>
                            <div class="category-description">${category.description}</div>
                        </div>
                        <div class="port-count">${portsInCategory.length} 个端口</div>
                    </div>
                    <table class="ports-table active">
                        <thead>
                            <tr>
                                <th>端口</th>
                                <th>协议</th>
                                <th>服务名称</th>
                                <th>操作系统</th>
                                <th>描述</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${portsInCategory.map(port => `
                                <tr class="security-${port.security}">
                                    <td class="port-number">${port.port}</td>
                                    <td class="protocol ${port.protocol.toLowerCase()}">${port.protocol}</td>
                                    <td class="service-name">${port.service}</td>
                                    <td class="os-icons">
                                        ${port.linux ? '<div class="os-icon linux" title="Linux"><i class="fab fa-linux"></i></div>' : ''}
                                        ${port.windows ? '<div class="os-icon windows" title="Windows"><i class="fab fa-windows"></i></div>' : ''}
                                        ${port.unix && !port.linux ? '<div class="os-icon unix-os" title="UNIX"><i class="fas fa-terminal"></i></div>' : ''}
                                    </td>
                                    <td class="description">${port.description}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                
                // 添加点击展开/收起功能
                const header = categoryElement.querySelector('.category-header');
                const table = categoryElement.querySelector('.ports-table');
                header.addEventListener('click', () => {
                    table.classList.toggle('active');
                });
                
                container.appendChild(categoryElement);
            });
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 搜索功能
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', function() {
                const searchTerm = this.value.toLowerCase();
                filterPorts();
            });
            
            // 筛选按钮
            const filterButtons = document.querySelectorAll('.filter-btn');
            filterButtons.forEach(button => {
                button.addEventListener('click', function() {
                    // 移除所有按钮的active类
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    // 给当前点击的按钮添加active类
                    this.classList.add('active');
                    filterPorts();
                });
            });
        }

        // 筛选端口
        function filterPorts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const activeFilter = document.querySelector('.filter-btn.active').dataset.filter;
            
            const filteredPorts = portsData.filter(port => {
                // 根据搜索词筛选
                const matchesSearch = searchTerm === '' || 
                    port.port.toString().includes(searchTerm) ||
                    port.service.toLowerCase().includes(searchTerm) ||
                    port.description.toLowerCase().includes(searchTerm);
                
                // 根据分类筛选
                let matchesFilter = true;
                if (activeFilter !== 'all') {
                    matchesFilter = port.category === activeFilter;
                }
                
                return matchesSearch && matchesFilter;
            });
            
            renderPorts(filteredPorts);
        }
    </script>
</body>
</html>
