    <script>
    // 时区地图数据（简化的时区-国家对应关系）
const timezoneMapData = [
    // UTC-8 到 UTC-5（美洲地区）
    { id: 'usa', name: '美国（西海岸）', timezone: 'America/Los_Angeles', offset: '-8', colorClass: 'timezone--8' },
    { id: 'mexico', name: '墨西哥', timezone: 'America/Mexico_City', offset: '-6', colorClass: 'timezone--6' },
    { id: 'canada_east', name: '加拿大（东部）', timezone: 'America/Toronto', offset: '-5', colorClass: 'timezone--5' },
    { id: 'usa_east', name: '美国（东海岸）', timezone: 'America/New_York', offset: '-5', colorClass: 'timezone--5' },
    
    // UTC±0（欧洲非洲）
    { id: 'uk', name: '英国', timezone: 'Europe/London', offset: '0', colorClass: 'timezone-0' },
    { id: 'portugal', name: '葡萄牙', timezone: 'Europe/Lisbon', offset: '0', colorClass: 'timezone-0' },
    { id: 'france', name: '法国', timezone: 'Europe/Paris', offset: '+1', colorClass: 'timezone-1' },
    { id: 'germany', name: '德国', timezone: 'Europe/Berlin', offset: '+1', colorClass: 'timezone-1' },
    { id: 'italy', name: '意大利', timezone: 'Europe/Rome', offset: '+1', colorClass: 'timezone-1' },
    { id: 'spain', name: '西班牙', timezone: 'Europe/Madrid', offset: '+1', colorClass: 'timezone-1' },
    
    // UTC+2 到 UTC+4（东欧、中东）
    { id: 'greece', name: '希腊', timezone: 'Europe/Athens', offset: '+2', colorClass: 'timezone-2' },
    { id: 'turkey', name: '土耳其', timezone: 'Europe/Istanbul', offset: '+3', colorClass: 'timezone-3' },
    { id: 'russia_moscow', name: '俄罗斯（莫斯科）', timezone: 'Europe/Moscow', offset: '+3', colorClass: 'timezone-3' },
    { id: 'uae', name: '阿联酋', timezone: 'Asia/Dubai', offset: '+4', colorClass: 'timezone-4' },
    
    // UTC+5 到 UTC+6（中亚、南亚）
    { id: 'pakistan', name: '巴基斯坦', timezone: 'Asia/Karachi', offset: '+5', colorClass: 'timezone-5' },
    { id: 'india', name: '印度', timezone: 'Asia/Kolkata', offset: '+5.5', colorClass: 'timezone-5' },
    { id: 'bangladesh', name: '孟加拉国', timezone: 'Asia/Dhaka', offset: '+6', colorClass: 'timezone-6' },
    
    // UTC+7 到 UTC+9（东南亚、东亚）
    { id: 'thailand', name: '泰国', timezone: 'Asia/Bangkok', offset: '+7', colorClass: 'timezone-7' },
    { id: 'china', name: '中国', timezone: 'Asia/Shanghai', offset: '+8', colorClass: 'timezone-8' },
    { id: 'singapore', name: '新加坡', timezone: 'Asia/Singapore', offset: '+8', colorClass: 'timezone-8' },
    { id: 'japan', name: '日本', timezone: 'Asia/Tokyo', offset: '+9', colorClass: 'timezone-9' },
    { id: 'korea', name: '韩国', timezone: 'Asia/Seoul', offset: '+9', colorClass: 'timezone-9' },
    
    // UTC+10 到 UTC+12（大洋洲）
    { id: 'australia_syd', name: '澳大利亚（悉尼）', timezone: 'Australia/Sydney', offset: '+10', colorClass: 'timezone-10' },
    { id: 'australia_perth', name: '澳大利亚（珀斯）', timezone: 'Australia/Perth', offset: '+8', colorClass: 'timezone-8' },
    { id: 'newzealand', name: '新西兰', timezone: 'Pacific/Auckland', offset: '+12', colorClass: 'timezone-12' },
    
    // 其他重要地区
    { id: 'brazil', name: '巴西', timezone: 'America/Sao_Paulo', offset: '-3', colorClass: 'timezone--3' },
    { id: 'southafrica', name: '南非', timezone: 'Africa/Johannesburg', offset: '+2', colorClass: 'timezone-2' },
    { id: 'egypt', name: '埃及', timezone: 'Africa/Cairo', offset: '+2', colorClass: 'timezone-2' }
];

// 简化的SVG路径数据（实际项目中应使用完整的SVG）
const simplifiedSVGPaths = {
    'usa': 'M100,150 L120,145 L130,160 L115,165 Z',
    'uk': 'M420,120 L430,125 L425,135 L415,130 Z',
    'china': 'M580,160 L620,155 L630,180 L590,190 Z',
    'japan': 'M650,150 L660,155 L665,165 L655,170 Z',
    'australia_syd': 'M680,320 L700,315 L710,335 L690,340 Z',
    'brazil': 'M250,250 L280,245 L290,270 L260,275 Z',
    'india': 'M540,200 L560,195 L570,215 L550,220 Z'
    // 实际应用中这里应有更完整的世界地图路径
};

// 初始化世界地图
function initWorldTimeMap() {
    const svg = document.getElementById('world-map-svg');
    const tooltip = document.getElementById('map-tooltip');
    
    // 创建地图路径
    timezoneMapData.forEach(region => {
        // 如果有预定义的SVG路径，使用它
        if (simplifiedSVGPaths[region.id]) {
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('id', region.id);
            path.setAttribute('d', simplifiedSVGPaths[region.id]);
            path.setAttribute('class', `country-path ${region.colorClass}`);
            path.setAttribute('data-timezone', region.timezone);
            path.setAttribute('data-name', region.name);
            path.setAttribute('data-offset', region.offset);
            
            // 添加鼠标事件
            path.addEventListener('mouseenter', function(e) {
                const rect = this.getBoundingClientRect();
                tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
                tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
                tooltip.innerHTML = `<h4>${region.name}</h4><div>UTC${region.offset}</div>`;
                tooltip.style.opacity = '1';
            });
            
            path.addEventListener('mousemove', function(e) {
                const rect = this.getBoundingClientRect();
                tooltip.style.left = (e.clientX - rect.left + 15) + 'px';
                tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
            });
            
            path.addEventListener('mouseleave', function() {
                tooltip.style.opacity = '0';
            });
            
            // 点击显示时间
            path.addEventListener('click', function() {
                showRegionTime(region);
            });
            
            svg.appendChild(path);
        }
    });
    
    // 创建图例
    createTimezoneLegend();
    
    // 添加地图控制事件
    document.getElementById('reset-map').addEventListener('click', function() {
        // 这里可以重置地图视图
        alert('地图视图已重置');
    });
    
    document.getElementById('toggle-labels').addEventListener('click', function() {
        const labels = svg.querySelectorAll('.country-label');
        labels.forEach(label => {
            label.style.display = label.style.display === 'none' ? 'block' : 'none';
        });
        this.innerHTML = this.innerHTML.includes('隐藏') ? 
            '<i class="fas fa-tag"></i> 显示标签' : 
            '<i class="fas fa-tag"></i> 隐藏标签';
    });
}

// 显示地区时间
function showRegionTime(region) {
    const tooltip = document.getElementById('map-tooltip');
    
    // 获取该时区的时间
    const now = new Date();
    const options = { 
        timeZone: region.timezone,
        hour12: false,
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        weekday: 'short',
        year: 'numeric',
        month: 'short',
        day: 'numeric'
    };
    
    const timeString = now.toLocaleTimeString('zh-CN', options);
    const dateString = now.toLocaleDateString('zh-CN', options);
    
    // 显示在工具提示中
    tooltip.innerHTML = `
        <h4>${region.name}</h4>
        <div class="time">${timeString.split(' ')[0]}</div>
        <div>${dateString}</div>
        <div><small>UTC${region.offset}</small></div>
        <div><small>${region.timezone}</small></div>
    `;
    tooltip.style.opacity = '1';
    
    // 同时更新右侧的时差信息
    const localTime = new Date();
    const regionTime = new Date(now.toLocaleString('en-US', { timeZone: region.timezone }));
    const diffHours = Math.round((regionTime - localTime) / (1000 * 60 * 60));
    
    const timeDiffInfo = document.getElementById('time-diff-info');
    timeDiffInfo.innerHTML = `
        <span class="highlight">${region.name}</span> (UTC${region.offset}) 
        ${diffHours === 0 ? "与您本地时间相同" : 
          diffHours > 0 ? `比您本地时间快${diffHours}小时` : 
          `比您本地时间慢${Math.abs(diffHours)}小时`}
    `;
}

// 创建时区图例
function createTimezoneLegend() {
    const legend = document.getElementById('timezone-legend');
    
    // 创建UTC从-8到+12的图例
    for (let i = -8; i <= 12; i++) {
        const item = document.createElement('div');
        item.className = 'legend-item';
        
        const colorBox = document.createElement('div');
        colorBox.className = 'legend-color';
        
        // 根据时区偏移设置颜色
        const colorClass = i >= 0 ? `timezone-${i}` : `timezone--${Math.abs(i)}`;
        colorBox.style.backgroundColor = getComputedStyle(document.querySelector(`.${colorClass}`)).fill || '#cccccc';
        
        const label = document.createElement('span');
        label.textContent = `UTC${i >= 0 ? '+' : ''}${i}`;
        
        item.appendChild(colorBox);
        item.appendChild(label);
        legend.appendChild(item);
    }
}

        // 主要城市时区数据
        const citiesData = [
            { name: "纽约", country: "美国", timezone: "America/New_York", offset: "-5", code: "EST" },
            { name: "伦敦", country: "英国", timezone: "Europe/London", offset: "0", code: "GMT" },
            { name: "东京", country: "日本", timezone: "Asia/Tokyo", offset: "+9", code: "JST" },
            { name: "悉尼", country: "澳大利亚", timezone: "Australia/Sydney", offset: "+10", code: "AEST" },
            { name: "上海", country: "中国", timezone: "Asia/Shanghai", offset: "+8", code: "CST" },
            { name: "巴黎", country: "法国", timezone: "Europe/Paris", offset: "+1", code: "CET" },

            { name: "迪拜", country: "阿联酋", timezone: "Asia/Dubai", offset: "+4", code: "GST" },
            { name: "莫斯科", country: "俄罗斯", timezone: "Europe/Moscow", offset: "+3", code: "MSK" },
            { name: "柏林", country: "德国", timezone: "Europe/Berlin", offset: "+1", code: "CET" },
            { name: "新加坡", country: "新加坡", timezone: "Asia/Singapore", offset: "+8", code: "SGT" },
            { name: "德里", country: "印度", timezone: "Asia/Kolkata", offset: "+5.5", code: "IST" },
            { name: "开罗", country: "埃及", timezone: "Africa/Cairo", offset: "+2", code: "EET" },
            { name: "圣保罗", country: "巴西", timezone: "America/Sao_Paulo", offset: "-3", code: "BRT" },
            { name: "墨西哥城", country: "墨西哥", timezone: "America/Mexico_City", offset: "-6", code: "CST" },
            { name: "多伦多", country: "加拿大", timezone: "America/Toronto", offset: "-5", code: "EST" }
        ];

        // 用户选择的城市
        let selectedCities = ["纽约", "伦敦", "东京", "上海", "悉尼"];
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            updateLocalTime();
            renderCityCards();
            setupEventListeners();
            setInterval(updateAllTimes, 1000);
        });
        
        // 更新本地时间显示
        function updateLocalTime() {
            const now = new Date();
            const localTimeElement = document.getElementById('local-time');
            const localDateElement = document.getElementById('local-date');
            
            // 格式化时间
            const timeString = now.toLocaleTimeString('zh-CN', { hour12: false });
            const dateString = now.toLocaleDateString('zh-CN', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            localTimeElement.textContent = timeString;
            localDateElement.textContent = dateString;
        }
        
        // 获取特定城市的时间
        function getCityTime(cityName) {
            const city = citiesData.find(c => c.name === cityName);
            if (!city) return null;
            
            const now = new Date();
            const options = { 
                timeZone: city.timezone,
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            };
            
            const timeString = now.toLocaleTimeString('zh-CN', options);
            const dateString = now.toLocaleDateString('zh-CN', { 
                timeZone: city.timezone,
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: 'numeric'
            });
            
            // 计算与本地时间的时差
            const localTime = now;
            const cityTime = new Date(now.toLocaleString('en-US', { timeZone: city.timezone }));
            const diffHours = Math.round((cityTime - localTime) / (1000 * 60 * 60));
            
            return {
                name: city.name,
                country: city.country,
                time: timeString,
                date: dateString,
                offset: city.offset,
                code: city.code,
                diff: diffHours
            };
        }
        
        // 渲染城市卡片
        function renderCityCards() {
            const citiesGrid = document.getElementById('cities-grid');
            citiesGrid.innerHTML = '';
            
            selectedCities.forEach(cityName => {
                const cityTime = getCityTime(cityName);
                if (!cityTime) return;
                
                const diffText = cityTime.diff === 0 ? "与本地时间相同" : 
                                cityTime.diff > 0 ? `比本地快${cityTime.diff}小时` : 
                                `比本地慢${Math.abs(cityTime.diff)}小时`;
                
                const card = document.createElement('div');
                card.className = 'city-time-card';
                card.innerHTML = `
                    <div class="city-name">${cityTime.name}, ${cityTime.country}</div>
                    <div class="city-time">${cityTime.time}</div>
                    <div class="city-datetime">${cityTime.date} (${cityTime.code} UTC${cityTime.offset})</div>
                    <div class="time-difference">${diffText}</div>
                `;
                
                // 点击卡片显示时差信息
                card.addEventListener('click', function() {
                    showTimeDifference(cityTime.name);
                });
                
                citiesGrid.appendChild(card);
            });
        }
        
        // 显示时差信息
        function showTimeDifference(cityName) {
            const cityTime = getCityTime(cityName);
            if (!cityTime) return;
            
            const timeDiffInfo = document.getElementById('time-diff-info');
            timeDiffInfo.innerHTML = `
                <span class="highlight">${cityTime.name}</span> (UTC${cityTime.offset}) ${cityTime.diff === 0 ? "与您本地时间相同" : 
                cityTime.diff > 0 ? `比您本地时间快${cityTime.diff}小时` : 
                `比您本地时间慢${Math.abs(cityTime.diff)}小时`}
            `;
        }
        
        // 更新所有时间显示
        function updateAllTimes() {
            updateLocalTime();
            renderCityCards();
        }
        
        // 设置事件监听器
        function setupEventListeners() {
            // 搜索功能
            document.getElementById('city-search').addEventListener('input', function(e) {
                const searchTerm = e.target.value.toLowerCase();
                const cards = document.querySelectorAll('.city-time-card');
                
                cards.forEach(card => {
                    const cityName = card.querySelector('.city-name').textContent.toLowerCase();
                    if (cityName.includes(searchTerm)) {
                        card.style.display = 'block';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
            
            // 添加城市按钮
            document.getElementById('add-city-btn').addEventListener('click', function() {
                const citySelect = document.getElementById('city-select');
                const selectedCity = citySelect.value;
                
                if (selectedCity && !selectedCities.includes(selectedCity)) {
                    selectedCities.push(selectedCity);
                    renderCityCards();
                    citySelect.value = '';
                }
            });
            
            // 清除所有按钮
            document.getElementById('clear-cities-btn').addEventListener('click', function() {
                selectedCities = [];
                renderCityCards();
                document.getElementById('time-diff-info').textContent = '选择两个城市以计算时差';
            });
            
            // 刷新按钮
            document.getElementById('refresh-btn').addEventListener('click', function() {
                updateAllTimes();
                // 添加一个简单的视觉反馈
                this.innerHTML = '<i class="fas fa-check"></i> 已刷新';
                this.style.background = '#27ae60';
                
                setTimeout(() => {
                    this.innerHTML = '<i class="fas fa-sync-alt"></i> 刷新时间';
                    this.style.background = '';
                }, 1000);
            });
            
            // 时区选择
            document.getElementById('timezone-select').addEventListener('change', function() {
                const selectedTimezone = this.value;
                if (selectedTimezone === 'local') return;
                
                // 在实际应用中，这里会显示所选时区的时间
                alert(`您选择了 ${this.options[this.selectedIndex].text} 时区。在完整版本中，这里会显示该时区的详细时间信息。`);
            });
        }
    </script>
